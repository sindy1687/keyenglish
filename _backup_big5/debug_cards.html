<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>?вҲ ?йҡӨијҜеІ« - Typing Hero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .debug-info {
      background: #2a2a2a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #444;
    }
    .error { border-color: #ff4444; background: #3a2a2a; }
    .success { border-color: #44ff44; background: #2a3a2a; }
    .warning { border-color: #ffff44; background: #3a3a2a; }
    button {
      background: #4a6a7c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background: #5a7a8c; }
    .log {
      background: #000;
      color: #0f0;
      padding: 10px;
      border-radius: 4px;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>?? ?вҲ ?йҡӨијҜеІ«ж’ҢдәҷпҶҒ</h1>
  
  <div class="debug-info">
    <h3>?? ?е–®??ВҖ??/h3>
    <div id="status"></div>
    <button onclick="checkStatus()">?? з‘јпјёо·Ғ?ВҖ??/button>
  </div>
  
  <div class="debug-info">
    <h3>?о—Ў ?з ҚоҜө?и„Ј?</h3>
    <div id="storage"></div>
    <button onclick="checkStorage()">?? з‘јпјёо·Ғ?и„Ј?</button>
  </div>
  
  <div class="debug-info">
    <h3>?оҚЈ ?вҲ ?йһҲпӢӘ?</h3>
    <div id="cards"></div>
    <button onclick="checkCards()">?? з‘јпјёо·Ғ?вҲ ?</button>
  </div>
  
  <div class="debug-info">
    <h3>?? ?пҡ–??дәҘ?</h3>
    <div id="log" class="log"></div>
    <button onclick="clearLog()">??е„ӯ?зҡңпҶіоЁ’?дәҘ?</button>
  </div>
  
  <div class="debug-info">
    <h3>?оң„ зҡңзҘҲеІ«ж’ҢдәҷпҶҒ</h3>
    <button onclick="addTestCard()">??зҳӣйӨғ?зҡңзҘҲеІ«?вҲ ?</button>
    <button onclick="clearAllCards()">??е„ӯ?зҡңпҶіоЁ’?ВҖ?пҗЈпҷ“??/button>
    <button onclick="backupData()">?о—Ў ?о©’йҒўйһҲпӢӘ?</button>
    <button onclick="restoreData()">?оҷҘ ?пј·е„”йһҲпӢӘ?</button>
  </div>

  <!-- й ӣпҗЈп…Ҝж•№пҶІ???JavaScript -->
  <script src="js/sound.js"></script>
  <script src="js/userData.js"></script>
  <script src="js/autoSaveSystem.js"></script>
  <script src="js/starRewardSystem.js"></script>
  <script src="js/cardUtils.js"></script>
  <script src="js/cardStorage.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/achievementSystem.js"></script>
  <script src="js/contextMenuSystem.js"></script>
  <script src="js/enhancedSaveReminder.js"></script>

  <script>
    let logMessages = [];
    
    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const logEntry = `[${timestamp}] ${message}`;
      logMessages.push(logEntry);
      
      const logElement = document.getElementById('log');
      if (logElement) {
        logElement.textContent = logMessages.join('\n');
        logElement.scrollTop = logElement.scrollHeight;
      }
      
      console.log(logEntry);
    }
    
    function clearLog() {
      logMessages = [];
      document.getElementById('log').textContent = '';
    }
    
    function checkStatus() {
      const statusDiv = document.getElementById('status');
      let html = '';
      
      // з‘јпјёо·Ғ allCards
      if (window.allCards && window.allCards.length > 0) {
        html += '<div class="success">??allCards ж’Ңи„°??? ' + window.allCards.length + ' ж’ҳиҗ„пҷ“??/div>';
        log('allCards ж’Ңи„°??? ' + window.allCards.length + ' ж’ҳиҗ„пҷ“??);
      } else {
        html += '<div class="error">??allCards ?иҠҫ??дәӨ??з®ҮеҫҒ</div>';
        log('allCards ?иҠҫ??дәӨ??з®ҮеҫҒ', 'error');
      }
      
      // з‘јпјёо·Ғ LinkageSystem
      if (window.LinkageSystem) {
        html += '<div class="success">??LinkageSystem ж’Ңи„°???/div>';
        log('LinkageSystem ж’Ңи„°???);
      } else {
        html += '<div class="error">??LinkageSystem ?иҠҫ???/div>';
        log('LinkageSystem ?иҠҫ???, 'error');
      }
      
      statusDiv.innerHTML = html;
    }
    
    function checkStorage() {
      const storageDiv = document.getElementById('storage');
      let html = '';
      
      const keys = ['ownedCards', 'cardShards', 'totalStars'];
      
      keys.forEach(key => {
        try {
          const value = localStorage.getItem(key);
          if (value !== null) {
            const data = JSON.parse(value);
            if (typeof data === 'object') {
              const count = Object.keys(data).length;
              html += `<div class="success">??${key}: ${count} ?пҶІ???/div>`;
              log(`${key}: ${count} ?пҶІ??о§°);
            } else {
              html += `<div class="success">??${key}: ${data}</div>`;
              log(`${key}: ${data}`);
            }
          } else {
            html += `<div class="warning">?оәЁ? ${key}: йҠқпҡ—???/div>`;
            log(`${key}: йҠқпҡ—??зҒј, 'warning');
          }
        } catch (error) {
          html += `<div class="error">??${key}: й–«???иҲӘзӮҠ</div>`;
          log(`${key}: й–«???иҲӘзӮҠ - ${error.message}`, 'error');
        }
      });
      
      storageDiv.innerHTML = html;
    }
    
    function checkCards() {
      const cardsDiv = document.getElementById('cards');
      let html = '';
      
      if (!window.LinkageSystem) {
        html += '<div class="error">??LinkageSystem ?иҠҫ???/div>';
        cardsDiv.innerHTML = html;
        return;
      }
      
      try {
        const ownedCards = window.LinkageSystem.cards.getOwnedCards();
        const shards = window.LinkageSystem.cards.getShards();
        const totalStars = window.LinkageSystem.stars.get();
        
        const ownedCount = Object.keys(ownedCards).length;
        const shardCount = Object.keys(shards).length;
        const totalShards = Object.values(shards).reduce((sum, count) => sum + count, 0);
        
        html += `<div class="success">?? ж’Ңи„«??пҗЈпҷ“?? ${ownedCount} ж’ҳ?/div>`;
        html += `<div class="success">?? иқЈоҺ–?иқ”жЎ…?: ${shardCount} иқ”?/div>`;
        html += `<div class="success">?? иқ®иің??пӢӘоһІ: ${totalShards} ??/div>`;
        html += `<div class="success">жҪғ?иқ®иіЈ??оёӮоһІ: ${totalStars} жҶҝ?/div>`;
        
        log(`?вҲ ?иқҜжўҜ?: ж’Ңи„«???${ownedCount} ж’ҳиӣӣ?иқЈоҺ–?иқ”жЎ…? ${shardCount} иқ”ж®·?иқ®иің???${totalShards} ?п•§??оёӮ? ${totalStars} жҶҝпҮ©);
        
      } catch (error) {
        html += `<div class="error">??з‘јпјёо·Ғ?вҲ ?йһҲпӢӘ??оҝҡоЁӘ?оё…п—„йҡӨ? ${error.message}</div>`;
        log(`з‘јпјёо·Ғ?вҲ ?йһҲпӢӘ??оҝҡоЁӘ?оё…п—„йҡӨ? ${error.message}`, 'error');
      }
      
      cardsDiv.innerHTML = html;
    }
    
    function addTestCard() {
      if (!window.allCards || window.allCards.length === 0) {
        log('?вҠҘ?зҳӣйӨғ?зҡңзҘҲеІ«?вҲ ?еҡ—оӘҺllCards ?иҠҫ???, 'error');
        return;
      }
      
      if (!window.LinkageSystem) {
        log('?вҠҘ?зҳӣйӨғ?зҡңзҘҲеІ«?вҲ ?еҡ—о©№inkageSystem ?иҠҫ???, 'error');
        return;
      }
      
      try {
        const testCard = window.allCards[0];
        window.LinkageSystem.cards.addCard(testCard.word);
        window.LinkageSystem.cards.addShard(testCard.word, 3);
        
        log(`ж’Ңи„«жә¶?оәҹи‘«й–°иЎҖпҷ“?? ${testCard.word}`);
        checkCards();
        
      } catch (error) {
        log(`зҳӣйӨғ?зҡңзҘҲеІ«?вҲ ?жҶӯжңӣ?: ${error.message}`, 'error');
      }
    }
    
    function clearAllCards() {
      if (!confirm('иқЈз®Ҹ?й–¬ојј??ж–—??пҗЈпҷ“?пӢ©?еҡ—?)) {
        return;
      }
      
      if (!window.LinkageSystem) {
        log('?вҠҘ?зҡңпҶіоЁ’?вҲ ?еҡ—о©№inkageSystem ?иҠҫ???, 'error');
        return;
      }
      
      try {
        window.LinkageSystem.cards.setOwnedCards({});
        window.LinkageSystem.cards.setShards({});
        window.LinkageSystem.stars.set(0);
        
        log('ж’Ңи„«??ж–—??пҗЈпҷ“??);
        checkCards();
        
      } catch (error) {
        log(`зҡңпҶіоЁ’?вҲ ?жҶӯжңӣ?: ${error.message}`, 'error');
      }
    }
    
    function backupData() {
      if (!window.LinkageSystem) {
        log('?вҠҘ??о©’йҒўйһҲпӢӘ?еҡ—о©№inkageSystem ?иҠҫ???, 'error');
        return;
      }
      
      try {
        const backup = {
          ownedCards: window.LinkageSystem.cards.getOwnedCards(),
          shards: window.LinkageSystem.cards.getShards(),
          totalStars: window.LinkageSystem.stars.get(),
          timestamp: new Date().toISOString()
        };
        
        localStorage.setItem('cardBackup', JSON.stringify(backup));
        log('йһҲпӢӘ??о©’йҒўж‘°п—»?');
        
      } catch (error) {
        log(`?о©’йҒўжҶӯжңӣ?: ${error.message}`, 'error');
      }
    }
    
    function restoreData() {
      try {
        const backupStr = localStorage.getItem('cardBackup');
        if (!backupStr) {
          log('зҳқоҳү??жӣүпҚ‘?о©’йҒўйһҲпӢӘ?', 'warning');
          return;
        }
        
        const backup = JSON.parse(backupStr);
        
        if (window.LinkageSystem) {
          window.LinkageSystem.cards.setOwnedCards(backup.ownedCards);
          window.LinkageSystem.cards.setShards(backup.shards);
          window.LinkageSystem.stars.set(backup.totalStars);
        }
        
        log('йһҲпӢӘ??пј·е„”ж‘°п—»?');
        checkCards();
        
      } catch (error) {
        log(`?пј·е„”жҶӯжңӣ?: ${error.message}`, 'error');
      }
    }
    
    // ??ој“ localStorage йңҲп“Җ?
    window.addEventListener('storage', function(e) {
      log(`localStorage йңҲп“Җ?: ${e.key} = ${e.newValue}`);
    });
    
    // ?ојҝоІ„й ӣпҗЈп…Ҝ?оҝӣпҠ®?оҹ зӮҺ??
    window.addEventListener('load', function() {
      log('йҡӨијҜеІ«ж’ҢдәҷпҶҒж’Ңи„°???);
      
      setTimeout(() => {
        checkStatus();
        checkStorage();
        checkCards();
      }, 2000);
    });
  </script>
</body>
</html>
