<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?вҲ ?йһҲпӢӘ?й–®з®ёоЎҺж’ҢдәҷпҶҒ</title>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .diagnostic-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .diagnostic-section h2 {
            color: #00ffff;
            margin-top: 0;
            border-bottom: 2px solid #00ffff;
            padding-bottom: 10px;
        }
        
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .status.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            color: #00ff00;
        }
        
        .status.warning {
            background: rgba(255, 255, 0, 0.2);
            border: 1px solid #ffff00;
            color: #ffff00;
        }
        
        .status.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
        }
        
        .card-list {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .card-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border-left: 4px solid #00ffff;
        }
        
        .card-item.problem {
            border-left-color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }
        
        .card-item.fixed {
            border-left-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .button.danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
        }
        
        .button.success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            color: #ccc;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>?? ?вҲ ?йһҲпӢӘ?й–®з®ёоЎҺж’ҢдәҷпҶҒ</h1>
        
        <div class="diagnostic-section">
            <h2>?? иқҹйӨҢзөһ?ВҖ?п•һзӮҺ??/h2>
            <div id="systemStatus"></div>
            <button class="button" onclick="runDiagnostic()">?? ?з‘Ғ?й–®з®ёоЎҺ</button>
            <button class="button success" onclick="fixProblems()">?оң„ ?иҠё?йқҪжЎҖе„”</button>
            <button class="button danger" onclick="resetCardData()">??е„ӯ??пҡҷи”ӯ?вҲ ?йһҲпӢӘ?</button>
        </div>
        
        <div class="diagnostic-section">
            <h2>?? иқҜжўҜ?йһҲпӢӘ?</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </div>
        
        <div class="diagnostic-section">
            <h2>?оәЁ? ?жҪӣоҗҠ?п„’?жҶҝ?/h2>
            <div id="problemsList"></div>
        </div>
        
        <div class="diagnostic-section">
            <h2>??йқҪжЎҖе„”иқҜо“Ҹ?</h2>
            <div id="fixResults"></div>
        </div>
    </div>

    <script src="js/userData.js"></script>
    <script src="js/cardStorage.js"></script>
    <script>
        let diagnosticResults = {
            problems: [],
            fixed: [],
            stats: {}
        };

        function runDiagnostic() {
            diagnosticResults = {
                problems: [],
                fixed: [],
                stats: {}
            };
            
            console.log('?? ?п•қ??з‘Ғ??вҲ ?йһҲпӢӘ?й–®з®ёоЎҺ...');
            
            // з‘јпјёо·ҒиқҹйӨҢзөһ?иҮ¬о’Ҹй ӣпҗЈп…Ҝ
            checkSystemLoaded();
            
            // з‘јпјёо·Ғ?вҲ ?йһҲпӢӘ?ж‘°п—»оһ®??
            checkCardDataIntegrity();
            
            // з‘јпјёо·ҒиқЈоҺ–?йһҲпӢӘ?йҠқВҖ?ж№”ВҖ?
            checkShardConsistency();
            
            // з‘јпјёо·Ғж’Ңи„°еңҫ?оЎјпҷ“?пӢ«???
            checkUnlockedCards();
            
            // ?ж№”оЎҮжҶҝиҲҗе…§
            updateDisplay();
        }

        function checkSystemLoaded() {
            const status = document.getElementById('systemStatus');
            
            if (typeof LinkageSystem === 'undefined') {
                diagnosticResults.problems.push({
                    type: 'system',
                    message: 'LinkageSystem ?иҠҫ???,
                    severity: 'error'
                });
                status.innerHTML = '<div class="status error">??иқҹйӨҢзөһ?иҠЈиҝӨиқЈз®„???/div>';
                return;
            }
            
            if (typeof window.allCards === 'undefined' || !window.allCards.length) {
                diagnosticResults.problems.push({
                    type: 'system',
                    message: '?вҲ ?йһҲпӢӘ??иҠҫ???,
                    severity: 'error'
                });
                status.innerHTML = '<div class="status error">???вҲ ?йһҲпӢӘ??иҠҫ???/div>';
                return;
            }
            
            status.innerHTML = '<div class="status success">??иқҹйӨҢзөһз”Ү?иҷңй ӣпҗЈп…Ҝ</div>';
        }

        function checkCardDataIntegrity() {
            console.log('?? з‘јпјёо·Ғ?вҲ ?йһҲпӢӘ?ж‘°п—»оһ®??..');
            
            const ownedCards = LinkageSystem.cards.getOwnedCards();
            const shards = LinkageSystem.cards.getShards();
            
            diagnosticResults.stats = {
                totalCards: window.allCards.length,
                ownedCards: Object.keys(ownedCards).length,
                totalShards: Object.values(shards).reduce((sum, count) => sum + (parseInt(count) || 0), 0),
                shardTypes: Object.keys(shards).length
            };
            
            // з‘јпјёо·Ғ?иҮ¬о’Ҹ?пҗЈпҷ“?пӢ©оҜӯ ownedCards йҠқеҮӢ?йҠқпҡ—оҜӯ allCards йҠқ?
            const invalidOwnedCards = Object.keys(ownedCards).filter(cardWord => 
                !window.allCards.find(card => card.word === cardWord)
            );
            
            if (invalidOwnedCards.length > 0) {
                diagnosticResults.problems.push({
                    type: 'integrity',
                    message: `?жҪӣоҗҠ ${invalidOwnedCards.length} ж’ҳиҗҮпғҺ?пҺҲ?ж’Ңи„«??пҗЈпҷ“?пҠҶ,
                    details: invalidOwnedCards,
                    severity: 'warning'
                });
            }
            
            // з‘јпјёо·Ғ?иҮ¬о’Ҹ?пҗҘ??пӢЁ??вҲ ?йҠқпҡ—???
            const invalidShards = Object.keys(shards).filter(cardWord => 
                !window.allCards.find(card => card.word === cardWord)
            );
            
            if (invalidShards.length > 0) {
                diagnosticResults.problems.push({
                    type: 'integrity',
                    message: `?жҪӣоҗҠ ${invalidShards.length} ?п•ҹпғҺ?пҺҲ?иқЈоҺ–?й–®оҰә?`,
                    details: invalidShards,
                    severity: 'warning'
                });
            }
        }

        function checkShardConsistency() {
            console.log('?? з‘јпјёо·ҒиқЈоҺ–?йһҲпӢӘ?йҠқВҖ?ж№”ВҖ?..');
            
            const ownedCards = LinkageSystem.cards.getOwnedCards();
            const shards = LinkageSystem.cards.getShards();
            
            // з‘јпјёо·Ғж’Ңи„°еңҫ?оЎјпҷ“?пӢӘоҰҖ?иЎҢ?жҶӯо«ҙ?иқЈоҺ–?
            const unlockedWithExcessShards = [];
            
            Object.keys(ownedCards).forEach(cardWord => {
                const card = window.allCards.find(c => c.word === cardWord);
                if (!card) return;
                
                const required = getRequiredShards(card.rarity);
                const haveShards = shards[cardWord] || 0;
                
                if (haveShards > required) {
                    unlockedWithExcessShards.push({
                        card: card,
                        required: required,
                        have: haveShards,
                        excess: haveShards - required
                    });
                }
            });
            
            if (unlockedWithExcessShards.length > 0) {
                diagnosticResults.problems.push({
                    type: 'consistency',
                    message: `?жҪӣоҗҠ ${unlockedWithExcessShards.length} ж’ҳиҗ„жӯҮй–«???вҲ ??пҗЈ?ж“—оҰё??пҠҶ,
                    details: unlockedWithExcessShards,
                    severity: 'warning'
                });
            }
        }

        function checkUnlockedCards() {
            console.log('?? з‘јпјёо·Ғж’Ңи„°еңҫ?оЎјпҷ“?пӢ«???..');
            
            const ownedCards = LinkageSystem.cards.getOwnedCards();
            const shards = LinkageSystem.cards.getShards();
            
            // з‘јпјёо·Ғ?пҗҰеәңй–«??йӣҝпүҚоҜҜй–«???п„’пҷ“??
            const shouldBeUnlocked = [];
            
            window.allCards.forEach(card => {
                const required = getRequiredShards(card.rarity);
                const haveShards = shards[card.word] || 0;
                const isOwned = ownedCards[card.word] || false;
                
                if (haveShards >= required && !isOwned) {
                    shouldBeUnlocked.push({
                        card: card,
                        required: required,
                        have: haveShards
                    });
                }
            });
            
            if (shouldBeUnlocked.length > 0) {
                diagnosticResults.problems.push({
                    type: 'unlock',
                    message: `?жҪӣоҗҠ ${shouldBeUnlocked.length} ж’ҳиҗ„пҷ“?пӢӘ?й–°и„°еңҫ?оЎ»??иҠҫеңҫ?о ҷ,
                    details: shouldBeUnlocked,
                    severity: 'error'
                });
            }
            
            // з‘јпјёо·Ғж’Ңи„°еңҫ?оЎ»?иқЈоҺ–?йҠқпҡҡйӣІ?п„’пҷ“??
            const unlockedWithInsufficientShards = [];
            
            Object.keys(ownedCards).forEach(cardWord => {
                const card = window.allCards.find(c => c.word === cardWord);
                if (!card) return;
                
                const required = getRequiredShards(card.rarity);
                const haveShards = shards[cardWord] || 0;
                
                if (haveShards < required) {
                    unlockedWithInsufficientShards.push({
                        card: card,
                        required: required,
                        have: haveShards
                    });
                }
            });
            
            if (unlockedWithInsufficientShards.length > 0) {
                diagnosticResults.problems.push({
                    type: 'unlock',
                    message: `?жҪӣоҗҠ ${unlockedWithInsufficientShards.length} ж’ҳиҗ„жӯҮй–«???вҲ ?иқЈоҺ–?йҠқпҡҡйӣІ`,
                    details: unlockedWithInsufficientShards,
                    severity: 'warning'
                });
            }
        }

        function fixProblems() {
            console.log('?оң„ ?п•қ??иҠё?йқҪжЎҖе„”...');
            
            const fixResults = [];
            
            diagnosticResults.problems.forEach(problem => {
                if (problem.type === 'unlock') {
                    // йқҪжЎҖе„”?пҗҰеәңй–«??йӣҝпүҚоҜҜй–«???п„’пҷ“??
                    problem.details.forEach(item => {
                        LinkageSystem.cards.addCard(item.card.word);
                        fixResults.push(`??й–«???вҲ ?: ${item.card.zh} (${item.card.word})`);
                    });
                }
                
                if (problem.type === 'integrity') {
                    // зҡңпҶұ??вҠҘ??п„”??пӢ¬???
                    if (problem.message.includes('?вҠҘ??п„”??пӢ¬???)) {
                        const shards = LinkageSystem.cards.getShards();
                        problem.details.forEach(cardWord => {
                            delete shards[cardWord];
                            fixResults.push(`??е„ӯ?зҡңпҶұ??вҠҘ?иқЈоҺ–?: ${cardWord}`);
                        });
                        LinkageSystem.cards.setShards(shards);
                    }
                    
                    // зҡңпҶұ??вҠҘ??п„’жӯҮ?ојј??вҲ ?
                    if (problem.message.includes('?вҠҘ??п„’жӯҮ?ојј??вҲ ?')) {
                        const ownedCards = LinkageSystem.cards.getOwnedCards();
                        problem.details.forEach(cardWord => {
                            delete ownedCards[cardWord];
                            fixResults.push(`??е„ӯ?зҡңпҶұ??вҠҘ??вҲ ?: ${cardWord}`);
                        });
                        LinkageSystem.cards.setOwnedCards(ownedCards);
                    }
                }
            });
            
            diagnosticResults.fixed = fixResults;
            
            // ?пҡҳоЎҮ?з‘Ғ?й–®з®ёоЎҺ
            setTimeout(() => {
                runDiagnostic();
            }, 100);
        }

        function resetCardData() {
            if (!confirm('?оәЁ? иқЈз®Ҹ?й–¬ојҝ?иқөж ј??пҗЈпҷ“?пӢ¬??о©“?еҡ—о¶ҡn\n?о©“??пҒҝ?\n??зҡңпҶіоЁ’?ВҖ?пҗЈжӯҮй–«???п„’пҷ“?пҠӮn??зҡңпҶіоЁ’?ВҖ?пҗҘ??пҠӮn???вҠҘ?ж•әжӢҷ?\n\nиқЈз®Ҹ?й–¬ојҪеҢұиқҘп—ә?еҡ—?)) {
                return;
            }
            
            // зҡңпҶіоЁ’?вҲ ?йһҲпӢӘ?
            localStorage.removeItem('ownedCards');
            localStorage.removeItem('cardShards');
            localStorage.removeItem('recentlyObtainedCards');
            localStorage.removeItem('newCardTimestamps');
            
            // ?пҡҳоЎҮй ӣпҗЈп…Ҝ?ојҝоІ„
            location.reload();
        }

        function updateDisplay() {
            // ?ж№”оЎҮиқҜжўҜ?йһҲпӢӘ?
            const statsGrid = document.getElementById('statsGrid');
            if (diagnosticResults.stats) {
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${diagnosticResults.stats.totalCards || 0}</div>
                        <div class="stat-label">иқ®иіўпҷ“?пӢӘоһІ</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${diagnosticResults.stats.ownedCards || 0}</div>
                        <div class="stat-label">ж’Ңи„°еңҫ?оЎјпҷ“??/div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${diagnosticResults.stats.totalShards || 0}</div>
                        <div class="stat-label">иқ®иің??пӢӘоһІ</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${diagnosticResults.stats.shardTypes || 0}</div>
                        <div class="stat-label">иқЈоҺ–?иқ”жЎ…?</div>
                    </div>
                `;
            }
            
            // ?ж№”оЎҮ?оҗө??оӨңвҖқ
            const problemsList = document.getElementById('problemsList');
            if (diagnosticResults.problems.length === 0) {
                problemsList.innerHTML = '<div class="status success">??зҳқоҳү??жҪӣоҗҠ?оҗө?</div>';
            } else {
                problemsList.innerHTML = diagnosticResults.problems.map(problem => `
                    <div class="card-item ${problem.severity === 'error' ? 'problem' : 'warning'}">
                        <div>
                            <strong>${problem.message}</strong>
                            ${problem.details ? `<br><small>${JSON.stringify(problem.details)}</small>` : ''}
                        </div>
                        <div style="color: ${problem.severity === 'error' ? '#ff0000' : '#ffff00'}">
                            ${problem.severity === 'error' ? '???иҲӘзӮҠ' : '?оәЁ? йң…иЎҖ?'}
                        </div>
                    </div>
                `).join('');
            }
            
            // ?ж№”оЎҮйқҪжЎҖе„”иқҜо“Ҹ?
            const fixResults = document.getElementById('fixResults');
            if (diagnosticResults.fixed.length === 0) {
                fixResults.innerHTML = '<div class="status">ж’ о«ұоҜҜ?з‘Ғ?йқҪжЎҖе„”</div>';
            } else {
                fixResults.innerHTML = diagnosticResults.fixed.map(result => `
                    <div class="card-item fixed">
                        <div>${result}</div>
                    </div>
                `).join('');
            }
        }

        function getRequiredShards(rarity) {
            switch (rarity) {
                case 'й һпҶұ???: return 5;
                case 'иқ”ВҖ??: return 3;
                case '?жЎ…ВҖ?: return 1;
                default: return 1;
            }
        }

        // ?ојҝоІ„й ӣпҗЈп…Ҝ?оҝӣпҠ®?оҹҹо·“йҠөп—ҪйӮЈ??
        window.addEventListener('load', () => {
            setTimeout(() => {
                runDiagnostic();
            }, 1000);
        });
    </script>
</body>
</html>
