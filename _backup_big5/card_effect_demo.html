<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>?вҲ ??пҺҮ?ж“ғоқҶ??о°Әпҷ“</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: #101a2b;
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      background: rgba(10,20,40,0.92);
      border-radius: 16px;
      box-shadow: 0 0 24px #00ffff55;
      padding: 32px 24px;
      margin-top: 40px;
      max-width: 420px;
      width: 100%;
    }
    h1 {
      color: #00ffff;
      text-shadow: 0 0 12px #00ffff, 0 0 32px #a259ff;
      text-align: center;
    }
    .energy {
      font-size: 1.2rem;
      color: #ffd700;
      margin-bottom: 16px;
      text-align: center;
    }
    .card-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      justify-content: center;
    }
    .card-btn {
      background: linear-gradient(90deg, #00ffff 0%, #a259ff 100%);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 8px #00ffff88;
      transition: 0.2s;
    }
    .card-btn.selected {
      background: #ffd700;
      color: #000;
      font-weight: bold;
      box-shadow: 0 0 16px #ffd700;
    }
    .start-btn {
      background: #ffd700;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin: 0 auto 18px auto;
      display: block;
      box-shadow: 0 0 16px #ffd70088;
      transition: 0.2s;
    }
    .start-btn:disabled {
      background: #888;
      color: #ccc;
      cursor: not-allowed;
      box-shadow: none;
    }
    .question {
      font-size: 1.1rem;
      margin: 18px 0 10px 0;
      text-align: center;
    }
    .answer-input {
      width: 80%;
      padding: 8px;
      border-radius: 6px;
      border: 1.5px solid #00ffff;
      font-size: 1rem;
      margin-bottom: 10px;
      background: #181f2e;
      color: #fff;
      text-align: center;
    }
    .effect-btn {
      background: linear-gradient(90deg, #a259ff 0%, #00ffff 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin: 0 6px 10px 6px;
      box-shadow: 0 0 8px #a259ff88;
      transition: 0.2s;
    }
    .effect-btn:disabled {
      background: #333;
      color: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }
    .timer {
      font-size: 1.1rem;
      color: #00ffff;
      margin-bottom: 10px;
      text-align: center;
    }
    .result {
      font-size: 1.2rem;
      color: #ffd700;
      margin-top: 18px;
      text-align: center;
    }
    .back-btn {
      background: #00ffff;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 18px;
      box-shadow: 0 0 8px #00ffff88;
      transition: 0.2s;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>?вҲ ??пҺҮ?ж“ғоқҶ??о°Әпҷ“</h1>
    <div class="energy" id="energyDisplay">ж“ғоқӮ?еҡ—?</div>
    <div id="step1">
      <div style="margin-bottom:8px;">?иұў?й–¬ој»и‘Ҷ?дәҰ??вҲ ?еҡ—пҺҶоҸ»йҠҙпӢӯојҺеҡ—пҗӯ?</div>
      <div class="card-list" id="cardList"></div>
      <button class="start-btn" id="startBtn">?п•қ?ж“ғоқҶ?</button>
    </div>
    <div id="step2" style="display:none;">
      <div class="timer" id="timer">?оҳүоһІеҡ—?0 иқҳ?/div>
      <div class="question" id="question">жҶҝп—јоӯ–й ӣпҗЈп…ҜйҠқ?..</div>
      <input class="answer-input" id="answerInput" placeholder="йҡўп• ж’“?дәҰ?зҚў?>
      <div id="effectBtns"></div>
      <button class="effect-btn" id="submitBtn">?ој»пҠҫиқ‘оқғ?</button>
    </div>
    <div id="step3" style="display:none;">
      <div class="result" id="result"></div>
      <button class="back-btn" onclick="location.reload()">?пҡҷоҚҳйҠқВҖз”Ҳ?/button>
    </div>
  </div>
  <script src="js/cards.js"></script>
  <script>
    // ж“ғоқӮ?иқҹйӨҢзөһ
    function getEnergy() {
      return parseInt(localStorage.getItem('energy') || '10');
    }
    function setEnergy(val) {
      localStorage.setItem('energy', val);
    }
    function updateEnergyDisplay() {
      document.getElementById('energyDisplay').textContent = 'ж“ғоқӮ?еҡ—? + getEnergy();
    }
    updateEnergyDisplay();

    // ?оЎј?ж’Ңи„«??пҗЈпҷ“??
    const ownedCards = JSON.parse(localStorage.getItem('ownedCards') || '{}');
    const myCards = (window.allCards || []).filter(card => ownedCards[card.word]);
    let selectedCards = [];

    // жҶҝиҲҗе…§?иҲ«ојҺ?вҲ ?
    const cardListDiv = document.getElementById('cardList');
    myCards.forEach(card => {
      const btn = document.createElement('button');
      btn.className = 'card-btn';
      btn.textContent = `${card.zh} (${card.word})`;
      btn.onclick = function() {
        if (selectedCards.includes(card)) {
          selectedCards = selectedCards.filter(c => c !== card);
          btn.classList.remove('selected');
        } else {
          selectedCards.push(card);
          btn.classList.add('selected');
        }
      };
      cardListDiv.appendChild(btn);
    });

    // ?оҗі?жҶҝп—әжҫҲеҡ—пҺҶоҸ»?иҠҫ??жёё?еҡ—?
    const questions = [
      { q: 'жҶӯиҠ·оЁ«?п„•п”©?пӢӘоҰҖеҡ—?, a: 'sun' },
      { q: '?пҺ…жјҒ?п„•п”©?пӢӘоҰҖеҡ—?, a: 'moon' },
      { q: '?е•Ғ??п„•п”©?пӢӘоҰҖеҡ—?, a: 'earth' },
      { q: '?оёӮ??п„•п”©?пӢӘоҰҖеҡ—?, a: 'star' },
      { q: 'зҳһжёЎ??жңӣ??иҚ”?', a: 'water' },
      { q: '?жҖҺ??жңӣ??иҚ”?', a: 'fire' },
      { q: 'жҶёеҮҪ??жңӣ??иҚ”?', a: 'wind' },
      { q: 'жҶӯжӢҚеҫҒ?п„•п”©?пӢӘоҰҖеҡ—?, a: 'sky' },
    ];
    let currentQ = null;
    let timer = 30;
    let timerId = null;
    let usedEffects = {};
    let allowReroll = false;
    let allowHint = false;
    let allowTime = false;

    // ?п•қ?ж“ғоқҶ?
    document.getElementById('startBtn').onclick = function() {
      if (getEnergy() <= 0) {
        alert('ж“ғоқӮ?йҠқпҡҡйӣІеҡ—?);
        return;
      }
      if (selectedCards.length === 0) {
        alert('йҡўп• пҠ·ж’ о•ҜојҺ?пӢЁ?ж’ҳиҗ„пҷ“?пӢі?');
        return;
      }
      setEnergy(getEnergy() - 1);
      updateEnergyDisplay();
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = '';
      startGame();
    };

    function startGame() {
      // з‘јпјёо·Ғ?вҲ ??пҺҮ?
      allowReroll = selectedCards.some(card => card.effect && card.effect.type === 'reroll');
      allowHint = selectedCards.some(card => card.effect && card.effect.type === 'hint');
      allowTime = selectedCards.some(card => card.effect && card.effect.type === 'time_extend');
      usedEffects = { reroll: false, hint: false, time: false };
      timer = 30;
      if (allowTime) timer += 10;
      nextQuestion();
      startTimer();
      renderEffectBtns();
    }

    function nextQuestion() {
      currentQ = questions[Math.floor(Math.random() * questions.length)];
      document.getElementById('question').textContent = currentQ.q;
      document.getElementById('answerInput').value = '';
    }

    function startTimer() {
      document.getElementById('timer').textContent = '?оҳүоһІеҡ—? + timer + ' иқҳ?;
      timerId = setInterval(() => {
        timer--;
        document.getElementById('timer').textContent = '?оҳүоһІеҡ—? + timer + ' иқҳ?;
        if (timer <= 0) {
          clearInterval(timerId);
          endGame(false, '?оҝң??е Ҷ?');
        }
      }, 1000);
    }

    function renderEffectBtns() {
      const effectDiv = document.getElementById('effectBtns');
      effectDiv.innerHTML = '';
      if (allowReroll) {
        const btn = document.createElement('button');
        btn.className = 'effect-btn';
        btn.textContent = '?? ?пҡҳп’ҳжҶҝп—јоӯ–';
        btn.disabled = usedEffects.reroll;
        btn.onclick = function() {
          if (!usedEffects.reroll) {
            nextQuestion();
            usedEffects.reroll = true;
            btn.disabled = true;
          }
        };
        effectDiv.appendChild(btn);
      }
      if (allowHint) {
        const btn = document.createElement('button');
        btn.className = 'effect-btn';
        btn.textContent = '?о—„ жҶҝп—јоӯ–?о“җе…§';
        btn.disabled = usedEffects.hint;
        btn.onclick = function() {
          if (!usedEffects.hint) {
            alert('?о“җе…§еҡ—? + currentQ.a);
            usedEffects.hint = true;
            btn.disabled = true;
          }
        };
        effectDiv.appendChild(btn);
      }
      if (allowTime) {
        const btn = document.createElement('button');
        btn.className = 'effect-btn';
        btn.textContent = '????0иқҳ?;
        btn.disabled = usedEffects.time;
        btn.onclick = function() {
          if (!usedEffects.time) {
            timer += 10;
            document.getElementById('timer').textContent = '?оҳүоһІеҡ—? + timer + ' иқҳ?;
            usedEffects.time = true;
            btn.disabled = true;
          }
        };
        effectDiv.appendChild(btn);
      }
    }

    document.getElementById('submitBtn').onclick = function() {
      const ans = document.getElementById('answerInput').value.trim().toLowerCase();
      if (ans === currentQ.a) {
        clearInterval(timerId);
        endGame(true, 'иқ‘оқӮ?йҲӯпү–?');
      } else {
        alert('иқ‘оқҶп—„йҲӯпү–??пҡҡеІ«йҠқВҖз”ҲвҲҙ?');
      }
    };

    function endGame(success, msg) {
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = '';
      let effectList = selectedCards.map(card => card.zh + (card.effect ? 'еҡ—? + card.effect.description + 'еҡ—? : '')).join('<br>');
      document.getElementById('result').innerHTML =
        (success ? '?? ' : '?оҘі ') + msg + '<br><br>' +
        '?зҘҶжҙ»йӣҝиј»оң…?вҲ ?еҡ—?br>' + effectList;
    }
  </script>
</body>
</html>
