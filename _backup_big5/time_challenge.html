<body>
  <!-- ж’Ңиҷ«?й–«?TopBarеҡ—о«ҙпјҠиқ·з®ё??оёӮоһІ + йӨҲоқӮ?иқәеҲ»ж‘©??-->

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ?оіҮ??оўҖо·Ҹ?пҺҲй ӮиқҜ?
      if (typeof SoundSystem !== 'undefined') {
        SoundSystem.speech.init();
      }
      
      // йңҲВҖ??URL ?пҒ¶оһІеҡ—оӘҸook, mode (mode йҠқпҡ–иқҷ?е…¶?йқҪоіү?йҡһд»ҝоҰғ?жҫҶоҸ·?еӯө?йҠқВҖ??
      const params = new URLSearchParams(location.search);
      const bookName = params.get('book');
      if (!bookName) {
        alert('?пҒ¶оһІ?иҲӘзӮҠеҡ—о«Іж’©ж’ ?book??);
        history.back();
      }
      document.getElementById('backToBook').href = `book_edit.html?book=${encodeURIComponent(bookName)}`;

      // ===== ?оёӮ?й–®пҺҮоһІ ?оіҮ???=====
      const starDom = document.getElementById('totalStarsCount');
      const raw = localStorage.getItem('totalStars');
      let totalStars = 0;
      if (raw !== null) {
        const parsed = parseInt(raw, 10);
        totalStars = isNaN(parsed) ? 0 : parsed;
      }
      starDom.textContent = totalStars;

      // ===== йңҲВҖ?оЎјоЎ…ж‘®оӨҡоҜұ =====
      const vocab = JSON.parse(localStorage.getItem('book_' + bookName) || '[]');
      if (!Array.isArray(vocab) || vocab.length < 4) {
        alert('з”Үж–ҮоЎ…ж‘®оӨҡоҜұ?е–і??ВҖй–¬?4 иқ‘пүӢиӘ‘йҠқп“ҖоЎ…ж‘®оӨҡ??иіЎВҖи„°??о“Ҹ?иқ‘оқҶ???);
        history.back();
      }

      // йҠҙпӢ¬ЛҠжҶҝп—әжҫҲйҠқйҳЎоӘіз’ҲоёӮ?ж‘Ё?
      let questionPool = [...vocab];
      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }
      shuffle(questionPool);
      // ?иҠё???0жҶҝ?
      if (questionPool.length > 20) {
        questionPool = questionPool.slice(0, 20);
      }

      let currentQuestion = null;
      let choicesArr = [];
      let timeLeft = 10;
      let timerId = null;
      let totalQuestions = questionPool.length;
      let currentIndex = 0;
      let isProcessingAnswer = false; // ?и„«иҝ«?пҡҡ?жҡәоөҘ?
      
      // ===== ?е•Ј?еҡ—о«ҙ??и„©??п• и•ӯй ©?=====
      let gameStats = {
        correctCount: 0,
        totalAnswered: 0,
        consecutiveCorrect: 0, // ???иқ‘оқӮ?з”ҲвҠҘоһІ
        fastestAnswer: Infinity, // ?ВҖж•№жҖҺ?жҶҝп—»???
        slowestAnswer: 0, // ?ВҖ?пј№?жҶҝп—»???
        totalTimeUsed: 0, // иқ®иіңоң…??
        perfectAnswers: 0, // ж‘°п—ј?иқ‘оқҶ?з”ҲвҠҘоһІеҡ—?иқҳоҳҲп…ұиқ‘оқӮ?еҡ—?
        streakBonus: 0 // ????оҺ”п”ӯиққиҲҗ?
      };

      const timerEl = document.getElementById('timer');
      const questionTextEl = document.getElementById('questionText');
      const choicesEl = document.getElementById('choices');
      const feedbackEl = document.getElementById('feedback');
      const pronounceRow = document.getElementById('pronounceRow');

      // ===== ?е•Ј?еҡ—о«ұ??оёғ??иҸ”?иқһоӨҷпӢҒ??=====
      function calculateStarReward(isCorrect, answerTime, consecutiveCount, previousConsecutiveCount) {
        if (!isCorrect) return 0;
        
        let baseReward = 1; // ?з®Ү??оҺ”п”ӯ
        
        // ?оҝң??оҺ”п”ӯеҡ—о«і?ж•№жҖҺ?ж’ пҡҷ??иҸ”?жҶӯ?
        if (answerTime <= 3) {
          baseReward += 2; // 3иқҳоҳҲп…ұ +2??
        } else if (answerTime <= 5) {
          baseReward += 1; // 5иқҳоҳҲп…ұ +1??
        }
        
        // ????оҺ”п”ӯеҡ—о«°оҸ¶?еҲё??е”іоЎҮ?п„–ВҖ???п—ј?иқЈо•¬?иқҜиҷ«??оҺ”п”ӯ
        let comboBonus = 0;
        if (consecutiveCount >= 5 && previousConsecutiveCount < 5) {
          comboBonus = 3; // ж“җоЎҪжҙ»?оқӮпҚ‘5??? +3??
        } else if (consecutiveCount >= 3 && previousConsecutiveCount < 3) {
          comboBonus = 2; // ж“җоЎҪжҙ»?оқӮпҚ‘3??? +2??
        } else if (consecutiveCount >= 2 && previousConsecutiveCount < 2) {
          comboBonus = 1; // ж“җоЎҪжҙ»?оқӮпҚ‘2??? +1??
        }
        
        // ?жЎҖ???жјІ?оҺ”п”ӯеҡ—о«ұо№І?о«°оЎ…ж‘®оӨқоһұж‘ЁиЎЈзӯ–йҲӯпҺҠ?жҶӯоЎҫ???
        if (currentQuestion.word.length >= 8) {
          baseReward += 1; // ?з‘•оЎ…ж‘®оӨқ?жҶӯоЎҫ???
        }
        
        // ?жЎҖ??зҘҮ??п•ҹ???
        if (bookName.includes('?оҰё?') || bookName.includes('TOEFL')) {
          baseReward += 1; // ?оҰё??жЎҖ?жҶҝпҡ—??оҺ”п”ӯ
        } else if (bookName.includes('?жңӣзӮҺ') || bookName.includes('GEPT')) {
          baseReward += 1; // ?жңӣзӮҺ?жЎҖ?жҶҝпҡ—??оҺ”п”ӯ
        }
        
        return baseReward + comboBonus;
      }
      
      // ===== ?е•Ј?еҡ—о«ҙпјҠиқ·з®Ү??иҗ„???=====
      function showRewardAnimation(starsEarned, reason = '') {
        const rewardDiv = document.createElement('div');
        rewardDiv.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: linear-gradient(135deg, rgba(255, 215, 0, 0.95), rgba(255, 170, 0, 0.95));
          color: #000;
          padding: 20px 30px;
          border-radius: 15px;
          font-size: 1.5rem;
          font-weight: bold;
          z-index: 1000;
          box-shadow: 0 0 30px #ffd700;
          animation: rewardPop 1.2s ease-out forwards;
          font-family: 'Orbitron', sans-serif;
          text-align: center;
          min-width: 300px;
        `;
        
        let reasonText = '';
        if (reason) {
          reasonText = `<div style="font-size: 1rem; margin-top: 8px; color: #666;">${reason}</div>`;
        }
        
        rewardDiv.innerHTML = `
          <div style="font-size: 3rem; margin-bottom: 10px;">жҪғ?/div>
          <div style="font-size: 1.8rem; margin-bottom: 5px;">+${starsEarned} ?оёӮ?</div>
          ${reasonText}
        `;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes rewardPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(rewardDiv);
        
        // ?еүңоңӣ?оёӮ??е–®?
        if (typeof StarRewardSystem !== 'undefined') {
          StarRewardSystem.playStarSound();
        }
        
        // 1.2иқҳоҳҲ?иқҳй§ҒоЁ’
        setTimeout(() => {
          if (document.body.contains(rewardDiv)) {
            document.body.removeChild(rewardDiv);
          }
          if (document.head.contains(style)) {
            document.head.removeChild(style);
          }
        }, 2500);
      }
      
      // ===== ?е•Ј?еҡ—о«ҙпјҠиқ·зІ№ВҖ???о«Іо·Ғ =====
      function showComboNotification(comboCount) {
        if (comboCount < 2) return;
        
        const comboDiv = document.createElement('div');
        comboDiv.style.cssText = `
          position: fixed;
          top: 20%;
          left: 50%;
          transform: translateX(-50%);
          background: linear-gradient(135deg, rgba(255, 69, 0, 0.9), rgba(255, 140, 0, 0.9));
          color: #fff;
          padding: 15px 25px;
          border-radius: 25px;
          font-size: 1.2rem;
          font-weight: bold;
          z-index: 1000;
          box-shadow: 0 0 20px #ff4500;
          animation: comboSlide 0.8s ease-out forwards;
          font-family: 'Orbitron', sans-serif;
        `;
        
        let comboText = '';
        let comboIcon = '';
        
        if (comboCount >= 5) {
          comboText = `${comboCount} ???еҡ—оҪҶ???вҠҘоһҜ???еҡ—о»ҳ;
          comboIcon = '?оңӮ';
        } else if (comboCount >= 3) {
          comboText = `${comboCount} ???еҡ—ојёоӘ¬ й һпҶҜж’Ҙ???еҡ—о»ҳ;
          comboIcon = '??;
        } else {
          comboText = `${comboCount} ???еҡ—ојёоҜӯ ????п•қ?еҡ—о»ҳ;
          comboIcon = '??;
        }
        
        comboDiv.innerHTML = `${comboIcon} ${comboText} ${comboIcon}`;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes comboSlide {
            0% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            50% { transform: translateX(-50%) translateY(0); opacity: 1; }
            100% { transform: translateX(-50%) translateY(0); opacity: 0; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(comboDiv);
        
        // ?еүңоңӣ????е–®?
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          
          oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
          oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.1);
          oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.2);
          
          gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
          
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.3);
        } catch (e) {
          // жҶ’оҝҷ??е–®?APIйҠқпҡ—оҸ»?еүҒ??о°®??оҹЎ?
        }
        
        // 2иқҳоҳҲ?иқҳй§ҒоЁ’
        setTimeout(() => {
          if (document.body.contains(comboDiv)) {
            document.body.removeChild(comboDiv);
          }
          if (document.head.contains(style)) {
            document.head.removeChild(style);
          }
        }, 2000);
      }

      function saveStars() {
        localStorage.setItem('totalStars', totalStars);
      }

      function speak(text, lang = 'en-US') {
        if (!text) return;
        // йӣҝиј»оң…?е•Ғ??жҪ®о·ҸиқҹйӨҢзөһ
        SoundSystem.speech.speakWord(text);
      }

      // ?пј№??еңҲ?
      function loadQuestion() {
        if (questionPool.length < 1) {
          // ====== ?е•Ј?еҡ—о«ұ?ж’ жўҒй ӮиқҜжўўВҖ?? ======
          updateTimeChallengeAchievements();
          
          // ====== ?е•Ј?еҡ—о«ҙпјҠиқ·зІ№??и„©иңҮиқҜ?======
          showGameSummary();
          
          setTimeout(() => {
            location.href = `book_edit.html?book=${encodeURIComponent(bookName)}`;
          }, 3000);
          return;
        }
        currentIndex = totalQuestions - questionPool.length + 1;
        document.getElementById('progressBar').textContent = `иқҡ?{currentIndex}жҶҝ?/ ??{totalQuestions}жҶҝп–—;
        currentQuestion = questionPool.pop();
        // жҶҝп—јоӯ–еҡ—о«ҙпјҠиқ·з®„п”©?пӢі??иҲҖоң–?зІ№пјҠиқ·з®ё??оі‘?
        questionTextEl.textContent = currentQuestion.word;
        // ====== ?иҠё??жҪ®о·Ҹ?пҗ§??ВҖ ======
        pronounceRow.innerHTML = '';
        const btnEn = document.createElement('button');
        btnEn.innerHTML = '<span style="display:inline-block;transform:translateY(2px);">??</span>';
        btnEn.className = 'speak-btn';
        btnEn.title = '?пҡҡој“';
        btnEn.onclick = () => speak(currentQuestion.word, 'en-US');
        pronounceRow.appendChild(btnEn);
        // ?и„Јп…ҜжҶҝп—јоӯ–?оҝӣпҠ®?оҹЎоЁӘ??
        speak(currentQuestion.word, 'en-US');
        // ====== ?иіҠ? ======
        // ??3 ?п•қеғ•??
        const distractors = [];
        while (distractors.length < 3) {
          const r = vocab[Math.floor(Math.random() * vocab.length)];
          if (r.meaning === currentQuestion.meaning) continue;
          if (distractors.includes(r.meaning)) continue;
          distractors.push(r.meaning);
        }
        choicesArr = [currentQuestion.meaning, ...distractors];
        shuffle(choicesArr);

        // жҶҝиҲҗе…§?пҗ§?
        choicesEl.innerHTML = '';
        choicesArr.forEach(text => {
          const btn = document.createElement('button');
          btn.textContent = text;
          btn.className = 'choice-btn';
          btn.style.background = '#45a29e';
          btn.style.color = '#0b0c10';
          btn.style.border = 'none';
          btn.style.borderRadius = '8px';
          btn.style.padding = '12px 0';
          btn.style.fontSize = '1rem';
          btn.style.fontWeight = 'bold';
          btn.style.cursor = 'pointer';
          btn.style.boxShadow = '0 2px 6px rgba(0,0,0,0.5)';
          btn.style.transition = 'background 0.2s';
          btn.disabled = false; // иқЈз®”??пҗ§??оіҮ??ВҖ?п•ҹоҫӯ?иҲҗоң…
          btn.addEventListener('mouseenter', () => {
            if (!btn.disabled) {
              btn.style.background = '#66fcf1';
            }
          });
          btn.addEventListener('mouseleave', () => {
            if (!btn.disabled) {
              btn.style.background = '#45a29e';
            }
          });
          btn.addEventListener('click', () => handleChoice(text));
          choicesEl.appendChild(btn);
        });

        feedbackEl.textContent = '';
        timeLeft = 10;
        updateTimerDisplay();
        clearInterval(timerId);
        timerId = setInterval(countDown, 1000);
        
        // ===== ?е•Ј?еҡ—о«і??п„”?жҶҝп—ҫ?жҶӘп•һ???=====
        gameStats.questionStartTime = Date.now();
      }

      function updateTimerDisplay() {
        timerEl.textContent = `${timeLeft} иқҳо–Ҙ;
      }

      function countDown() {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(timerId);
          feedbackEl.textContent = `???оҝң??е Ҷ?з”Ү?в…Ўиқ‘оқғ?еҡ—?{currentQuestion.meaning}`;
          
          // ===== ?е•Ј?еҡ—о«і??п„”??иҲҗзөһй–®?=====
          gameStats.totalAnswered++;
          gameStats.consecutiveCorrect = 0; // ?пҡҷи”ӯ???
          
          // ж’ұең’ојҲ 1 иқҳоҳҢВҖи„–?йҠқВҖжҶҝ?
          setTimeout(() => {
            loadQuestion();
          }, 1000);
        } else {
          updateTimerDisplay();
        }
      }

      function handleChoice(selected) {
        // ?и„«иҝ«?пҡҡ?жҡәоөҘ?
        if (isProcessingAnswer) {
          return;
        }
        
        isProcessingAnswer = true;
        clearInterval(timerId);
        
        // ===== ?оЎј??ВҖ?пҗӨ???=====
        const allButtons = choicesEl.querySelectorAll('.choice-btn');
        allButtons.forEach(btn => {
          btn.disabled = true;
          btn.style.background = '#555';
          btn.style.color = '#aaa';
          btn.style.cursor = 'not-allowed';
          btn.style.boxShadow = 'none';
        });
        
        // ===== ?е•Ј?еҡ—о«і?иқһоӨӣ?жҶҝп—»???=====
        const answerTime = (Date.now() - gameStats.questionStartTime) / 1000;
        gameStats.totalAnswered++;
        gameStats.totalTimeUsed += answerTime;
        
        if (selected === currentQuestion.meaning) {
          // ===== ?е•Ј?еҡ—о«І?ж’ пҡӣ?й ӣ?=====
          gameStats.correctCount++;
          const previousConsecutiveCount = gameStats.consecutiveCorrect;
          gameStats.consecutiveCorrect++;
          
          // ?ж№”оЎҮ?ВҖж•№??ВҖ?пј№?жҶҝп—»???
          if (answerTime < gameStats.fastestAnswer) {
            gameStats.fastestAnswer = answerTime;
          }
          if (answerTime > gameStats.slowestAnswer) {
            gameStats.slowestAnswer = answerTime;
          }
          
          // з‘јпјёо·Ғ?иҮ¬о’Ҹ?з®Ҹ?иқўоҺ–?жҶҝпҳ„?5иқҳоҳҲп…ұиқ‘оқӮ?еҡ—?
          if (answerTime <= 5) {
            gameStats.perfectAnswers++;
          }
          
          // й–®пҺҲ??оёӮ??оҺ”п”ӯ
          const starsEarned = calculateStarReward(true, answerTime, gameStats.consecutiveCorrect, previousConsecutiveCount);
          
          // йӣҝиј»оң…иқҜжӣ№??п„“??оёғй ӮиқҜ?
          if (typeof StarRewardSystem !== 'undefined') {
            StarRewardSystem.addStars(starsEarned);
          } else {
            totalStars += starsEarned;
            saveStars();
          }
          
          // ?ж№”оЎҮжҶҝиҲҗе…§
          starDom.textContent = parseInt(localStorage.getItem('totalStars') || '0');
          
          // жҶҝиҲҗе…§?оҺ”п”ӯ?оҹЎоһҘ
          let reasonText = '';
          if (answerTime <= 3) {
            reasonText = '??й һпҶҜзҝ°?оёғ?жҶҝпҳ„?';
          } else if (answerTime <= 5) {
            reasonText = '?оҚһ ж•№жҒҚВҖоёғ?жҶҝпҳ„?';
          }
          
          // з‘јпјёо·Ғ?иҮ¬о’Ҹ?оқӮпҚ‘?е•Ғ?????п—ј?иқЈ?
          if (gameStats.consecutiveCorrect >= 5 && previousConsecutiveCount < 5) {
            reasonText += reasonText ? ' + ?оңӮ 5????оҺ”п”ӯеҡ—? : '?оңӮ 5????оҺ”п”ӯеҡ—?;
          } else if (gameStats.consecutiveCorrect >= 3 && previousConsecutiveCount < 3) {
            reasonText += reasonText ? ' + ??3????оҺ”п”ӯеҡ—? : '??3????оҺ”п”ӯеҡ—?;
          } else if (gameStats.consecutiveCorrect >= 2 && previousConsecutiveCount < 2) {
            reasonText += reasonText ? ' + ??2????оҺ”п”ӯеҡ—? : '??2????оҺ”п”ӯеҡ—?;
          }
          
          showRewardAnimation(starsEarned, reasonText);
          
          // жҶҝиҲҗе…§????о«Іо·Ғ
          showComboNotification(gameStats.consecutiveCorrect);
          
          feedbackEl.textContent = '??иқ‘оқӮ?йҲӯпү–?';
          
          // ===== ?е•Ј?еҡ—о«і??п„”?ж’ пҡҷ??жЎҖ? =====
          if (typeof VocabularyAchievementSystem !== 'undefined') {
            VocabularyAchievementSystem.recordCorrectWord(currentQuestion.word, bookName);
          }
          
        } else {
          // ===== ?е•Ј?еҡ—о«І??иҲ«?й ӣ?=====
          gameStats.consecutiveCorrect = 0; // ?пҡҷи”ӯ???
          feedbackEl.textContent = `??иқ‘оқҶп—„йҲӯпү–?з”Ү?в…Ўеҡ—?{currentQuestion.meaning}`;
        }
        
        setTimeout(() => {
          loadQuestion();
          isProcessingAnswer = false; // ?пҡҷи”ӯ?оҹЎ??ВҖ??
        }, 1000);
      }
      
      // ===== ?е•Ј?еҡ—о«ҙпјҠиқ·зІ№??и„©иңҮиқҜ?=====
      function showGameSummary() {
        const accuracy = (gameStats.correctCount / gameStats.totalAnswered * 100).toFixed(1);
        const avgTime = (gameStats.totalTimeUsed / gameStats.totalAnswered).toFixed(1);
        
        const summaryDiv = document.createElement('div');
        summaryDiv.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.9);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 10000;
          backdrop-filter: blur(10px);
        `;
        
        summaryDiv.innerHTML = `
          <div style="
            background: linear-gradient(135deg, rgba(10, 20, 40, 0.95), rgba(20, 40, 80, 0.95));
            border: 3px solid #00ffff;

            max-width: 600px;

          ">
            <div style="font-size: 4rem; margin-bottom: 20px;">??</div>
            <h2 style="color: #00ffff; margin-bottom: 30px; font-size: 2rem;">?оҝң??о•¬пҚ‘ж‘°п—»?еҡ—?/h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${gameStats.correctCount}</div>
                <div style="font-size: 0.9rem; color: #ccc;">иқ‘оқӮ?жҶҝп—»оһІ</div>
              </div>
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${accuracy}%</div>
                <div style="font-size: 0.9rem; color: #ccc;">з”Ү?в…Ў??/div>
              </div>
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${avgTime}s</div>
                <div style="font-size: 0.9rem; color: #ccc;">ж’ҹе–і?иқ‘оқҶ??оҝң?</div>
              </div>
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${gameStats.perfectAnswers}</div>
                <div style="font-size: 0.9rem; color: #ccc;">ж‘°п—ј?иқ‘оқҶ?</div>
              </div>
            </div>
            
            <div style="
              background: linear-gradient(90deg, #ffd700, #ffaa00);
              border-radius: 15px;
              padding: 20px;
              margin: 20px 0;
              color: #000;
              font-weight: bold;
              font-size: 1.3rem;
            ">
              жҪғ??зҘҶжҙ»?и„Ј??оёӮ?еҡ—?{parseInt(localStorage.getItem('totalStars') || '0') - (totalStars - gameStats.correctCount)} жҶҝ?жҪғ?
            </div>
            
            <div style="color: #ccc; font-size: 0.9rem; margin-top: 20px;">
              3иқҳоҳҲ?йӨҲоқӮ??жЎҖ??зҘүжҘҠй ӣиҲ«???..
            </div>
          </div>
        `;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes summaryPop {
            0% { transform: scale(0.2) rotate(-15deg); opacity: 0; }
            50% { transform: scale(1.15) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(summaryDiv);
        
        // жҡәоөҘ??п—»оЁқ?о°®?
        summaryDiv.onclick = function(e) {
          if (e.target === summaryDiv) {
            summaryDiv.remove();
            style.remove();
          }
        };
      }

      // ====== ?е•Ј?еҡ—о«ұ?ж’ жўҒй ӮиқҜеӢ—пӢҒ??======
      function updateTimeChallengeAchievements() {
        // ?ж№”оЎҮ?оҝң??о•¬пҚ‘?п“ҒпҚ“ж‘°п—»?з”ҲвҠҘоһІ
        const timeChallengeGames = parseInt(localStorage.getItem('timeChallengeGamesCompleted') || '0');
        localStorage.setItem('timeChallengeGamesCompleted', timeChallengeGames + 1);
        
        // ?ж№”оЎҮ?п“ҒпҚ“йҠөеҮҪоҗҠиқҜжўҜ?
        const accuracy = (gameStats.correctCount / gameStats.totalAnswered * 100).toFixed(1);
        const avgTime = (gameStats.totalTimeUsed / gameStats.totalAnswered).toFixed(1);
        
        // й–®оҰә??ВҖйӣҝе”ҫвҖқ??
        const bestAccuracy = parseFloat(localStorage.getItem('timeChallengeBestAccuracy') || '0');
        const bestAvgTime = parseFloat(localStorage.getItem('timeChallengeBestAvgTime') || '999');
        
        if (parseFloat(accuracy) > bestAccuracy) {
          localStorage.setItem('timeChallengeBestAccuracy', accuracy);
        }
        if (parseFloat(avgTime) < bestAvgTime) {
          localStorage.setItem('timeChallengeBestAvgTime', avgTime);
        }
        
        // з‘јпјёо·ҒйҠқиЎҢоӯң?е•Ғоӯ ?о°«?ж’ ?
        checkAndUpdateTimeChallengeAchievements();
      }
      
      function checkAndUpdateTimeChallengeAchievements() {
        // з‘јпјёо·Ғ?иҮ¬о’Ҹ?пҗӨоЎҮ?о“ҺеҒң?оқғ?
        const achievements = [
          { id: 'speed_learner', name: 'ж•№жҒҚВҖоёҒйЈӣиқ§оҳӢВҖ?, requirement: 10 },
          { id: 'accuracy_master', name: 'зҡһоЎҫв…ЎжҶӯжү№и‘Ұ', requirement: 20 },
          { id: 'combo_king', name: '???йҠӢп•ҹ?', requirement: 15 }
        ];
        
        const claimed = JSON.parse(localStorage.getItem('claimedAchievements') || '[]');
        
        achievements.forEach(ach => {
          if (claimed.includes(ach.id)) return; // ж’Ңи„©??оҰ¶??оҺ“?
          
          // й–®пҺҲ??о«ҙ??п„–??вҠҘоһІ??
          const fillGames = parseInt(localStorage.getItem('fillGamesCompleted') || '0');
          const cardGames = parseInt(localStorage.getItem('cardGamesCompleted') || '0');
          const quizGames = parseInt(localStorage.getItem('quizGamesCompleted') || '0');
          const spellingGames = parseInt(localStorage.getItem('spellingGamesCompleted') || '0');
          const matchingGames = parseInt(localStorage.getItem('matchingGamesCompleted') || '0');
          const timeChallengeGames = parseInt(localStorage.getItem('timeChallengeGamesCompleted') || '0');
          const totalGames = fillGames + cardGames + quizGames + spellingGames + matchingGames + timeChallengeGames;
          
          if (totalGames >= ach.requirement) {
            // жҶҝиҲҗе…§?о“ҺеҒң?оқғ??о«Іо·Ғ
            showAchievementNotification(ach.name, ach.id);
          }
        });
      }
      
      function showAchievementNotification(achievementName, achievementId) {
        // ?иҗ„йҒЈ?о“ҺеҒң?о«Іо·Ғ
        const notification = document.createElement('div');
        notification.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: linear-gradient(135deg, #ffd700, #ffed4e);
          color: #000;
          padding: 20px 30px;
          border-radius: 15px;
          font-weight: bold;
          font-size: 1.2rem;
          z-index: 10000;
          box-shadow: 0 0 30px #ffd700;
          animation: achievementPop 0.8s cubic-bezier(.68, -0.55, .27, 1.55);
          text-align: center;
          min-width: 300px;
        `;
        
        notification.innerHTML = `
          <div style="font-size: 3rem; margin-bottom: 10px;">??</div>
          <div style="margin-bottom: 5px;">?? ?о“ҺеҒң?оқғ?еҡ—?/div>
          <div style="font-size: 1.1rem;">${achievementName}</div>
          <div style="font-size: 0.9rem; margin-top: 10px; color: #666;">
            ?пҡ—??о“ҺеҒң?ојҝоІ„?оҰ¶??оҺ”п”ӯ
          </div>
        `;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes achievementPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(notification);
        
        // 3иқҳоҳҲ??иҠё?иқҳй§ҒоЁ’
        setTimeout(() => {
          notification.remove();
          style.remove();
        }, 3000);
      }

      loadQuestion();

      // ===== ?оёғеҫҒ?п—»оЁқ?оҹЎоһҘ =====
      const canvas = document.getElementById('stars');
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      const numStars = 200;
      const starsArr = [];

      function Star() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 1.5;
        this.speed = Math.random() * 0.5 + 0.2;
      }
      Star.prototype.update = function() {
        this.x -= this.speed;
        if (this.x < 0) {
          this.x = w;
          this.y = Math.random() * h;
        }
      }
      Star.prototype.draw = function() {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < numStars; i++) {
        starsArr.push(new Star());
      }
      function animate() {
        ctx.clearRect(0, 0, w, h);
        starsArr.forEach(s => {
          s.update();
          s.draw();
        });
        requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      });
    });
  </script>
