<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>?жЎҖ???- Typing Hero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="responsive_enhanced.css">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(to bottom, #000010, #020111);
      color: #fff;
      text-align: center;
    }
    header {
      background: #001122;
      padding: 10px 20px;
      box-shadow: 0 0 10px #0ff4;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #0ff;
    }
    .btn {
      background: #0ff;
      color: #001122;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 8px #0ff;
      font-size: 1rem;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }
    #addForm, #bulkInput {
      background: #001122;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 0 8px #0ff2;
      text-align: left;
    }
    #addForm input, #bulkInput textarea {
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #0ff;
      background: #000822;
      color: #0ff;
      width: 100%;
      box-sizing: border-box;
    }
    #bulkInput textarea {
      height: 100px;
      resize: vertical;
    }
    #addForm button, #bulkInput button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #0ff;
      color: #001122;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    #addForm button:hover, #bulkInput button:hover {
      background: #33ffff;
    }
    #message {
      margin-top: 10px;
      color: #ff6;
      font-size: 1rem;
      min-height: 1.2rem;
    }
    #wordList {
      list-style: none;
      padding: 0;
    }
    #wordList li {
      background: #111;
      border: 2px solid #44f;
      border-radius: 8px;
      margin: 8px 0;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.3s ease-in-out;
      font-size: 1rem;
    }
    #wordList .text {
      text-align: left;
    }
    #wordList .text span {
      display: block;
    }
    #wordList button {
      background: transparent;
      border: none;
      color: #f66;
      font-size: 1.2rem;
      cursor: pointer;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>?? ?жЎҖ???/h1>
    <button class="btn" onclick="location.href='index.html'">?? ?оөЁ???/button>
  </header>

  <main>
    <!-- ?жЎғ??е•Ј? -->
    <section id="addForm">
      <label>?жЎғ??е•Ј?еҡ—?/label>
      <input id="enInput" type="text" placeholder="?жңӣ??жЎҖ?">
      <input id="zhInput" type="text" placeholder="йҠқеүң?иқ§йӨүйҷҢ">
      <button onclick="addWord()">?е•Ј??жЎҖ?</button>
    </section>

    <!-- ?еҜҘ?йһҺжҪ”??иҮ¬п…Ҝ -->
    <section id="bulkInput">
      <label>?еҜҘ?йһҺжҪ”??иҮ¬п…Ҝ?жҫҶ?еҡ—пҺҮ?йҠөп—ёВҖп—Ҫп”©??- йҠқеүң??пҡҳ??п—Ҫп”©??йҠқеүң??пҡЎ?еҡ—?/label>
      <textarea id="bulkTextarea" placeholder="apple - ?п•һ?&#10;space,жҶӯиҠ°еҫҒ"></textarea>
      <button onclick="bulkAddWords()">?еҜҘ??иҮ¬п…Ҝ (йһҺжҪ”?)</button>
    </section>

    <div id="message"></div>
    <ul id="wordList"></ul>
  </main>

  <script>
    let builtInWords = [];

    // й ӣпҗЈп…Ҝ?жү№йҒЈ?жЎҖ?еҡ—пҺҶ??з ҚжӯҮ?пҗҘ?ж’ҳоҗ»?йҠқпҡ—?еҡ—?
    async function loadBuiltIn() {
      try {
        const res = await fetch('quiz.html');
        const text = await res.text();
        const oneline = text.replace(/\r?\n/g, ' ');
        const match = oneline.match(/const\s+vocabData\s*=\s*(\{.*?\});/);
        if (match && match[1]) {
          const objString = match[1];
          const jsonString = objString.replace(/(\w+)\s*:/g, '"$1":').replace(/'/g, '"');
          const vocabData = JSON.parse(jsonString);
          builtInWords = [];
          Object.values(vocabData).forEach(arr => {
            arr.forEach(item => {
              if (item.en) builtInWords.push(item.en.toLowerCase());
            });
          });
        }
      } catch (e) {
        console.error('?вҠҘ?йңҲВҖ??quiz.html ?оЎҝеңҫ?о“Һд»ғ??, e);
      }
    }

    function loadDictionary() {
      return JSON.parse(localStorage.getItem('dictionary') || '[]');
    }
    function saveDictionary(dict) {
      try {
        localStorage.setItem('dictionary', JSON.stringify(dict));
      } catch (e) {
        console.error('?и„Ј? dictionary жҶӯжңӣ?', e);
        throw e;
      }
    }

    function renderList() {
      const listEl = document.getElementById('wordList');
      listEl.innerHTML = '';
      const dict = loadDictionary();
      dict.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <div class="text">
            <span><strong>EN:</strong> ${item.en}</span>
            <span><strong>йҠқ?</strong> ${item.zh}</span>
          </div>
          <button onclick="removeWord(${index})">??/button>
        `;
        listEl.appendChild(li);
      });
    }

    function showMessage(msg, isError = false) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = msg;
      msgDiv.style.color = isError ? '#f55' : '#6f6';
      setTimeout(() => { msgDiv.textContent = ''; }, 3000);
    }

    // ?жЎғ??е•Ј?еҡ—о«ұоЎҮжҶ“оөӨ??о“Һ??о«Іо·Ғ atlas ?ж№”оЎҮеҡ—пҺ…??еӯөо·–?з Қ??иёқ??пҶҜ??о«Іо·Ғеҡ—?
    function addWord() {
      const enInput = document.getElementById('enInput');
      const zhInput = document.getElementById('zhInput');
      const en = enInput.value.trim();
      const zh = zhInput.value.trim();
      if (!en || !zh) return;

      const dict = loadDictionary();
      const lowerEn = en.toLowerCase();
      if (builtInWords.includes(lowerEn)) {
        showMessage('??з”Үж–ҮоЎ…ж‘®оӨҷжӯҮ?з®Үй ӮиқҜеӢ—п…ұж’ұ?, true);
        return;
      }
      const existIdx = dict.findIndex(item => item.en.toLowerCase() === lowerEn);
      if (existIdx !== -1) {
        showMessage('??з”Үж–ҮоЎ…ж‘®оӨҷжӯҮж‘®оҰ¶оҜӯ?жҫҶоЎ…ж‘®оӨҡоҜұйҠқ?, true);
        return;
      }

      dict.push({ en, zh });
      try {
        saveDictionary(dict);
      } catch (e) {
        showMessage('???и„Ј?жҶӯжңӣ?еҡ—п—Ҫ?з‘јпјёо·Ғ localStorage иқӣзІ№?', true);
        return;
      }
      enInput.value = '';
      zhInput.value = '';
      renderList();
      showMessage('??ж’Ңи„«??оёӮоЎҮжҶ“?);

      // ?о«Іо·Ғ atlas ?ж№”оЎҮ
      localStorage.setItem('dictionary_lastUpdate', Date.now());

      // жҶ’оҝң??иҠё?й қ?atlasеҡ—п—әоҸ»?еҶҪиҝЁ?оәқ?еҡ—?
      // setTimeout(() => { location.href = 'atlas.html'; }, 500);
    }

    // ?еҜҘ?йһҺжҪ”??иҮ¬п…Ҝеҡ—о«ұоЎҮжҶ“оөӨ??о“Һ??о«Іо·Ғ atlas ?ж№”оЎҮ
    function bulkAddWords() {
      const raw = document.getElementById('bulkTextarea').value.trim();
      if (!raw) {
        showMessage('??йҡўп• зҘЁ?дәҷп…ұж‘°?, true);
        return;
      }
      const lines = raw.split(/\r?\n/);
      const parsed = [];
      lines.forEach(line => {
        if (!line.trim()) return;
        let idx = line.indexOf('-');
        if (idx === -1) {
          idx = line.indexOf(',');
        }
        if (idx === -1) return;
        const en = line.slice(0, idx).trim();
        const zh = line.slice(idx + 1).trim();
        if (!en || !zh) return;
        parsed.push({ en, zh });
      });

      if (parsed.length === 0) {
        showMessage('??йһҺжҫҶп…Ҝ?жҫҶ??иҲӘзӮҠеҡ—о®‘??п—Ҫп”©??- йҠқеүң??пҡҳ??п—Ҫп”©??йҠқеүң???, true);
        return;
      }

      // ?о“‘жұ— confirmеҡ—пҺҠпјҠиқ·з®Ҹ? 20 иқ‘пү–?
      let previewStr = `ж’ пӢ©п—„?д№©иӘ‘йҠқ?${parsed.length} иқ‘пүҢоЎ…ж‘®оӨЈ?\n`;
      const showN = Math.min(parsed.length, 20);
      for (let i = 0; i < showN; i++) {
        previewStr += `${i + 1}. ${parsed[i].en} - ${parsed[i].zh}\n`;
      }
      if (parsed.length > showN) {
        previewStr += `?дҪ—??п„“? ${parsed.length - showN} иқ‘пүҚоҜҜ?оӨҷпҠҫеҡ—пҺјn`;
      }
      previewStr += 'иқЈз®Ҹ?й–¬ојҪеҢұиқҘп—ә?еҡ—?;
      if (!confirm(previewStr)) return;

      const dict = loadDictionary();
      let added = 0, replaced = 0;
      parsed.forEach(obj => {
        const lowerEn = obj.en.toLowerCase();
        if (builtInWords.includes(lowerEn)) return;
        const existIdx = dict.findIndex(item => item.en.toLowerCase() === lowerEn);
        if (existIdx !== -1) {
          const doOv = confirm(`??{obj.en}?пҡ—жӯҮж‘®оҰ¶оҜӯеҡ—п—»?иқЈз®Ҹ?й–¬пүҸ?еҡ—п—»??оЎҪ??д»ҝ??оҪө);
          if (doOv) {
            dict[existIdx].zh = obj.zh;
            replaced++;
          }
        } else {
          dict.push({ en: obj.en, zh: obj.zh });
          added++;
        }
      });

      try {
        saveDictionary(dict);
      } catch (e) {
        showMessage('???и„Ј?жҶӯжңӣ?еҡ—п—Ҫ?з‘јпјёо·Ғ localStorage иқӣзІ№?', true);
        return;
      }
      renderList();
      showMessage(`??ж’Ңи„«оЎҮжҶ“?${added} иқ‘пү–?й–¬пүҸ? ${replaced} иқ‘пҮ©);

      // ?о«Іо·Ғ atlas ?ж№”оЎҮ
      localStorage.setItem('dictionary_lastUpdate', Date.now());

      document.getElementById('bulkTextarea').value = '';
      // жҶ’оҝң??иҠё?й қ?atlasеҡ—п—ә?йҠқп“Ҡ?
      // setTimeout(() => { location.href = 'atlas.html'; }, 500);
    }

    function removeWord(index) {
      const dict = loadDictionary();
      dict.splice(index, 1);
      saveDictionary(dict);
      renderList();
      showMessage('??ж’Ңи„ЈпҚӢ??);

      // ?о«Іо·Ғ atlas ?ж№”оЎҮ (?дәҷпҚӢ?е•ҒеҫҒеҡ—п–ӨyDictionary ?оёғ??пҒ¶?жҶӯ?
      localStorage.setItem('dictionary_lastUpdate', Date.now());
    }

    window.addEventListener('load', async () => {
      await loadBuiltIn();
      renderList();
    });
  </script>
</body>
</html>
