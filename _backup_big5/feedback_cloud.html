    <script>
        let comments = [];
        let lastSyncTime = 0;

        // ?ж№”оЎҮ?п—»йғҠ?ВҖ??        function updateSyncStatus(message, type = 'info') {
            const statusEl = document.getElementById('syncStatus');
            const icons = {
                'info': 'icon-spinner',
                'success': 'icon-check',
                'error': 'icon-exclamation',
                'warning': 'icon-triangle'
            };
            
            statusEl.innerHTML = `<span class="icon ${icons[type]}"></span> ${message}`;
            statusEl.style.color = type === 'success' ? '#28a745' : 
                                  type === 'error' ? '#dc3545' : 
                                  type === 'warning' ? '#ffc107' : '#666';
        }

        // ?ж№”оЎҮиқҜжўҜ?йһҲпӢ¬?
        function updateStats() {
            if (comments.length > 0) {
                const uniqueUsers = [...new Set(comments.map(c => c.author))].length;
                const latestComment = comments[0];
                const latestDate = new Date(latestComment.timestamp).toLocaleDateString('zh-TW');
                
                document.getElementById('totalComments').textContent = comments.length;
                document.getElementById('uniqueUsers').textContent = uniqueUsers;
                document.getElementById('latestTime').textContent = latestDate;
                document.getElementById('stats').style.display = 'flex';
            }
        }

        // ж•ә?Google й–°иЎЈ?йҠөеҲ»??дәҰ?й–®ВҖ
        async function loadFromGoogleSheets() {
            try {
                updateSyncStatus('з”Ү?оҜӯй ӣпҗЈп…Ҝ?и„©еһў?о©–?...', 'info');
                
                const url = "https://docs.google.com/spreadsheets/d/11kMAXtBxLICMUYysPLP1noZzTsjbfXmbRcZSKK8_6cw/gviz/tq?tqx=out:json";
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                
                console.log('Google Sheets ?оёҒ??иұў?:', json);
                
                const rows = json.table.rows;
                console.log('иқ®иіӘ???', rows.length);
                
                if (rows.length > 0) {
                    comments = [];
                    
                    rows.forEach((row, index) => {
                        console.log(`?оҹЎ?иқҡ?${index} йҠө?`, row);
                        console.log('йҠөп—»оһІ??', row.c);
                        
                        if (index === 0) {
                            console.log('й қе–І?з’…о©—?йҠө?);
                            return; // й қе–І?з’…о©—?йҠө?                        }
                        
                        // з‘јпјёо·Ғ?иҮ¬о’Ҹ?пҗӨоһІ??                        if (!row.c || row.c.length === 0) {
                            console.log(`иқҡ?${index} йҠөп—»??пҗӨоһІ?оӘҚ);
                            return;
                        }
                        
                        // ?еҜһ?ж’–йҳЎ?й–°иЎЈ?йҠөеҮҪ?з‘Ҫп•§?A=?оҝң??е”ҫ?, B=йӣҝоә зӯ–ж’ҹжҡё??? C=йӣҝоә ??о©–?, D=йӣҝоә ??пҡ—?
                        let timestamp = '';
                        let message = '';
                        let author = '?иё№??еҶҪпҚ—';
                        let rating = '';
                        
                        // й–«???п„“?йӣҝ?                        if (row.c.length >= 1) timestamp = row.c[0]?.v || '';
                        if (row.c.length >= 2) rating = row.c[1]?.v || '';
                        if (row.c.length >= 3) message = row.c[2]?.v || '';
                        if (row.c.length >= 4) author = row.c[3]?.v || '?иё№??еҶҪпҚ—';
                        
                        console.log('й–«???иұў?:', { timestamp, rating, message, author });
                        
                        // жҶ’оҝҷ?зҳқоҳү??о©–??жү№жҚҶеҡ—п—ҪжӯІ?оҺҳВҖо©–?
                        if (!message && !rating) {
                            console.log(`иқҡ?${index} йҠөп—»??пҗӨ??пҺҶп…ұж‘°е°Қ?й қе–І?`);
                            return;
                        }
                        
                        // ?оҹЎ??дәӨ??жҫҶ?
                        let time;
                        let timestampISO;
                        
                        if (timestamp) {
                            try {
                                // ?оҹЎ? Google Sheets ??Date() ?жҫҶ?
                                // йқҳп•қ?еҡ—о©ұate(2025,6,29,23,53,14)
                                if (timestamp.includes('Date(')) {
                                    const dateMatch = timestamp.match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);
                                    if (dateMatch) {
                                        const [_, year, month, day, hour, minute, second] = dateMatch;
                                        const date = new Date(parseInt(year), parseInt(month), parseInt(day), parseInt(hour), parseInt(minute), parseInt(second));
                                        timestampISO = date.toISOString();
                                        time = date.toLocaleString('zh-TW');
                                    } else {
                                        timestampISO = new Date().toISOString();
                                        time = new Date().toLocaleString('zh-TW');
                                    }
                                } else {
                                    // ?оӨңеІ«?оҹЎ?йҠқеүң??дәӨ??жҫҶ?
                                    // йқҳп•қ?еҡ—?025/7/29 йҠқп•қ? 11:53:15
                                    const dateMatch = timestamp.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(йҠқп“Җ?|йҠқп•қ?)\s+(\d{1,2}):(\d{1,2}):(\d{1,2})/);
                                    if (dateMatch) {
                                        const [_, year, month, day, ampm, hour, minute, second] = dateMatch;
                                        let hour24 = parseInt(hour);
                                        if (ampm === 'йҠқп•қ?' && hour24 !== 12) hour24 += 12;
                                        if (ampm === 'йҠқп“Җ?' && hour24 === 12) hour24 = 0;
                                        
                                        const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day), hour24, parseInt(minute), parseInt(second));
                                        timestampISO = date.toISOString();
                                        time = date.toLocaleString('zh-TW');
                                    } else {
                                        // ?оӨңеІ«?ж№”оҚ”й–«??
                                        const parsedDate = new Date(timestamp);
                                        if (!isNaN(parsedDate.getTime())) {
                                            timestampISO = parsedDate.toISOString();
                                            time = parsedDate.toLocaleString('zh-TW');
                                        } else {
                                            timestampISO = new Date().toISOString();
                                            time = new Date().toLocaleString('zh-TW');
                                        }
                                    }
                                }
                            } catch (error) {
                                console.log('?дәӨ?й–«??жҶӯжңӣ?еҡ—п—№иқҷ?еҮҪоһ°?пҡҳ???', error);
                                timestampISO = new Date().toISOString();
                                time = new Date().toLocaleString('zh-TW');
                            }
                        } else {
                            timestampISO = new Date().toISOString();
                            time = new Date().toLocaleString('zh-TW');
                        }
                        
                        // иқҜп„’??о©–??жү№жҚҶ
                        let fullMessage = '';
                        if (rating && message) {
                            fullMessage = `жҪғ?${rating} - ${message}`;
                        } else if (rating) {
                            fullMessage = `жҪғ?${rating}`;
                        } else {
                            fullMessage = message;
                        }
                        
                        const comment = {
                            id: Date.now() + index,
                            author: author,
                            message: fullMessage,
                            timestamp: timestampISO,
                            time: time
                        };
                        comments.push(comment);
                        console.log('зҳӣйӨғ??о©–?:', comment);
                    });
                    
                    console.log('иқ®иіўп…»й–«???е•Ғ?й–®ВҖ??', comments.length);
                    console.log('?ВҖ?пҗҘ?й–®ВҖ:', comments);
                    
                    // ?пҗӨ??оҡҘВҖоҳҲ??оҳҲ?
                    comments.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    
                    lastSyncTime = Date.now();
                    updateSyncStatus(`ж’Ңи„Ј?з”Ү?${comments.length} з’Үоіү?й–®ВҖ`, 'success');
                    
                    displayComments();
                    updateStats();
                    return true;
                } else {
                    console.log('зҳқоҳү??жӣүпҚ‘йҡһйўұ?йҠөп—»оһІ??);
                    updateSyncStatus('зҳқоҳү??жӣүпҚ‘?о©–??иұў?', 'warning');
                    displayComments(); // жҶҝиҲҗе…§иқӣз®Ү???                    return false;
                }
            } catch (error) {
                console.error('й ӣпҗЈп…Ҝ Google Sheets ?о©–?жҶӯжңӣ?:', error);
                updateSyncStatus('?и„©еһўй ӣпҗЈп…ҜжҶӯжңӣ?', 'error');
                
                // жҶҝиҲҗе…§?иҲӘзӮҠй–®п“Ғој…
                const listDiv = document.getElementById("commentList");
                listDiv.innerHTML = `
                    <div class="error">
                        <span class="icon icon-triangle"></span>
                        <p>й ӣпҗЈп…Ҝ?о©–??оҝҡоЁӘ?оё…п—„йҡӨжӯ№?йҡўп•ҹ?ж•әп—ә?й–°иүҫВҖ?/p>
                        <p style="font-size: 12px; margin-top: 10px;">?иҲӘзӮҠй–°е–®?: ${error.message}</p>
                    </div>
                `;
                return false;
            }
        }

        // жҶҝиҲҗе…§?о©–?
        function displayComments() {
            const listDiv = document.getElementById("commentList");
            listDiv.innerHTML = "";
            
            if (comments.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-state">
                        <span class="icon icon-slash"></span>
                        <p>?жЎҖ??п„“??пҗҘ?й–®ВҖеҡ—п—№??е—ҘжҙөйҠқВҖ?п•ҹ?й–®ВҖ?п„‘зҠ–?ж”№?</p>
                    </div>
                `;
                return;
            }
            
            comments.forEach(comment => {
                const div = document.createElement("div");
                div.className = "comment-item";
                
                div.innerHTML = `
                    <div class="comment-header">
                        <span class="comment-author">
                            <span class="icon icon-user"></span> ${comment.author}
                        </span>
                        <span class="comment-time">${comment.time}</span>
                    </div>
                    <div class="comment-content">
                        <span class="icon icon-comment"></span> ${comment.message}
                    </div>
                `;
                
                listDiv.appendChild(div);
            });
        }

        // ?ојҝоІ„й ӣпҗЈп…Ҝ?оҝҳ?жҶӘп•қ?
        async function initialize() {
            // й ӣпҗЈп…Ҝ?и„©еһў?о©–?
            await loadFromGoogleSheets();
            
            // зҳҘ??пүҗ??иҠё??п—»йғҠйҠқВҖз”Ҳ?            setInterval(loadFromGoogleSheets, 5 * 60 * 1000);
        }
