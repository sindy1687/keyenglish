        // 閮???蝯梯?鞈?
        function calculateStarsStatistics() {
            if (!leaderboardData || leaderboardData.length === 0) {
                document.getElementById('averageStars').textContent = '0';
                document.getElementById('highestStars').textContent = '0';
                document.getElementById('lowestStars').textContent = '0';
                return;
            }
            
            const starsArray = leaderboardData.map(item => item.stars || 0);
            const totalStars = starsArray.reduce((sum, stars) => sum + stars, 0);
            const averageStars = Math.round(totalStars / starsArray.length);
            const highestStars = Math.max(...starsArray);
            const lowestStars = Math.min(...starsArray);
            
            document.getElementById('averageStars').textContent = averageStars;
            document.getElementById('highestStars').textContent = highestStars;
            document.getElementById('lowestStars').textContent = lowestStars;
        }
