    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H;
    let stars = [];
    const numStars = 100;

    function initCanvas() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      stars = [];
      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          size: Math.random() * 1.5 + 0.5,
          speed: Math.random() * 0.5 + 0.2
        });
      }
    }

    function updateStars() {
      stars.forEach(s => {
        s.y += s.speed;
        if (s.y > H) {
          s.y = 0;
          s.x = Math.random() * W;
        }
      });
    }

    function drawStars() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#ffffff';
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function animate() {
      updateStars();
      drawStars();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initCanvas);

            word: parts[0]?.trim() || '',

          <div style="text-align: center; margin: 20px 0;">

              <span id="importProgress">0</span> / <span id="totalLines">0</span> йҠө?            </div>
            <div style="width: 100%; height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden;">
              <div id="progressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00ffff, #a259ff); transition: width 0.3s;"></div>
            </div>
          </div>
          <div id="importStatus" style="text-align: center; color: #c5c6c7; font-size: 0.9rem;">
            з”Ү?оҜӯйңҲВҖ?оЎҪ?зҚў?..
          </div>
        </div>
      `;
      document.body.appendChild(progressModal);
      
      // ?оӨңеІ«жҶӯо«Іи»ҠиқәеҮҪв…Ј?жҫҶ?йқҳпүҸеңҫзҳҷз®”и‘ү?пӢЁ?иқЈжҫҶ?жҶҝ?      const tryEncoding = (encoding) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsText(file, encoding);
        });
      };
      
      // ?пҗЈпғ—?пҺҠ?ж‘Ёоҗұ?й–°иҷ«??п—јжҘҠиқЈ?      const encodings = ['utf-8', 'big5', 'gbk', 'gb2312', 'utf-16'];
      
      Promise.any(encodings.map(encoding => tryEncoding(encoding)))
        .then(text => {
          // иқҳй§ҒоЁ’ BOM з’…о©–?
          text = text.replace(/^\uFEFF/, '');
          
          const lines = text.split('\n').filter(l => l.trim());
          const totalLines = lines.length;
          let importedCount = 0;
          let skippedCount = 0;
          let duplicateCount = 0;
          
          // ж’ұз®Ү??жҡ№??жЎҖ???Set йҡһдәҷ??оёӮо·Ғй–°пҪҮ?йҠқпҡ—?жҶӯжү№?ж’–жҒ¬?
          const existingWords = new Set(vocab.map(v => v.word.toLowerCase()));

          // ?ж№”оЎҮиқ®иіӘ???          document.getElementById('totalLines').textContent = totalLines;
          document.getElementById('importStatus').textContent = 'з”Ү?оҜӯй–«???жЎҖ?йһҲпӢӘ?...';
          
          // ?еҜһжҙ»?оҹЎ?еҡ—п—ҫој•?пҡӣоҰҢжҶӣоі¶I
          const batchSize = 100;
          const processBatch = (startIndex) => {
            const endIndex = Math.min(startIndex + batchSize, totalLines);
            
            for (let i = startIndex; i < endIndex; i++) {
              const line = lines[i];
              let word, meaning, example, exampleMeaning;
              
              // ?оӨңеІ«йҠқпҡ—??п„’??оқ„жіө?оёӮо№өж’ҳ?              if (line.includes(',')) {
                // CSV ?жҫҶ?еҡ—оӘӨord,meaning,example,exampleMeaning
                const parts = line.split(',').map(s => s.trim());
                if (parts.length >= 4) {
                  [word, meaning, example, exampleMeaning] = parts;
                } else if (parts.length === 3) {
                  [word, meaning, example] = parts;
                  exampleMeaning = '';
                }
              } else if (line.includes('еҡ—?)) {
                // йҠқеүң??оҳӢ??жҫҶ?еҡ—оӘӨordеҡ—оӘҡeaningеҡ—оӘ’xampleеҡ—оӘ’xampleMeaning
                const parts = line.split('еҡ—?).map(s => s.trim());
                if (parts.length >= 4) {
                  [word, meaning, example, exampleMeaning] = parts;
                } else if (parts.length === 3) {
                  [word, meaning, example] = parts;
                  exampleMeaning = '';
                }
              } else if (line.includes(':')) {
                // ?жңӣ??оҳӢ??жҫҶ?еҡ—оӘӨord:meaning:example:exampleMeaning
                const parts = line.split(':').map(s => s.trim());
                if (parts.length >= 4) {
                  [word, meaning, example, exampleMeaning] = parts;
                } else if (parts.length === 3) {
                  [word, meaning, example] = parts;
                  exampleMeaning = '';
                }
              } else if (line.includes('\t')) {
                // Tab ?пүҗ??жҫҶ?еҡ—оӘӨord\tmeaning\texample\texampleMeaning
                const parts = line.split('\t').map(s => s.trim());
                if (parts.length >= 4) {
                  [word, meaning, example, exampleMeaning] = parts;
                } else if (parts.length === 3) {
                  [word, meaning, example] = parts;
                  exampleMeaning = '';
                }
              } else if (line.includes(' ')) {
                // иқӣз®ёо№ө?пүҗ??жҫҶ?еҡ—оӘӨord meaning example exampleMeaning
                const parts = line.split(' ');
                if (parts.length >= 4) {
                  word = parts[0];
                  meaning = parts[1];
                  example = parts[2];
                  exampleMeaning = parts.slice(3).join(' ');
                } else if (parts.length === 3) {
                  word = parts[0];
                  meaning = parts[1];
                  example = parts[2];
                  exampleMeaning = '';
                }
              }
              
              // жҶ’оҝҷ??о“Һ?й–«??йҠқоқӮ?й–¬ојј?йӣҝпҡӣпҒҚ?пҗЈВҖжҪҳ??пӢӘоЎҮжҶ“оөӨоЎ…ж‘®?              if (word && meaning && example) {
                // з‘јпјёо·Ғ?иҮ¬о’Ҹ?пҡҡ?еҡ—пҺ…??пүҢд№Ӣж’ оҗұзҘһеҡ—?                if (!existingWords.has(word.toLowerCase())) {
                  vocab.push({ 
                    word: word, 
                    meaning: meaning, 
                    example: example, 
                    exampleMeaning: exampleMeaning || '' 
                  });
                  // ж’ пӢӘоЎҮ?жЎҖ??оәһп…Ҝ Setеҡ—п—№иӘ‘?оҹЎ?з‘јоқғ??жҠ’??пҡҡ?
                  existingWords.add(word.toLowerCase());
                  importedCount++;
                } else {
                  duplicateCount++;
                }
              } else {
                skippedCount++;
              }
            }
            
            // ?ж№”оЎҮ?и„ЈжјІ
            const progress = Math.min(endIndex, totalLines);
            const progressPercent = (progress / totalLines) * 100;
            document.getElementById('importProgress').textContent = progress;
            document.getElementById('progressBar').style.width = progressPercent + '%';
            
            // жҶ’оҝҷ??п„“??жёё?йҠөп—Ҫ??оҹЎ?еҡ—п—јеҢұиқҘп—»пҸ·з”ҲвҲҹ???            if (endIndex < totalLines) {
              document.getElementById('importStatus').textContent = `з”Ү?оҜӯ?оҹЎ?иқҡ?${progress} йҠө?..`;
              setTimeout(() => processBatch(endIndex), 10); // ?еүңоӘ¶ж’ұең’ојҲ?иё№??йӨғ?UI
            } else {
              // ж‘°п—»??оҹЎ?
              document.getElementById('importStatus').textContent = 'з”Ү?оҜӯ?и„Ј?йһҲпӢӘ?...';
              
              setTimeout(() => {
                saveVocab();
                displayWords();
                
                // иқҳй§ҒоЁ’?и„ЈжјІй–¬оЎҫ?
                document.body.removeChild(progressModal);
                
                // жҶҝиҲҗе…§иқҜо“Ҹ?
                let resultMessage = `???о“Һ??иҮ¬п…Ҝ ${importedCount} ?п•қоЎ…ж‘®оў¶;
                if (duplicateCount > 0) {
                  resultMessage += `\n?? ж’Ңи„Ји•ӯ??${duplicateCount} ?п•Ў?йҠҙпӢ©оЎ…ж‘®оў¶;
                }
                if (skippedCount > 0) {
                  resultMessage += `\n?оәЁ? ж’Ңи„°жӯІ??${skippedCount} ?п•ҹпғҺ?пҺү?`;
                }
                alert(resultMessage);
                
                // ?иҮ¬п…Ҝ?о“Һ?ж•әп—»?иқӣз®ё?ж’ п•һ?
                clearSearch();
              }, 100);
            }
          };
          
          // ?п•қ??еҜһжҙ»?оҹЎ?
          processBatch(0);
        })
        .catch(error => {
          console.error('з‘јоқғ?йңҲВҖ?оЎјд»ғ??', error);
          document.body.removeChild(progressModal);
          alert('??з‘јоқғ?йңҲВҖ?оЎјд»ғ?оӨЈ?йҡўп•һзӮҺ?дәӨ?зҚўпҺҮо№өж’ҳоҗІ?иқәеҮҪв…Ј');
        });
    }

    function exportCSV() {
      if (vocab.length === 0) return alert('?жЎҖ?зҳқоҳү??иҮ¬п—„?з®Ү??жЎҖ???);
      const csvContent = vocab.map(v => `${v.word},${v.meaning},${v.example},${v.exampleMeaning || ''}`).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${bookName}.csv`;
      link.click();
    }

        // зҳӣйӨғ??еҶҪпҚ—йҲӯоҳҲ?й–«иІҠоЁӘ?е–®??еүңоңӣ
        let hasUserInteracted = false;

            console.log('?? ?еҶҪпҚ—йҲӯоҳҲ?й–«иІҠоЁӘеҡ—п—ҫо·Ҹз’…оҝҡй ӮиқҜеӢ—жӯҮ?оёғоң…');
            
            // жҶ’оҝҷ??пҗҰеәң?еүңоңӣйӣҝпүҗ?зҳқоҳүо—җ?ж©ҳ??оӨңеІ«?еүңоңӣ

        ['click', 'touchstart', 'keydown'].forEach(eventType => {

      // ??ој“?ојҝоІ„?иҲӘ??жүҜ??оўҶ??оҹЎ??е–®??жҖ ?/?пј·е„”
      document.addEventListener('visibilitychange', function() {

              console.log('?ојҝоІ„?пј·е„”?оҝңо·Ҹз’…оҝҷо—җ?жӣүд»ғ??', err);
            });

      });
      
      // ?оіҮ??оЎҝ??е–ҹй ӮиқҜ?      if ('speechSynthesis' in window) {

      // зҳӣйӨғ??иҗҮоӯҢж•№жҖҘпҷ©??      document.addEventListener('keydown', (e) => {
