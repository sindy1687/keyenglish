    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      font-family: 'Exo 2', 'Noto Sans TC', sans-serif; 
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #533483 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ?征? */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #eee, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, #fff, transparent),
        radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 160px 30px, #ddd, transparent);
      background-repeat: repeat;
      background-size: 200px 100px;
      animation: stars 20s linear infinite;
      z-index: -1;
    }

    @keyframes stars {
      from { transform: translateY(0px); }
      to { transform: translateY(-100px); }
    }

    /* 蝎??? */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #00ffff;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
    }

    /* ?啣?嚗???蝺???*/
    .light-rays {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .light-ray {
      position: absolute;
      width: 1px;
      height: 100px;
      background: linear-gradient(to bottom, transparent, rgba(0, 255, 255, 0.3), transparent);
      animation: lightRay 8s linear infinite;
    }

    @keyframes lightRay {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    #announcements { 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .announcement {
      border-left: 4px solid #00ffff;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(15px);
      padding: 25px;
      margin: 25px 0;
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(0, 255, 255, 0.3),
        0 0 60px rgba(0, 255, 255, 0.1),
        inset 0 0 30px rgba(0, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(0);
    }

    .announcement::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
      transition: left 0.6s ease;
    }

    .announcement:hover::before {
      left: 100%;
    }

    .announcement:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 
        0 15px 40px rgba(0, 255, 255, 0.5),
        0 0 80px rgba(0, 255, 255, 0.3),
        inset 0 0 30px rgba(0, 255, 255, 0.15);
    }

    /* ?啣?嚗??脣? */
    .announcement {
      animation: slideInUp 0.6s ease-out;
      animation-fill-mode: both;
    }

    .announcement:nth-child(1) { animation-delay: 0.1s; }
    .announcement:nth-child(2) { animation-delay: 0.2s; }
    .announcement:nth-child(3) { animation-delay: 0.3s; }
    .announcement:nth-child(4) { animation-delay: 0.4s; }
    .announcement:nth-child(5) { animation-delay: 0.5s; }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .? { 
      border-color: #ff4757;

    .? {

    @keyframes borderGlow {

    @keyframes glow {

    .back-btn {

      border-color: rgba(255, 255, 255, 0.4);

    .refresh-btn {

      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
      text-decoration: none;

      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }

    /* 蝘???憌曉?蝝?*/
    .tech-decoration {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 2px solid rgba(0, 255, 255, 0.4);
      border-radius: 50%;
      animation: rotate 12s linear infinite;
    }

    .tech-decoration::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 100px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .tech-decoration::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .decoration-1 {
      top: 8%;
      left: 3%;
      animation-delay: 0s;
    }

    .decoration-2 {
      top: 15%;
      right: 8%;
      animation-delay: -4s;
    }

    .decoration-3 {
      bottom: 12%;
      left: 12%;
      animation-delay: -8s;
    }

    .decoration-4 {
      bottom: 20%;
      right: 3%;
      animation-delay: -12s;
    }

    /* ????捆?冽見撘?*/
    .all-buttons-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 30px 0 40px 0;
      flex-wrap: wrap;
    }

    .comm-btn {
      display: inline-block;
      padding: 15px 30px;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      transition: all 0.3s ease;
      font-family: 'Exo 2', sans-serif;
      font-weight: 600;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      font-size: 1.1em;
      position: relative;
      overflow: hidden;
    }

    .comm-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .comm-btn:hover::before {
      left: 100%;
    }

    .comm-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* ?啣?嚗?絞閮?閮?*/
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .stat-item {
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      padding: 15px 25px;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .stat-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 255, 255, 0.3);
    }

    .stat-number {
      font-size: 2em;
      font-weight: bold;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    /* 蝺亙?絞閮摮蝝 */
    #urgentAnnouncements {
      color: #ff4757 !important;
      text-shadow: 0 0 10px #ff4757 !important;
    }

    .stat-label {
      color: #ffffff;
      font-size: 0.9em;
      margin-top: 5px;
    }

    /* ?啣?嚗??憿?蝐?*/
    .announcement-tags {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 0.8em;
      font-weight: 600;
      background: rgba(0, 255, 255, 0.2);
      border: 1px solid rgba(0, 255, 255, 0.3);
      color: #00ffff;
    }

    /* ?踵?撘身閮?*/
    @media (max-width: 768px) {
      .header h2 {
        font-size: 1.5rem;
      }
      
      .all-buttons-container {
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }
      
      .stats-container {
        flex-direction: column;
        align-items: center;
      }
      
      .announcement {
        margin: 15px 0;
        padding: 20px;
      }
    }
  </style>
</head>

    <div class="stat-item">

  <script src="js/announcements.js"></script>
  <script>
    // Google Sheets API 蝬脣?
    const GOOGLE_SHEETS_API = "https://script.google.com/macros/s/AKfycbyfM8pLiWIjRsvg7u3rJ5Zh4XdKLFuScaQ5t_0yQviBp11IwOZSyrgZ-KFHkrJT43UBPg/exec";
    
    // ?砍??砍??豢?
    const fallbackAnnouncements = [
      {
        type: "?",
        content: "蝟餌絞蝬剛風銝哨??典???航?急??⊥?雿輻",
        time: "2024-01-15 10:00",
        tags: ["蝟餌絞", "蝬剛風"]
      },
      {
        type: "?",
        content: "蝺交?堆?靽桀儔撌脩??",
        time: "2024-01-14 15:30",
        tags: ["蝺?, "?湔"]
      },
      {
        type: "?",
        content: "甇∟?雿輻?望?撠???啣??賡蝥?箔葉",
        time: "2024-01-10 09:30",
        tags: ["?啣???, "甇∟?"]
      },
      {
        type: "?",
        content: "憒???隢蝜怠恥??雿輻?拙振靽∠拳?",
        time: "2024-01-05 14:20",
        tags: ["摰Ｘ?", "?舀"]
      }
    ];

    // ?萄遣蝎???
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 6 + 's';
        particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // ?萄遣??????
    function createLightRays() {
      const lightRaysContainer = document.getElementById('lightRays');
      for (let i = 0; i < 8; i++) {
        const lightRay = document.createElement('div');
        lightRay.className = 'light-ray';
        lightRay.style.left = Math.random() * 100 + '%';
        lightRay.style.animationDelay = Math.random() * 8 + 's';
        lightRay.style.animationDuration = (Math.random() * 4 + 6) + 's';
        lightRaysContainer.appendChild(lightRay);
      }
    }

    // ?湔蝯梯?鞈?
    function updateStats(announcements) {
      console.log('???湔蝯梯?...');
      
      const statsContainer = document.getElementById('statsContainer');
      const totalAnnouncements = document.getElementById('totalAnnouncements');
      const urgentAnnouncements = document.getElementById('urgentAnnouncements');
      const infoAnnouncements = document.getElementById('infoAnnouncements');

      console.log('?曉??蝝?', {
        statsContainer: !!statsContainer,
        totalAnnouncements: !!totalAnnouncements,
        urgentAnnouncements: !!urgentAnnouncements,
        infoAnnouncements: !!infoAnnouncements
      });

      if (!statsContainer || !totalAnnouncements || !urgentAnnouncements || !infoAnnouncements) {
        console.error('蝯梯????芣??);
        return;
      }

      // 閰喟敦隤輯岫靽⊥
      console.log('?砍??豢?:', announcements);
      
      const urgent = announcements.filter(a => a.type === '?').length;
      const info = announcements.filter(a => a.type === '?' || a.type === '?').length;

      console.log('蝺亙???炎??', announcements.map(a => a.type));
      console.log('蝺亙???', urgent);
      console.log('鞈??砍??賊?:', info);

      totalAnnouncements.textContent = announcements.length;
      urgentAnnouncements.textContent = urgent;
      infoAnnouncements.textContent = info;

      console.log('蝯梯??湔摰?:', { total: announcements.length, urgent, info });
    }

    function loadAnnouncements() {
      const box = document.getElementById("announcements");
      box.innerHTML = '<div class="loading">甇?敺?Google Sheets 頛?砍?...</div>';

      // 敺?Google Sheets 頛
      fetch(GOOGLE_SHEETS_API)
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          console.log('Google Sheets 頛??:', data);
          if (data && data.length > 0) {
            displayAnnouncements(data);
            updateStats(data);
          } else {
            throw new Error('No data received');
          }
        })
        .catch(error => {
          console.log('Google Sheets 頛憭望?嚗蝙?冽?唳??', error);
          // 憒? Google Sheets 憭望?嚗蝙?冽?唳??
          if (typeof localAnnouncements !== 'undefined' && localAnnouncements.length > 0) {
            console.log('雿輻 localAnnouncements嚗??', localAnnouncements.length);
            displayAnnouncements(localAnnouncements);
            updateStats(localAnnouncements);
          } else {
            console.log('雿輻??砍??豢?嚗??', fallbackAnnouncements.length);
            displayAnnouncements(fallbackAnnouncements);
            updateStats(fallbackAnnouncements);
          }
        });
    }

    function displayAnnouncements(announcements) {
      const box = document.getElementById("announcements");
      
      console.log('憿舐內?砍?嚗??', announcements);
      
      if (!announcements || announcements.length === 0) {
