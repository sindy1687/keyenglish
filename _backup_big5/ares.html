<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>жҶӣжҖҺеҫҒ?о•¬пҚ‘ - ?жңӣ?ж’ оҗҙп”©??/title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="responsive_enhanced.css">
  <style>
    /* ?и„«иҝ«зҳһжёёеғҸзҡӣжӣү? */
    html {
      overflow-x: hidden;
    }
    
    /* иқЈз®”??ВҖ?пҗЈ?иққоәўпҒҚ?еҲ»?иқ’оӨӣ??пҡ—п…ұ */
    * {
      box-sizing: border-box;
      max-width: 100%;
    }
    
    /* ===== ?з®Ү?з’…?? ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif, 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #232526 0%, #414345 100%);
      color: #fff;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      color: #ffd700;
      text-shadow: 0 0 8px #ffd700;
      margin-bottom: 20px;
      letter-spacing: 2px;
      font-family: 'Orbitron', Arial, sans-serif;
      font-size: 2.2rem;
    }

    /* ===== ?п—»оЁқ?е–®??жү№пҚ—?пҗ§?з’…?? ===== */
    #bgMusicControl {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255, 215, 0, 0.9);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 12;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bgMusicControl:hover {
      background: rgba(255, 215, 0, 1);
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    #bgMusicControl.paused {
      background: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    #bgMusicControl.paused:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    /* ===== ?пҗ§?з’…?? ===== */
    .top-btns {
      position: fixed;
      top: 20px;
      right: 20px;
      left: auto;
      display: flex;
      gap: 8px;
      z-index: 11;
    }

    .top-btns button {
      padding: 6px 12px;
      font-size: 1rem;
      background: #ffd700;
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(255, 215, 0, 0.2);
      font-family: 'Orbitron', Arial, sans-serif;
      transition: background 0.2s;
    }

    .top-btns button:hover {
      background: #ffe54f;
    }

    button {
      font-size: 1rem;
      padding: 10px 26px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 2px 8px #0003;
      font-family: 'Orbitron', Arial, sans-serif;
    }

    #submit-btn {
      background: #ffd700;
      color: #111;
    }

    #submit-btn:disabled {
      background: #ccc;
      color: #888;
      cursor: not-allowed;
    }

    #skip-btn {
      background: #bbb;
      color: #222;
    }

    #skip-btn:hover {
      background: #ccc;
    }

    #speak-btn {
      background: #0ff;
      color: #111;
      margin-top: 10px;
    }

    #speak-btn:disabled {
      background: #555;
      color: #888;
    }

    #speak-btn:hover {
      background: #7ff;
    }

    #next-btn {
      background: #4caf50;
      color: #fff;
      margin-top: 10px;
    }

    #next-btn:hover {
      background: #6fdc7f;
    }

    /* ===== жҶҝиҲҗе…§?ВҖжҶӣп“ҒиҰӢж’ҳ?===== */
    #star-counter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(30, 30, 40, 0.92);
      border-radius: 18px;
      box-shadow: 0 4px 18px 0 rgba(31, 38, 135, 0.18);
      padding: 14px 32px;
      margin-bottom: 18px;
      border: 1.5px solid #ffd70044;
      font-size: 1.18rem;
      color: #ffd700;
      min-width: 260px;
      font-family: 'Orbitron', Arial, sans-serif;
    }

    #starsDisplay {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(10, 20, 40, 0.85);
      padding: 8px 14px;
      border-radius: 10px;
      color: #ffd700;
      font-weight: bold;
      box-shadow: 0 0 12px #ffd700, 0 0 32px #00ffff;
      border: 2px solid #00ffff;
      font-size: 1.2rem;
      z-index: 10;
    }

    #timer {
      font-size: 1.1rem;
      margin-bottom: 16px;
    }

    #timer.hidden {
      display: none;
    }

    /* ===== ?оҗө?ж‘°еӯөоЁ–з’…?? ===== */
    #question-container {
      background: rgba(30, 30, 40, 0.97);
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      padding: 38px 30px 30px;
      max-width: 440px;
      width: 100%;
      margin: auto;
      border: 1.5px solid #ffd70044;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 18px;
    }

    .question-title {
      font-size: 1.1rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .question-sentence {
      font-size: 1.7rem;
      font-weight: bold;
      margin: 10px 0 20px 0;
      line-height: 1.5;
      word-break: break-word;
    }

    .question-sentence .blank {
      color: #0ff;
      background: #fff2;
      border-radius: 8px;
      padding: 2px 16px;
      box-shadow: 0 1px 4px #0ff2;
    }

    .question-zh {
      color: #ffd700;
      margin-bottom: 16px;
      font-size: 1.08rem;
    }

    /* ===== й ӣи©Ёп…ҜзҚўпүҚиҰӢж’ҳ?===== */
    input {
      width: 92%;
      padding: 15px;
      font-size: 1.15rem;
      border: 2px solid #ffd700;
      border-radius: 14px;
      background: #222;
      color: #fff;
      margin-bottom: 22px;
      box-shadow: 0 2px 8px #0003;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #0ff;
    }

    /* ===== ?пҗ§??оӨҡиҰӢж’ҳ?===== */
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 14px;
      width: 100%;
    }

    /* ===== ?пҡӣ?з’…?? ===== */
    #feedback {
      margin-top: 12px;
      font-size: 1.13rem;
      min-height: 28px;
    }

    .feedback-box {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 16px;
      font-size: 1.18rem;
      font-weight: bold;
      box-shadow: 0 2px 16px #0004;
      margin-top: 8px;
      transition: background 0.3s, color 0.3s, transform 0.2s;
      animation: popfade 0.7s cubic-bezier(.68, -0.55, .27, 1.55);
    }

    .feedback-correct {
      background: linear-gradient(90deg, #2ecc40, #bfff00);
      color: #222;
    }

    .feedback-wrong {
      background: linear-gradient(90deg, #ff4f4f, #ffbaba);
      color: #fff;
    }

    .feedback-bonus {
      color: #ffd700;
      animation: bonusflash 1s infinite alternate;
      font-size: 1.25em;
    }

    /* ===== ?оҹЎоһҘ?пҺҮ? ===== */
    .complete-anim {
      animation: pop 0.7s cubic-bezier(.68, -0.55, .27, 1.55) both;
    }

    @keyframes pop {
      0% {
        transform: scale(0.7);
        opacity: 0;
      }
      60% {
        transform: scale(1.15);
        opacity: 1;
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes popfade {
      0% {
        transform: scale(0.7);
        opacity: 0;
      }
      60% {
        transform: scale(1.15);
        opacity: 1;
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes bonusflash {
      0% {
        text-shadow: 0 0 8px #ffd700;
      }
      100% {
        text-shadow: 0 0 24px #fff700;
      }
    }

    /* ===== ?иёө?ж’ҳоҗҙиә«й–®пҺҶпғ—??===== */
    @media (max-width: 768px) {
      .top-btns {
        position: fixed;
        top: 10px;
        right: 10px;
        left: auto;
        display: flex;
        gap: 6px;
        z-index: 11;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      
      .top-btns button {
        padding: 4px 8px;
        font-size: 0.9rem;
      }
      
      #starsDisplay {
        top: 10px;
        left: 10px;
        padding: 6px 10px;
        font-size: 1rem;
      }
      
      h1 {
        font-size: 1.8rem;
        margin-top: 60px;
      }
      
      #question-container {
        max-width: 95vw;
        padding: 20px 15px;
        margin: 10px auto;
      }
      
      .question-sentence {
        font-size: 1.3rem;
      }
      
      .modal-content {
        padding: 20px;
        margin: 10px;
        max-width: 95vw;
      }
      
      .end-buttons {
        flex-direction: column;
        gap: 10px;
      }
      
      .end-buttons button {
        width: 100%;
        padding: 10px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      
      .top-btns {
        position: relative;
        top: auto;
        right: auto;
        left: auto;
        justify-content: center;
        margin-bottom: 15px;
      }
      
      #starsDisplay {
        position: relative;
        top: auto;
        left: auto;
        display: inline-block;
        margin-bottom: 10px;
      }
      
      h1 {
        font-size: 1.5rem;
        margin-top: 10px;
      }
      
      #sessionStarsDisplay {
        font-size: 1rem;
        margin-bottom: 8px;
      }
      
      #star-counter {
        font-size: 1rem;
        padding: 10px 20px;
        min-width: 200px;
      }
      
      .question-sentence {
        font-size: 1.1rem;
      }
      
      input {
        font-size: 1rem;
        padding: 12px;
      }
      
      .btn-row {
        flex-direction: column;
        gap: 10px;
      }
      
      .btn-row button {
        width: 100%;
        padding: 12px;
      }
    }

    /* ===== ?п“ҒпҚ“иқҜо“Ҹ??жҒҚоІ„з’…?? ===== */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(12px);
      animation: modalFadeIn 0.4s ease-out;
    }
    
    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(30, 30, 40, 0.98), rgba(40, 40, 60, 0.98));
      border: 3px solid #ffd700;
      border-radius: 25px;
      padding: 40px;
      text-align: center;
      max-width: 550px;
      width: 90%;
      box-shadow: 0 0 50px #ffd70044, 0 0 100px #00ffff22 inset, 0 0 150px rgba(255, 215, 0, 0.3);
      animation: modalPop 0.6s cubic-bezier(.68, -0.55, .27, 1.55);
      position: relative;
      overflow: hidden;
    }
    
    .modal-content::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.1), transparent);
      animation: shimmer 3s infinite;
    }

    .end-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: tada 2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px #ffd700);
      position: relative;
      z-index: 1;
    }

    .modal-content h2 {
      color: #ffd700;
      font-size: 2.2rem;
      margin-bottom: 25px;
      text-shadow: 0 0 15px #ffd700, 0 0 30px #ffed4e;
      font-family: 'Orbitron', Arial, sans-serif;
      position: relative;
      z-index: 1;
      letter-spacing: 2px;
    }

    .end-stats {
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .end-stats p {
      font-size: 1.3rem;
      margin: 15px 0;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      transition: all 0.3s ease;
    }
    
    .end-stats p:hover {
      background: rgba(255, 215, 0, 0.1);
      border-color: rgba(255, 215, 0, 0.6);
      transform: scale(1.02);
    }

    .end-stats span {
      color: #ffd700;
      font-weight: bold;
      text-shadow: 0 0 8px #ffd700;
      font-size: 1.4rem;
    }

    .end-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .end-buttons button {
      background: linear-gradient(90deg, #ffd700, #ffed4e);
      color: #000;
      border: none;
      border-radius: 15px;
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Orbitron', Arial, sans-serif;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      position: relative;
      overflow: hidden;
    }
    
    .end-buttons button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 2s infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .end-buttons button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
    }
    
    .end-buttons button:hover::before {
      opacity: 1;
    }
    
    .end-buttons button:active {
      transform: scale(0.95);
    }

    @keyframes modalPop {
      0% {
        transform: scale(0.3) rotate(-10deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.1) rotate(2deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes tada {
      0% { transform: scale(1) rotate(0deg); }
      10%, 20% { transform: scale(0.9) rotate(-3deg); }
      30%, 50%, 70%, 90% { transform: scale(1.1) rotate(3deg); }
      40%, 60%, 80% { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(360deg); }
    }
    
    /* ===== йҠҙпӢ«??жЎҖ?ж•¶пҺҲ?иқўоҺ”? ===== */
    #reviewModal .modal-content {
      max-width: 700px;
      max-height: 80vh;
      overflow-y: auto;
      background: linear-gradient(135deg, rgba(20, 30, 50, 0.98), rgba(30, 40, 70, 0.98));
      border-color: #00ffff;
      box-shadow: 0 0 50px #00ffff44, 0 0 100px #a259ff22 inset, 0 0 150px rgba(0, 255, 255, 0.3);
    }
    
    #reviewModal .end-icon {
      color: #00ffff;
      filter: drop-shadow(0 0 20px #00ffff);
    }
    
    #reviewModal h2 {
      color: #00ffff;
      text-shadow: 0 0 15px #00ffff, 0 0 30px #a259ff;
    }
    
    /* ?пүҗ??иұў??еҮҪ???*/
    #categoryFilter {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(162, 89, 255, 0.1));
      color: #fff;
      border: 2px solid #00ffff;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }
    
    #categoryFilter:hover {
      border-color: #a259ff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      transform: scale(1.02);
    }
    
    #categoryFilter:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
    }
    
    /* иқҜжўҜ?йһҲпӢ¬?иқўоҺ”? */
    #vocabStats {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 170, 0, 0.15));
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      color: #ffd700;
      font-size: 1rem;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    
    #vocabStats button {
      background: linear-gradient(90deg, #00ffff, #a259ff);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.9rem;
      margin-left: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
    }
    
    #vocabStats button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
    }
    
    #vocabStats button:last-child {
      background: linear-gradient(90deg, #4caf50, #45a049);
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.4);
    }
    
    #vocabStats button:last-child:hover {
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
    }
    
    /* ?жЎҖ?ж‘°еӯөоЁ–иқўоҺ”? */
    #reviewWordsContainer {
      max-height: 400px;
      overflow-y: auto;
      margin: 20px 0;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(0, 255, 255, 0.2);
    }
    
    #reviewWordsContainer::-webkit-scrollbar {
      width: 8px;
    }
    
    #reviewWordsContainer::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }
    
    #reviewWordsContainer::-webkit-scrollbar-thumb {
      background: linear-gradient(90deg, #00ffff, #a259ff);
      border-radius: 4px;
    }
    
    #reviewWordsContainer::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(90deg, #a259ff, #00ffff);
    }
    
    /* ?жЎҖ??пҶұоӯ–иқўоҺ”? */
    .vocab-item {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(0, 255, 255, 0.05));
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 15px;
      padding: 20px;
      margin: 15px 0;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .vocab-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
      transition: left 0.5s ease;
    }
    
    .vocab-item:hover {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(0, 255, 255, 0.1));
      border-color: rgba(255, 215, 0, 0.6);
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    
    .vocab-item:hover::before {
      left: 100%;
    }
    
    .vocab-item .word {
      color: #ffd700;
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 10px;
      word-break: break-word;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }
    
    .vocab-item .meaning {
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 10px;
      word-break: break-word;
    }
    
    .vocab-item .sentence {
      color: #00ffff;
      font-size: 1rem;
      font-style: italic;
      word-break: break-word;
      line-height: 1.4;
    }
    
    .vocab-item .category-tag {
      color: #00ffff;
      font-size: 0.8rem;
      background: rgba(0, 255, 255, 0.2);
      padding: 4px 8px;
      border-radius: 6px;
      margin-left: 10px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }
    
    .vocab-item .speak-btn {
      background: linear-gradient(90deg, #00ffff, #a259ff);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 1.4rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }

    // ===== ?п“ҒпҚ“?ВҖ?п• ???=====
    let gameState = {
      data: [],
      currentIndex: 0,
      attemptCount: 0,
      answered: false,
      timerInterval: null,
      preferredVoice: null,
      answerLog: [],
      sessionStars: 0
    };

    // ===== ?е–®?йһҲпӢӘ? =====
    const SOUNDS = {
      correct: new Audio('audio/correct.mp3'),
      wrong: new Audio('audio/wrong.mp3'),
      type: new Audio('audio/type.mp3')
    };

    // ===== ?п—»оЁқ?е–®??жү№пҚ— =====
    let bgMusic = null;
    let isMusicPlaying = false;

    function initBackgroundMusic() {
      bgMusic = new Audio('sound/?пҺҶ??жҡё??оҝҳ?еҡ—пҺҲ??е–®?еҡ—?mp3');
      bgMusic.loop = true;
      bgMusic.volume = 0.3;
      
      // ж•әоҙҚocalStorageйңҲВҖ?оўҖо·Ҹз’…оҝҡ???
      const musicState = localStorage.getItem('bgMusicState');
      if (musicState === 'playing') {
        playBackgroundMusic();
      }
    }

    function toggleBackgroundMusic() {
      if (isMusicPlaying) {
        pauseBackgroundMusic();
      } else {
        playBackgroundMusic();
      }
    }

    function playBackgroundMusic() {
      if (bgMusic) {
        bgMusic.play().then(() => {
          isMusicPlaying = true;
          document.getElementById('bgMusicControl').textContent = '??';
          document.getElementById('bgMusicControl').classList.remove('paused');
          localStorage.setItem('bgMusicState', 'playing');
        }).catch(err => {
          console.log('?п—»оЁқ?е–®??еүңоңӣжҶӯжңӣ?:', err);
        });
      }
    }

    function pauseBackgroundMusic() {
      if (bgMusic) {
        bgMusic.pause();
        isMusicPlaying = false;
        document.getElementById('bgMusicControl').textContent = '??';
        document.getElementById('bgMusicControl').classList.add('paused');
        localStorage.setItem('bgMusicState', 'paused');
      }
    }

    // ===== ж’ҢдәҷпҶҒ?иіЈоһІ =====
    function escapeRegExp(s) {
      return s.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&');
    }

    function getRandomQuestions(arr, n) {
      const count = Math.min(n, arr.length);
      return arr.slice().sort(() => Math.random() - 0.5).slice(0, count);
    }

    // ===== йһҲпӢӘ??оіҮ???=====
    function initData() {
      const selected = getRandomQuestions(VOCAB_DATA, GAME_CONFIG.QUESTIONS_COUNT);
      gameState.data = selected.map(item => ({
        answer: item.word,
        zh: item.zh,
        sentence: item.en_sentence.replace(new RegExp(escapeRegExp(item.word), 'i'), '___'),
        original: item.en_sentence,
        zh_sentence: item.zh_sentence,
        category: item.category
      }));
      document.getElementById('total-questions').textContent = gameState.data.length;
    }

    // ===== ?и„ЈжјІиқһвҲ ? =====
    function saveProgress() {
      localStorage.setItem('fillIndex', gameState.currentIndex);
    }

    function loadProgress() {
      gameState.currentIndex = parseInt(localStorage.getItem('fillIndex')) || 0;
      if (typeof gameState.data !== 'undefined' && Array.isArray(gameState.data) && gameState.currentIndex >= gameState.data.length) {
        gameState.currentIndex = 0;
        localStorage.removeItem('fillIndex');
      }
    }

    function resetProgress() {
      localStorage.removeItem('fillIndex');
      location.reload();
    }

    function updateCounter() {
      document.getElementById('current-index').textContent = gameState.currentIndex + 1;
    }

    // ===== й–®пҺҮ??е…ё???=====
    function startTimer() {
      clearInterval(gameState.timerInterval);
      let timeLeft = GAME_CONFIG.TIME_LIMIT;
      document.getElementById('time-left').textContent = timeLeft;
      document.getElementById('timer').classList.remove('hidden');
      
      gameState.timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('time-left').textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(gameState.timerInterval);
          revealAnswer(true);
        }
      }, 1000);
    }

    function stopTimer() {
      clearInterval(gameState.timerInterval);
    }

    // ===== йҡӨоөЁо·Ҹ?оё„пҒҚ =====
    function pickVoice() {
      const voices = window.speechSynthesis.getVoices();
      const prefer = [
        'Google US English', 'Microsoft Aria Online', 'Microsoft Jenny Online', 
        'Samantha', 'Jenny', 'Aria', 'en-US'
      ];
      gameState.preferredVoice = voices.find(v => prefer.some(p => v.name.includes(p))) || 
                                 voices.find(v => v.lang === 'en-US') || voices[0];
    }

    function speak(text, rate = 1.0, callback) {
      if (!window.speechSynthesis) return;
      
      const utter = new window.SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.rate = rate;
      utter.pitch = 1.12;
      if (gameState.preferredVoice) utter.voice = gameState.preferredVoice;
      if (callback) utter.onend = callback;
      
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    }

    function speakQuestionAndWord(question) {
      window.speechSynthesis.cancel();
      speak(question.original, 0.97, function() {
        setTimeout(() => {
          speak(question.original.replace(new RegExp(escapeRegExp(question.answer), 'i'), '...'), 1.02, function() {
            setTimeout(() => speak(question.answer, 1.08), 350);
          });
        }, 350);
      });
    }

    // ===== иқ‘оқғ??оҹЎ? =====
    function revealAnswer(autoNext = false) {
      gameState.attemptCount = Infinity;
      document.getElementById('feedback').innerHTML = 
        '<span style="color:#f66;">???оҝң??е Ҷ?з”Ү?в…Ўиқ‘оқғ?еҡ—?b>' + gameState.data[gameState.currentIndex].answer + '</b></span>';
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('user-input').disabled = true;
      
      logAnswer(false);
      
      if (autoNext) {
        setTimeout(() => {
          gameState.currentIndex++;
          showQuestion();
        }, 500);
      }
    }

    function logAnswer(correct, userAnswer = '') {
      const currentQuestion = gameState.data[gameState.currentIndex];
      const timeSpent = window.answerStartTime ? (Date.now() - window.answerStartTime) / 1000 : 0;
      
      gameState.answerLog[gameState.currentIndex] = {
        word: currentQuestion.answer,
        zh: currentQuestion.zh_sentence || currentQuestion.zh,
        en: currentQuestion.original,
        user: userAnswer,
        correct: correct,
        stars: 0,
        category: currentQuestion.category,
        timeSpent: timeSpent
      };
    }

    // ===== ?оҗө?жҶҝиҲҗе…§ =====
    function showQuestion() {
      if (!gameState.data || !Array.isArray(gameState.data) || gameState.data.length === 0) {
        document.getElementById('question-container').innerHTML = 
          '<div style="color:#f66;font-size:1.2rem;">?оәЁ? жҶҝп—әжҫҲзҳқоҳү?жҶҝп—јоӯ–еҡ—п—Ҫ?з‘јпјёо·ҒйһҲпӢӘ?еҡ—?/div>';
        return;
      }

      if (gameState.currentIndex < 0 || gameState.currentIndex >= gameState.data.length) {
        // ?п“ҒпҚ“иқҜо“Ҹ?еҡ—п—ҫпјҠиқ·з®Ү??оёғоһҘ??
        showGameEndScreen();
        return;
      }

      gameState.answered = false;
      gameState.attemptCount = 0;
      const question = gameState.data[gameState.currentIndex];

      document.getElementById('question-container').innerHTML = 
        '<div class="question-title">?жңӣ??дәҷ?еҡ—?/div>' +
        '<div class="question-sentence">' + question.sentence.replace('___', '<span class="blank">___</span>') + '</div>' +
        '<div class="question-zh">йҠқеүң??о“җе…§еҡ—? + (question.zh_sentence || question.zh) + '</div>' +
        '<input id="user-input" placeholder="й ӣи©Ёп…Ҝиқ‘оқғ??? autocomplete="off" />' +
        '<div class="btn-row">' +
          '<button id="submit-btn" onclick="checkAnswer()">?ој»пҠҫ</button>' +
          '<button id="skip-btn" onclick="skipQuestion()">й қе–І?</button>' +
          '<button id="next-btn" onclick="nextQuestion()">йҠқп•ң?жҶҝ?/button>' +
        '</div>' +
        '<div id="feedback"></div>' +
        '<button id="speak-btn" onclick="speakQuestionAndWord(question)">?? ?оӨң?</button>';

      const inputEl = document.getElementById('user-input');
      inputEl.focus();
      inputEl.onkeydown = function(e) {
        if (e.key === 'Enter') {
          checkAnswer();
        } else if (e.key.length === 1) {
          try {
            SOUNDS.type.currentTime = 0;
            SOUNDS.type.play();
          } catch (e) {}
        }
      };

      updateCounter();
      startTimer();
      
      setTimeout(() => {
        speak(question.original, 0.97);
      }, 400);

      document.getElementById('speak-btn').onclick = () => speakQuestionAndWord(question);
      window.answerStartTime = Date.now();
      
      // ?оЎј?йҠҙпӢ«??пҗ§?
      lockReviewButton();
    }

    // ===== ?п“ҒпҚ“иқҜо“Ҹ??жҒҚоІ„ =====
    function showGameEndScreen() {
      // й–®пҺҲ?иқҜжўҜ??иұў?
      const correctCount = gameState.answerLog.filter(log => log && log.correct === true).length;
      const wrongCount = gameState.answerLog.filter(log => log && log.correct === false).length;
      const totalStars = loadTotalStars();
      
      // й–®пҺҲ?ж’ҹе–і??оҝң?
      const totalTime = gameState.answerLog.reduce((sum, log) => {
        return sum + (log && log.timeSpent ? log.timeSpent : 0);
      }, 0);
      const averageTime = correctCount > 0 ? totalTime / correctCount : 0;

      // ?ж№”оЎҮиқҜо“Ҹ??жҒҚоІ„?иұў?
      document.getElementById('endSessionStars').textContent = gameState.sessionStars;
      document.getElementById('endCorrectCount').textContent = correctCount;
      document.getElementById('endWrongCount').textContent = wrongCount;
      document.getElementById('endTotalStars').textContent = totalStars;

      // жҶҝиҲҗе…§иқҜо“Ҹ??жҒҚоІ„
      document.getElementById('gameEndModal').style.display = 'flex';
      
      // ?о°«иҝ«й–®пҺҮ???
      stopTimer();
      
      // й–«??йҠҙпӢ«??пҗ§?
      unlockReviewButton();
      
      // ?ж№”оЎҮ?о“ҺеҒңиқҜжўҜ?
      updateFillAchievements(); // ?ж№”оЎҮ?п“ҒпҚ“ж‘°п—»?з”ҲвҠҘоһІ
      updateFillStreak(); // ?ж№”оЎҮ???жҶӯжӢҮоһІ
      updateFillCorrectWords(correctCount); // ?ж№”оЎҮиқ‘оқӮ??жЎҖ???
      
      // з‘јпјёо·Ғ?иҮ¬о’Ҹ?з®Ҹ?иқўоҺ”???
      if (correctCount === gameState.data.length && wrongCount === 0) {
        updateFillPerfectScore();
      }
      
      // з‘јпјёо·Ғ?иҮ¬о’Ҹ?з®Ҹзҝ°?оё…???
      updateFillSpeedGame(averageTime);
      
      // ?еүңоңӣж‘°п—»??е–®?
      try {
        SOUNDS.correct.currentTime = 0;
        SOUNDS.correct.play();
      } catch (e) {}
    }

    function restartGame() {
      // ?жўҜ?иқҜо“Ҹ??жҒҚоІ„
      document.getElementById('gameEndModal').style.display = 'none';
      
      // ?пҡҷи”ӯ?п“ҒпҚ“?ВҖ??
      gameState.currentIndex = 0;
      gameState.sessionStars = 0;
      gameState.answerLog = [];
      
      // ?пҡҳоЎҮ?оіҮ??оЎҪоһІ??
      initData();
      updateCounter();
      showQuestion();
      
      // ?ж№”оЎҮ?зҘҶжҙ»?оёӮ?жҶҝиҲҗе…§
      document.getElementById('sessionStarsDisplay').textContent = '?зҘҶжҙ»ж’Ңи„©пҷӨж•ә?0 жҶҝпүҚ???;
    }

    // ===== ?оҗө??пҡ–? =====
    function skipQuestion() {
      stopTimer();
      logAnswer(null, '');
      const feedback = document.getElementById('feedback');
      if (feedback) feedback.innerHTML = '<span style="color:#bbb;">ж’Ңи„°жӯІ?оҺ•оҜұжҶҝ?/span>';
      setTimeout(() => {
        gameState.currentIndex++;
        showQuestion();
      }, 400);
    }

    function nextQuestion() {
      stopTimer();
      if (!gameState.answerLog[gameState.currentIndex]) {
        logAnswer(false, document.getElementById('user-input')?.value || '');
        const feedback = document.getElementById('feedback');
        if (feedback) feedback.innerHTML = '<span style="color:#bbb;">?иҠҜ?иқ‘?/span>';
      }
      setTimeout(() => {
        gameState.currentIndex++;
        showQuestion();
      }, 400);
    }

    function checkAnswer() {
      if (gameState.answered) return;
      
      gameState.attemptCount++;
      const inputEl = document.getElementById('user-input');
      const feedback = document.getElementById('feedback');
      const answer = gameState.data[gameState.currentIndex].answer.toLowerCase();
      const userAnswer = inputEl.value.trim().toLowerCase();

      if (userAnswer === answer) {
        gameState.answered = true;
        stopTimer();

        const usedSeconds = (Date.now() - (window.answerStartTime || Date.now())) / 1000;
        let bonus = 0;
        let feedbackMsg = '<div class="feedback-box feedback-correct">??иқ‘оқӮ?йҲӯпү–?жҶӯиҠЈ?йҲӯпү–?';
        
        if (usedSeconds < 10) {
          bonus = 2;
          feedbackMsg += ' <span class="feedback-bonus">BONUS! ?жў§? +2</span>';
        }
        feedbackMsg += '</div>';
        
        feedback.innerHTML = feedbackMsg;
        inputEl.disabled = true;
        document.getElementById('submit-btn').disabled = true;
        
        speak(answer, 1.1);
        saveProgress();
        updateCounter();
        
        logAnswer(true, inputEl.value.trim());
        
        const addStars = 1 + bonus;
        addStarsToTotal(addStars);
        gameState.sessionStars += addStars;
        document.getElementById('sessionStarsDisplay').textContent = '?зҘҶжҙ»ж’Ңи„©пҷӨж•ә?' + gameState.sessionStars + ' жҶҝпүҚ???;
        
        try {
          SOUNDS.correct.currentTime = 0;
          SOUNDS.correct.play();
        } catch (e) {}
        
        setTimeout(() => {
          gameState.currentIndex++;
          showQuestion();
        }, 1300);
      } else {
        if (gameState.attemptCount < GAME_CONFIG.MAX_ATTEMPTS) {
          feedback.innerHTML = '<div class="feedback-box feedback-wrong">???пҡҡеІ«йҠқВҖз”ҲвҲҙ?йӣҝоәһоҸ»йҡһдәҰ?еҡ—?/div>';
          try {
            SOUNDS.wrong.currentTime = 0;
            SOUNDS.wrong.play();
          } catch (e) {}
        } else {
          feedback.innerHTML = '<div class="feedback-box feedback-wrong">??з”Ү?в…Ўиқ‘оқғ?еҡ—?b>' + gameState.data[gameState.currentIndex].answer + '</b><br>?дәӨйҷӨж“—оҳ’??пҡҳоҚ”?пҡ—оҚЎеҡ—?/div>';
          inputEl.disabled = true;
          document.getElementById('submit-btn').disabled = true;
          
          logAnswer(false, inputEl.value.trim());
          
          try {
            SOUNDS.wrong.currentTime = 0;
            SOUNDS.wrong.play();
          } catch (e) {}
          
          setTimeout(() => {
            gameState.currentIndex++;
            showQuestion();
          }, 1300);
        }
      }
    }

    // ===== ?оёӮ?иқҹйӨҢзөһ =====
    function loadTotalStars() {
      const stars = localStorage.getItem('totalStars');
      return stars !== null ? parseInt(stars, 10) : 0;
    }

    function addStarsToTotal(stars) {
      const currentStars = loadTotalStars();
      const newTotal = currentStars + stars;
      localStorage.setItem('totalStars', newTotal);
      updateStarsDisplay();
    }

    function updateStarsDisplay() {
      document.getElementById('totalStarsCount').textContent = loadTotalStars();
    }

    // ===== йҠҙпӢ«??жЎҖ??оё„пҒҚ =====
    function showReviewModal() {
      // ?жҖ ??п“ҒпҚ“й–®пҺҮ???
      stopTimer();
      
      const container = document.getElementById('reviewWordsContainer');
      const categoryFilter = document.getElementById('categoryFilter');
      const totalVocabCount = document.getElementById('totalVocabCount');
      
      // ?ж№”оЎҮиқ®иіЈоһІиқҜжўҜ?
      totalVocabCount.textContent = VOCAB_DATA.length;
      
      // жҶҝиҲҗе…§?ВҖ?пҗЈоЎ…ж‘®?
      displayVocabByCategory('all');
      
      // зҳӣйӨғ??пүҗ?иқӯжӢҡојҺйҲӯп•ңиҫЈ??ој“??
      categoryFilter.onchange = function() {
        displayVocabByCategory(this.value);
      };
      
      document.getElementById('reviewModal').style.display = 'flex';
    }

    function displayVocabByCategory(category) {
      const container = document.getElementById('reviewWordsContainer');
      const totalVocabCount = document.getElementById('totalVocabCount');
      
      // зҡңпҶұеҫҒж‘°еӯөоЁ–
      container.innerHTML = '';
      
      // иқӯжӢҡојҺ?жЎҖ?
      let filteredVocab = VOCAB_DATA;
      if (category !== 'all') {
        filteredVocab = VOCAB_DATA.filter(item => item.category === category);
      }
      
      // ?ж№”оЎҮиқҜжўҜ?йһҲпӢ¬?
      totalVocabCount.textContent = filteredVocab.length;
      
      // жҶҝиҲҗе…§?пүҗ?з’…о©—?
      if (category !== 'all') {
        const categoryTitle = document.createElement('div');
        categoryTitle.className = 'category-title';
        categoryTitle.textContent = `?? ${category} (${filteredVocab.length}?п•қоЎ…ж‘®?`;
        container.appendChild(categoryTitle);
      }
      
      // жҶҝиҲҗе…§?жЎҖ?
      filteredVocab.forEach((item, index) => {
        const wordDiv = document.createElement('div');
        wordDiv.className = 'vocab-item';
        
        // зҳӣйӨғ??пүҗ?з’…о©•жғң
        const categoryLabel = category === 'all' ? `<span class="category-tag">${item.category}</span>` : '';
        
        wordDiv.innerHTML = `
          <div style="display: flex; align-items: flex-start; gap: 15px;">
            <div style="flex: 1; min-width: 0;">
              <div class="word">
                ${index+1}. ${item.word}${categoryLabel}
              </div>
              <div class="meaning">
                ${item.zh}
              </div>
              <div class="sentence">
                ${item.en_sentence}
              </div>
            </div>
            <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${item.word}')">
              ??
            </button>
          </div>
        `;
        
        wordDiv.addEventListener('click', () => {
          speakWord(item.word);
        });

      const csvContent = [

      // з‘јпјёо·ҒйҠқиЎҢоӯң?е•Ғоӯ ?о°«?ж’ ?

    function updateFillSpeedGame(averageTime) {
      // з‘јпјёо·Ғ?иҮ¬о’Ҹ?з®Ҹзҝ°?оё…??иҺҺ?ж’ҹе–і??оҝң?ж’ о•¬оЎ“15иқҳоҳ’?

        localStorage.setItem('fillSpeedGames', speedGames + 1);
        
        // з‘јпјёо·ҒйҠқиЎҢоӯң?е•Ғоӯ ?о°«?ж’ ?
        checkAndUpdateAchievements();
      }
    }
    
    function updateFillStreak() {
      // ?ж№”оЎҮ???жҶӯжӢҮоһІ
      const today = new Date().toDateString();
      const lastPlayDate = localStorage.getItem('fillLastPlayDate');
      const currentStreak = parseInt(localStorage.getItem('fillStreakDays') || '0');
      
      if (lastPlayDate === today) {
        // йҡһп“ҖдәҲж’Ңи„©??жӢҡ?йҲӯпү–?йҠқпҡӣ?йҠҙпӢ¬?иқһ?
        return;
      }
      
      if (lastPlayDate === new Date(Date.now() - 24 * 60 * 60 * 1000).toDateString()) {
        // ?е…ёдәҲ?пҗҘоҚҳеҡ—п—ҫВҖ??жҶӯжӢҮоһІ+1
        localStorage.setItem('fillStreakDays', currentStreak + 1);
      } else {
        // йҠқеүңоЎҺйҲӯпү–??пҡҳоЎҮ?п•қ?
        localStorage.setItem('fillStreakDays', 1);
      }
      
      localStorage.setItem('fillLastPlayDate', today);
      
      // з‘јпјёо·ҒйҠқиЎҢоӯң?е•Ғоӯ ?о°«?ж’ ?
      checkAndUpdateAchievements();
    }
    
    function updateFillCorrectWords(correctCount) {
      // ?ж№”оЎҮиқ‘оқӮ??жЎҖ?иқ®иіЈоһІ
      const totalCorrect = parseInt(localStorage.getItem('fillCorrectWords') || '0');
      localStorage.setItem('fillCorrectWords', totalCorrect + correctCount);
      
      // з‘јпјёо·ҒйҠқиЎҢоӯң?е•Ғоӯ ?о°«?ж’ ?

    }
    
    function checkAndUpdateAchievements() {
      // з‘јпјёо·Ғ?иҮ¬о’Ҹ?пҗӨоЎҮ?о“ҺеҒң?оқғ?
      const achievements = [
        { id: 'fill_beginner', name: 'жҶӣжҖҺеҫҒ?е”і?', requirement: 1 },
        { id: 'fill_regular', name: 'жҶӣжҖҺеҫҒж’Ји©ЁжҒҘ', requirement: 10 },
        { id: 'fill_expert', name: 'жҶӣжҖҺеҫҒж’ пҺҶжҢҜ', requirement: 50 },
        { id: 'fill_master', name: 'жҶӣжҖҺеҫҒжҶӯжү№и‘Ұ', requirement: 100 },
        { id: 'fill_perfect', name: 'ж‘°п—ј?жҶӣжҖҺеҫҒ', requirement: 1 },
        { id: 'fill_speed', name: 'ж•№жҒҚВҖоёҒвҖөиқӣ?, requirement: 5 },
        { id: 'fill_streak', name: '???жҶӣжҖҺеҫҒ', requirement: 7 },
        { id: 'fill_vocab', name: 'й–°оөӨ?жҶӣжҖҺеҫҒ', requirement: 100 }
      ];
      
      const claimed = JSON.parse(localStorage.getItem('claimedAchievements') || '[]');
      
      achievements.forEach(ach => {
        if (claimed.includes(ach.id)) return; // ж’Ңи„©??оҰ¶??оҺ“?
        
        let unlocked = false;
        switch (ach.id) {
          case 'fill_beginner':
          case 'fill_regular':
          case 'fill_expert':
          case 'fill_master':
            unlocked = parseInt(localStorage.getItem('fillGamesCompleted') || '0') >= ach.requirement;
            break;
          case 'fill_perfect':
            unlocked = parseInt(localStorage.getItem('fillPerfectScores') || '0') >= ach.requirement;
            break;
          case 'fill_speed':
            unlocked = parseInt(localStorage.getItem('fillSpeedGames') || '0') >= ach.requirement;
            break;
          case 'fill_streak':
            unlocked = parseInt(localStorage.getItem('fillStreakDays') || '0') >= ach.requirement;
            break;
          case 'fill_vocab':
            unlocked = parseInt(localStorage.getItem('fillCorrectWords') || '0') >= ach.requirement;
            break;
        }
        
        if (unlocked) {
          // жҶҝиҲҗе…§?о“ҺеҒң?оқғ??о«Іо·Ғ
          showAchievementNotification(ach.name, ach.id);
        }
      });
    }
