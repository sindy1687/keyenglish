    .error-message {

      border: 2px solid #ff0000;

      padding: 15px;
      border-radius: 8px;

      text-align: center;

    .existing-cards {

      padding: 30px;

    .cards-grid {

    .existing-card img {

    .existing-card p {

      color: #ccc;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>?оҚЈ ?вҲ ?иқһвҲ ?иқҹйӨҢзөһ</h1>
    </header>
    
    <div class="card-form">
      <h2>?е•Ј??вҲ ?</h2>
      <form id="cardForm">
        <div class="form-group">
          <label for="word">?жңӣ??жЎҖ?еҡ—?/label>
          <input type="text" id="word" required>

        <div class="form-group">
          <label for="zh">йҠқеүң?иқ§йӨүйҷҢеҡ—?/label>
          <input type="text" id="zh" required>
        </div>
        
        <div class="form-group">
          <label for="image">?оЎҫ?иқ¬и„Ј?еҡ—?/label>
          <input type="url" id="image" required placeholder="https://example.com/image.jpg">
        </div>
        
        <div class="form-group">
          <label for="rarity">иқ”ВҖ?пҗЈжјІеҡ—?/label>
          <select id="rarity" required>
            <option value="?жЎ…ВҖ?>?жЎ…ВҖ?/option>
            <option value="иқ”ВҖ??>иқ”ВҖ??/option>
            <option value="й һпҶұ???>й һпҶұ???/option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="category">жҶҝоөӨпҚҶеҡ—?/label>
          <input type="text" id="category" required placeholder="йқҳп•қ?еҡ—о«ізҫІжҶҜжҖ еҒҙ?ој»??жҠјВҖојҝ??жӢҚ?">
        </div>
        
        <div class="form-group">
          <label for="description">?оҗҙиҶ©еҡ—?/label>
          <textarea id="description" rows="3" required placeholder="?вҲ ??п„•еә•иққе”і?йӨҲ?.."></textarea>
        </div>
        
        <div class="form-group">
          <label for="effectType">?пҺҮ?жҶҝоөӨ?еҡ—пҺҶоҸ»?иіӮ?еҡ—?/label>
          <select id="effectType">
            <option value="">?вҠҘ???/option>

            <option value="shield">йң…з‘һоӯҰ</option>

            <option value="skip_level">й қе–І??о°Әпҷ“</option>
          </select>
        </div>
        
        <div class="form-group" id="effectValueGroup" style="display: none;">
          <label for="effectValue">?пҺҮ??и©ЁВҖжҪҳ?</label>
          <input type="number" id="effectValue" min="1" max="100">
        </div>
        
        <div class="form-group" id="effectDescGroup" style="display: none;">
          <label for="effectDesc">?пҺҮ??оҗҙиҶ©еҡ—?/label>
          <input type="text" id="effectDesc" placeholder="йқҳп•қ?еҡ—о«°??оә ?жҶҝп—»???60 иқҳ?>
        </div>
        
        <button type="submit" class="btn">?е•Ј??вҲ ?</button>
        <button type="button" class="btn" onclick="previewCard()">?о“‘жұ—?вҲ ?</button>
        <button type="button" class="btn btn-danger" onclick="clearForm()">зҡңпҶіоЁ’йҠөе…ёоЎ…</button>
      </form>
    </div>
    
    <div class="preview-section">
      <h2>?вҲ ??о“‘жұ—</h2>
      <div id="cardPreview" class="card-preview" style="display: none;">
        <img id="previewImage" src="" alt="?вҲ ??оЎҫ?">
        <h3 id="previewWord"></h3>
        <p id="previewZh"></p>
        <p id="previewDesc"></p>
        <div id="previewRarity" class="rarity-badge"></div>
      </div>
    </div>
    
    <div class="existing-cards">
      <h2>?жҡ№??вҲ ?</h2>
      <button class="btn" onclick="loadExistingCards()">й ӣпҗЈп…Ҝ?жҡ№??вҲ ?</button>
      <div id="existingCardsGrid" class="cards-grid"></div>
    </div>
  </div>

  <script>
    // й ӣпҗЈп…Ҝ?жҡ№???cards.js з‘јоқғ?
    let existingCards = [];
    
    // ?пҺҮ?жҶҝоөӨ?йңҲп“Ғоӯң?оҝңпјҠиқ·??жўҜ??иіҠ?з”Ҳп„‘?
    document.getElementById('effectType').addEventListener('change', function() {
      const effectValueGroup = document.getElementById('effectValueGroup');
      const effectDescGroup = document.getElementById('effectDescGroup');
      
      if (this.value) {
        effectValueGroup.style.display = 'block';
        effectDescGroup.style.display = 'block';
      } else {
        effectValueGroup.style.display = 'none';
        effectDescGroup.style.display = 'none';
      }
    });
    
    // ?о“‘жұ—?вҲ ?
    function previewCard() {
      const word = document.getElementById('word').value;
      const zh = document.getElementById('zh').value;
      const image = document.getElementById('image').value;
      const description = document.getElementById('description').value;
      const rarity = document.getElementById('rarity').value;
      
      if (!word || !zh || !image || !description) {
        alert('йҡўп•қвҖөж’–жҖҘ??пҗЈ?й–¬ојј?йӣҝ?);
        return;
      }
      
      const preview = document.getElementById('cardPreview');
      const previewImage = document.getElementById('previewImage');
      const previewWord = document.getElementById('previewWord');
      const previewZh = document.getElementById('previewZh');
      const previewDesc = document.getElementById('previewDesc');
      const previewRarity = document.getElementById('previewRarity');
      
      previewImage.src = image;
      previewWord.textContent = word;
      previewZh.textContent = zh;
      previewDesc.textContent = description;
      previewRarity.textContent = rarity;
      previewRarity.className = `rarity-badge rarity-${rarity === '?жЎ…ВҖ? ? 'common' : rarity === 'иқ”ВҖ?? ? 'rare' : 'super-rare'}`;
      
      preview.style.display = 'inline-block';
    }
    
    // зҡңпҶіоЁ’йҠөе…ёоЎ…
    function clearForm() {
      document.getElementById('cardForm').reset();
      document.getElementById('cardPreview').style.display = 'none';
      document.getElementById('effectValueGroup').style.display = 'none';
      document.getElementById('effectDescGroup').style.display = 'none';
    }
    
    // й ӣпҗЈп…Ҝ?жҡ№??вҲ ?
    async function loadExistingCards() {
      try {
        const response = await fetch('js/cards.js');
        const text = await response.text();
        
        // й–«?? baseCards ???
        const baseCardsMatch = text.match(/const baseCards = (\[[\s\S]*?\]);/);
        if (baseCardsMatch) {
          const baseCardsStr = baseCardsMatch[1];
          existingCards = eval(baseCardsStr);
          displayExistingCards();
        }
      } catch (error) {
        console.error('й ӣпҗЈп…Ҝ?вҲ ?жҶӯжңӣ?:', error);
        alert('й ӣпҗЈп…Ҝ?жҡ№??вҲ ?жҶӯжңӣ?');
      }
    }
    
    // жҶҝиҲҗе…§?жҡ№??вҲ ?
    function displayExistingCards() {
      const grid = document.getElementById('existingCardsGrid');
      grid.innerHTML = '';
      
      existingCards.forEach((card, index) => {
        const cardElement = document.createElement('div');
        cardElement.className = 'existing-card';
        cardElement.innerHTML = `
          <img src="${card.image}" alt="${card.word}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjE1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iI2NjYyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlIE5vdCBGb3VuZDwvdGV4dD48L3N2Zz4='">
          <h4>${card.word}</h4>
          <p>${card.zh}</p>
          <p style="color: ${card.rarity === '?жЎ…ВҖ? ? '#666' : card.rarity === 'иқ”ВҖ?? ? '#0066ff' : '#ffd700'}">${card.rarity}</p>
          <button class="btn btn-danger" onclick="deleteCard(${index})" style="margin-top: 10px; padding: 5px 10px; font-size: 0.8rem;">?иҠ·оЁ’</button>
        `;
        grid.appendChild(cardElement);
      });
    }
    
    // ?иҠ·оЁ’?вҲ ?
    async function deleteCard(index) {
      if (confirm('иқЈз®Ҹ?й–¬ој»пҚӢ?ж—ҘВҖо©“ж’җ?вҲ ??оҺһ?')) {
        existingCards.splice(index, 1);
        await saveCardsToFile();
        displayExistingCards();
        showMessage('?вҲ ?ж’Ңи„ЈпҚӢ??, 'success');
      }
    }
    
    // йҠөе…ёоЎ…?о“Қжјұ
    document.getElementById('cardForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const formData = {
        word: document.getElementById('word').value,
        zh: document.getElementById('zh').value,
        image: document.getElementById('image').value,
        rarity: document.getElementById('rarity').value,
        category: document.getElementById('category').value,
        description: document.getElementById('description').value
      };
      
      const effectType = document.getElementById('effectType').value;
      if (effectType) {
        formData.effect = {
          type: effectType,
          value: parseInt(document.getElementById('effectValue').value) || 1,
          description: document.getElementById('effectDesc').value
        };
      }
      
      // з‘јпјёо·Ғ?иҮ¬о’Ҹж’Ңи„Ј??еҮҪоӯ ?п—әоЎ…ж‘®?
      const existingIndex = existingCards.findIndex(card => card.word === formData.word);
      if (existingIndex !== -1) {
        if (confirm('ж’Ңи„Ј??еҮҪоӯ ?п—әоЎ…ж‘®оӨӣ??вҲ ?еҡ—п—»оҰҖ?иҘҝ?й–¬пүҸ?еҡ—?)) {
          existingCards[existingIndex] = formData;
        } else {
          return;
        }
      } else {
        existingCards.push(formData);
      }
      
      await saveCardsToFile();
      showMessage('?вҲ ?ж’Ңи„«??оёӮоЎҮжҶ“оө®?', 'success');
      clearForm();
      displayExistingCards();
    });
    
    // ?и„Ј??вҲ ??е”і?зҚў?
    async function saveCardsToFile() {
      try {
        const cardsData = `// cards.js

// ===============================
// 1. ?оёҒ??вҲ ?йһҲпӢӘ?еҡ—пҢҘaseCardsеҡ—?
//    ?иҠё??жҒ¬?word, zh, image, rarity, category, description, effect
// ===============================
const baseCards = ${JSON.stringify(existingCards, null, 2)};

// ===============================
// 2. ?вҲ ?жҶ“оөӨж’ҘиқҹйӨҢзөһ
// ===============================
(function enhanceRareCards() {
  baseCards.forEach(card => {
    if (card.rarity === "й һпҶұ???) {
      if (!card.effect) {
        card.effect = {
          type: "time_extend",
          value: 60,
          description: "жҶ“оөӨ?иқ‘оқҶ??оҝң? 60 иқҳ?
        };
      }
    }
  });
})();

// ===============================
// 3. ?вҲ ?иқһвҲ ??иіЈоһІ
// ===============================
function getCardsByRarity(rarity) {
  return baseCards.filter(card => card.rarity === rarity);
}

function getCardsByCategory(category) {
  return baseCards.filter(card => card.category === category);
}

function searchCards(keyword) {
  return baseCards.filter(card => 
    card.word.toLowerCase().includes(keyword.toLowerCase()) ||
    card.zh.includes(keyword)
  );
}

// ===============================
// 4. ?иҮ¬пҠҫ?вҲ ?йһҲпӢӘ?
// ===============================
if (typeof module !== 'undefined' && module.exports) {
  module.exports = { baseCards, getCardsByRarity, getCardsByCategory, searchCards };
}`;

        // йӣҝиј»оң… File System Access API ?оЎ»?й ӣпҗӨ?зҚў?
        const blob = new Blob([cardsData], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'cards.js';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showMessage('cards.js з‘јоқғ?ж’Ңи„–?й ӣпҗӯ?йҡўп•һ??оҹ оӯ§?о®Қ?з‘јоқғ?', 'success');
      } catch (error) {
        console.error('?и„Ј?жҶӯжңӣ?:', error);
        showMessage('?и„Ј?жҶӯжңӣ?: ' + error.message, 'error');
      }
    }
    
    // жҶҝиҲҗе…§й–®п“Ғој…
    function showMessage(message, type) {
      const messageDiv = document.createElement('div');
      messageDiv.className = type === 'success' ? 'success-message' : 'error-message';
      messageDiv.textContent = message;
      
      const container = document.querySelector('.container');
      container.insertBefore(messageDiv, container.firstChild);
      
      setTimeout(() => {
        messageDiv.remove();
      }, 5000);
    }
    
    // ?ојҝоІ„й ӣпҗЈп…Ҝ?оҝӣпҠ®?оҹў??дәҰоҗҠ?пҗЈпҷ“??
    window.addEventListener('load', loadExistingCards);
  </script>
