<!DOCTYPE html>

</head>
<body>
    <div class="container">
        <h1>?? зҳһж№”??вҲ ?иқӘвҲӘоЎ…зҡңзҘҲеІ«</h1>
        
        <div id="status"></div>
        
        <h2>зҡңзҘҲеІ«?пҡ–?еҡ—?/h2>
        <button onclick="checkCards()">з‘јпјёо·Ғ?вҲ ?йһҲпӢӘ?</button>
        <button onclick="checkLocalStorage()">з‘јпјёо·Ғ localStorage</button>
        <button onclick="addFruitCards()">зҳӣйӨғ?зҳһж№”??вҲ ??е•ЈжӯҮй–«??</button>
        <button onclick="clearFruitCards()">зҡңпҶіоЁ’зҳһж№”??вҲ ?</button>
        
        <h2>зҡңзҘҲеІ«иқҜо“Ҹ?еҡ—?/h2>
        <div id="results"></div>
        
        <h2>зҳһж№”??вҲ ?жҶҝиҲҗе…§еҡ—?/h2>
        <div id="fruitCards"></div>
    </div>

    <!-- й ӣпҗЈп…Ҝж•№пҶІ??п„•п…Ҫ??-->
    <script src="js/cards.js"></script>
    <script src="js/userData.js"></script>
    
    <script>
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        function updateResults(content) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = content;
        }
        
        function checkCards() {
            let results = '<h3>?вҲ ?йһҲпӢӘ?з‘јпјёо·Ғеҡ—?/h3>';
            
            // з‘јпјёо·Ғ allCards
            if (typeof window.allCards !== 'undefined') {
                results += '<p>??allCards ж’Ңи„°???/p>';
                results += `<p>иқ®иіўпҷ“?пӢӘоһІеҡ—?{window.allCards.length}</p>`;
                
                // ?жӣүпҠҫзҳһж№”??вҲ ?
                const fruitCards = window.allCards.filter(card => card.category === 'зҳһж№”?');
                results += `<p>зҳһж№”??вҲ ??иіӮ?${fruitCards.length}</p>`;
                
                if (fruitCards.length > 0) {
                    results += '<p>зҳһж№”??вҲ ??оӨңвҖқеҡ—?/p><ul>';
                    fruitCards.forEach(card => {
                        results += `<li>${card.word} (${card.zh}) - ${card.rarity}</li>`;
                    });
                    results += '</ul>';
                }
            } else {
                results += '<p>??allCards ?иҠҫ???/p>';
            }
            
            // з‘јпјёо·Ғ LinkageSystem
            if (typeof window.LinkageSystem !== 'undefined') {
                results += '<p>??LinkageSystem ж’Ңи„°???/p>';
            } else {
                results += '<p>??LinkageSystem ?иҠҫ???/p>';
            }
            
            updateResults(results);
            updateStatus('?вҲ ?йһҲпӢӘ?з‘јпјёо·Ғж‘°п—»?', 'success');
        }
        
        function checkLocalStorage() {
            let results = '<h3>localStorage з‘јпјёо·Ғеҡ—?/h3>';
            
            // з‘јпјёо·Ғ ownedCards
            const ownedCardsStr = localStorage.getItem('ownedCards');
            if (ownedCardsStr) {
                try {
                    const ownedCards = JSON.parse(ownedCardsStr);
                    results += `<p>??ownedCards ж‘®оҰ¶оҜӯеҡ—п—ә???${Object.keys(ownedCards).length} ж’ҳиҗ„пҷ“??/p>`;
                    
                    // з‘јпјёо·Ғзҳһж№”??вҲ ?
                    const fruitCards = ['apple', 'banana', 'orange', 'grape', 'strawberry'];
                    const unlockedFruits = fruitCards.filter(fruit => ownedCards[fruit]);
                    
                    results += `<p>ж’Ңи„°еңҫ?оЎҫ?зҳһж№”??вҲ ?еҡ—?{unlockedFruits.length} ж’ҳ?/p>`;
                    if (unlockedFruits.length > 0) {
                        results += '<ul>';
                        unlockedFruits.forEach(fruit => {
                            results += `<li>${fruit}</li>`;
                        });
                        results += '</ul>';
                    }
                    
                    // жҶҝиҲҗе…§?ВҖ?пҗЈжӯҮй–«???п„’пҷ“??
                    results += '<p>?ВҖ?пҗЈжӯҮй–«???п„’пҷ“?пӢі?</p><ul>';
                    Object.keys(ownedCards).forEach(card => {
                        results += `<li>${card}</li>`;
                    });
                    results += '</ul>';
                    
                } catch (e) {
                    results += `<p>??й–«?? ownedCards жҶӯжңӣ?еҡ—?{e.message}</p>`;
                }
            } else {
                results += '<p>??ownedCards йҠқпҡ—???/p>';
            }
            
            // з‘јпјёо·Ғ cardShards
            const cardShardsStr = localStorage.getItem('cardShards');
            if (cardShardsStr) {
                try {
                    const cardShards = JSON.parse(cardShardsStr);
                    results += `<p>??cardShards ж‘®оҰ¶оҜӯеҡ—п—ә???${Object.keys(cardShards).length} иқ”жЎғ???/p>`;
                } catch (e) {
                    results += `<p>??й–«?? cardShards жҶӯжңӣ?еҡ—?{e.message}</p>`;
                }
            } else {
                results += '<p>??cardShards йҠқпҡ—???/p>';
            }
            
            updateResults(results);
            updateStatus('localStorage з‘јпјёо·Ғж‘°п—»?', 'success');
        }
        
        function addFruitCards() {
            const fruitCards = ['apple', 'banana', 'orange', 'grape', 'strawberry'];
            const ownedCardsStr = localStorage.getItem('ownedCards');
            let ownedCards = {};
            
            if (ownedCardsStr) {
                try {
                    ownedCards = JSON.parse(ownedCardsStr);
                } catch (e) {
                    console.error('й–«?? ownedCards жҶӯжңӣ?еҡ—?, e);
                }
            }
            
            // зҳӣйӨғ?зҳһж№”??вҲ ?
            fruitCards.forEach(fruit => {
                ownedCards[fruit] = true;
            });
            
            localStorage.setItem('ownedCards', JSON.stringify(ownedCards));
            
            updateStatus(`??ж’Ңи„«жә¶??${fruitCards.length} ж’ҳиҸңеҒҢ?о°Әпҷ“?пӢ©пҚ‘ж’Ңи„°еңҫ?оЎј?йҠөзҒј, 'success');
            checkLocalStorage();
            renderFruitCards();
        }
        
        function clearFruitCards() {
            const fruitCards = ['apple', 'banana', 'orange', 'grape', 'strawberry'];
            const ownedCardsStr = localStorage.getItem('ownedCards');
            let ownedCards = {};
            
            if (ownedCardsStr) {
                try {
                    ownedCards = JSON.parse(ownedCardsStr);
                } catch (e) {
                    console.error('й–«?? ownedCards жҶӯжңӣ?еҡ—?, e);
                }
            }
            
            // иқҳй§ҒоЁ’зҳһж№”??вҲ ?
            fruitCards.forEach(fruit => {
                delete ownedCards[fruit];
            });
            
            localStorage.setItem('ownedCards', JSON.stringify(ownedCards));
            
            updateStatus(`??ж’Ңи„«???${fruitCards.length} ж’ҳиҸңеҒҢ?о°Әпҷ“?пҠҶ, 'success');
            checkLocalStorage();
            renderFruitCards();
        }
        
        function renderFruitCards() {
            const fruitCardsDiv = document.getElementById('fruitCards');
            
            if (typeof window.allCards === 'undefined') {
                fruitCardsDiv.innerHTML = '<p>??allCards ?иҠҫ???/p>';
                return;
            }
            
            const fruitCards = window.allCards.filter(card => card.category === 'зҳһж№”?');
            const ownedCardsStr = localStorage.getItem('ownedCards');
            let ownedCards = {};
            
            if (ownedCardsStr) {
                try {
                    ownedCards = JSON.parse(ownedCardsStr);
                } catch (e) {
                    console.error('й–«?? ownedCards жҶӯжңӣ?еҡ—?, e);
                }
            }
            
            if (fruitCards.length === 0) {
                fruitCardsDiv.innerHTML = '<p>??зҳқоҳү??жӣүпҚ‘зҳһж№”??вҲ ?</p>';
                return;
            }
            
            let html = '';
            fruitCards.forEach(card => {
                const isUnlocked = ownedCards[card.word] || false;
                html += `
                    <div class="card" style="border: 3px solid ${isUnlocked ? '#28a745' : '#dc3545'};">
                        <img src="${card.image}" alt="${card.zh}" onerror="this.src='https://via.placeholder.com/120x120?text=?оЎҫ?й ӣпҗЈп…ҜжҶӯжңӣ?'">
                        <h3>${card.word}</h3>
                        <p>${card.zh}</p>
                        <p style="color: ${isUnlocked ? 'green' : 'red'}; font-weight: bold;">
                            ${isUnlocked ? '??ж’Ңи„°еңҫ?? : '???иҠҫеңҫ??}
                        </p>
                    </div>
                `;
            });
            
            fruitCardsDiv.innerHTML = html;
        }
        
        // ?ојҝоІ„й ӣпҗЈп…Ҝж‘°п—»?ж•әп—әо·“йҠө?
        window.addEventListener('load', function() {
            console.log('?ојҝоІ„й ӣпҗЈп…Ҝж‘°п—»?еҡ—п—ҫ?жҶӘп•һи‘«й–°?..');
            
            setTimeout(() => {

                checkLocalStorage();
                renderFruitCards();
            }, 1000);
        });
    </script>
