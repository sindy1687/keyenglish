<body>
  <!-- ж’Ңиҷ«?й–«?TopBarеҡ—о«ҙпјҠиқ·з®ё??оёӮоһІ + йӨҲоқӮ?иқәеҲ»ж‘©?ојҝоІ„ -->
  <div id="topBar">
    <div id="starsDisplay">жҪғ?span id="totalStarsCount">0</span></div>
    <a href="#" id="backToBook" class="back-btn">жјҺ?йӨҲоқӮ?иқәеҲ»ж‘©?жЎҖ???/a>
  </div>

  <!-- ?оёғеҫҒ Canvas -->
  <canvas id="stars"></canvas>

  <!-- йҠқйӨғжҚҶ?еүҒ??пҡ—??п“ҒпҚ“?жү№жҚҶ -->
  <div class="container">
    <h1>?жЎҖ??пҡ—??п“ҒпҚ“</h1>
    <div class="grid-container">
      <!-- ?жңӣ??жЎҖ??ВҖ -->
      <div class="grid" id="engGrid"></div>
      <!-- йҠқеүң?й–«???ВҖ -->
      <div class="grid" id="chiGrid"></div>
    </div>
  </div>

  <script src="js/sound.js"></script>
  <script src="js/starRewardSystem.js"></script>
  <script src="js/achievementSystem.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // йңҲВҖ??URL ?пҒ¶оһІеҡ—оӘҸook
      const params = new URLSearchParams(location.search);
      const bookName = params.get('book');
      if (!bookName) {
        alert('?пҒ¶оһІ?иҲӘзӮҠеҡ—о«Іж’©ж’ ?book??);
        history.back();
      }
      document.getElementById('backToBook').href = `book_edit.html?book=${encodeURIComponent(bookName)}`;

      // ===== ?оёӮ?й–®пҺҮоһІ ?оіҮ???=====
      const starDom = document.getElementById('totalStarsCount');
      const raw = localStorage.getItem('totalStars');
      let totalStars = 0;
      if (raw !== null) {
        const parsed = parseInt(raw, 10);
        totalStars = isNaN(parsed) ? 0 : parsed;
      }
      starDom.textContent = totalStars;

      // ===== йңҲВҖ?оЎјоЎ…ж‘®оӨҡоҜұ =====
      const vocab = JSON.parse(localStorage.getItem('book_' + bookName) || '[]');
      if (!Array.isArray(vocab) || vocab.length < 3) {
        alert('з”Үж–ҮоЎ…ж‘®оӨҡоҜұ?е–і??ВҖй–¬?3 иқ‘пүӢиӘ‘йҠқп“ҖоЎ…ж‘®оӨҡ??иіЎВҖи„°??пҡ—??п“ҒпҚ“??);
        history.back();
      }

      // ?оЎј??жңӣ?ж‘®оӨқоЁ‘?оӨҷ?йҠқеүң?й–«?????
      const engWords = vocab.map(v => v.word);
      const chiWords = vocab.map(v => v.meaning);

      // ?еҶҪ??оҡӨ????
      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }
      shuffle(engWords);
      shuffle(chiWords);

      const engGrid = document.getElementById('engGrid');
      const chiGrid = document.getElementById('chiGrid');

      // йқҪоіҮ??жЎҖ?йӢЎжҒҚојҺйҠқеү”??вҲ ?
      let firstSelection = null; // { type: 'eng'|'chi', text: string, el: DOMElement }
      
      // ===== ?е•Ј?еҡ—о«ҙ??и„©??п• и•ӯй ©?=====
      let gameStats = {
        correctMatches: 0,
        totalMatches: vocab.length,
        consecutiveCorrect: 0, // ???иқ‘оқӮ?з”ҲвҠҘоһІ
        startTime: Date.now(),
        matchTimes: [], // й–®оҰә?зҳҘоҗІжҙ»?пҡ—??п„“???
        perfectMatches: 0 // ж‘°п—ј??пҡ—?з”ҲвҠҘоһІеҡ—пҺҶзҝ°?оё…?ж’ пҡЎ?
      };

      // ===== ?е•Ј?еҡ—о«ұ??оёғ??иҸ”?иқһоӨҷпӢҒ??=====
      function calculateStarReward(matchTime, consecutiveCount, wordLength) {
        let baseReward = 1; // ?з®Ү??оҺ”п”ӯ
        
        // ?оҝң??оҺ”п”ӯеҡ—о«і?ж•№жҒҚ?ж’ пҡҷ??иҸ”?жҶӯ?
        if (matchTime <= 2) {
          baseReward += 2; // 2иқҳоҳҲп…ұ +2??
        } else if (matchTime <= 4) {
          baseReward += 1; // 4иқҳоҳҲп…ұ +1??
        }
        
        // ????оҺ”п”ӯеҡ—о«ҙВҖ???пҡ—?й һп“Җ??оҺ”п”ӯй һп“Җ?
        if (consecutiveCount >= 5) {
          baseReward += 3; // 5??? +3??
        } else if (consecutiveCount >= 3) {
          baseReward += 2; // 3??? +2??
        } else if (consecutiveCount >= 2) {
          baseReward += 1; // 2??? +1??
        }
        
        // ?жЎҖ???жјІ?оҺ”п”ӯеҡ—о«ұо№І?о«°оЎ…ж‘®оӨқоһұж‘ЁиЎЈзӯ–йҲӯпҺҠ?жҶӯоЎҫ???
        if (wordLength >= 8) {
          baseReward += 1; // ?з‘•оЎ…ж‘®оӨқ?жҶӯоЎҫ???
        }
        
        // ?жЎҖ??зҘҮ??п•ҹ???
        if (bookName.includes('?оҰё?') || bookName.includes('TOEFL')) {
          baseReward += 1; // ?оҰё??жЎҖ?жҶҝпҡ—??оҺ”п”ӯ
        } else if (bookName.includes('?жңӣзӮҺ') || bookName.includes('GEPT')) {
          baseReward += 1; // ?жңӣзӮҺ?жЎҖ?жҶҝпҡ—??оҺ”п”ӯ
        }
        
        return baseReward;
      }
      
      // ===== ?е•Ј?еҡ—о«ҙпјҠиқ·з®Ү??иҗ„???=====
      function showRewardAnimation(starsEarned, reason = '') {
        const rewardDiv = document.createElement('div');
        rewardDiv.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: linear-gradient(135deg, rgba(255, 215, 0, 0.95), rgba(255, 170, 0, 0.95));
          color: #000;
          padding: 20px 30px;
          border-radius: 15px;
          font-size: 1.5rem;
          font-weight: bold;
          z-index: 1000;
          box-shadow: 0 0 30px #ffd700;
          animation: rewardPop 1.2s ease-out forwards;
          font-family: 'Orbitron', sans-serif;
          text-align: center;
          min-width: 300px;
        `;
        
        let reasonText = '';
        if (reason) {
          reasonText = `<div style="font-size: 1rem; margin-top: 8px; color: #666;">${reason}</div>`;
        }
        
        rewardDiv.innerHTML = `
          <div style="font-size: 3rem; margin-bottom: 10px;">жҪғ?/div>
          <div style="font-size: 1.8rem; margin-bottom: 5px;">+${starsEarned} ?оёӮ?</div>
          ${reasonText}
        `;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes rewardPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(rewardDiv);
        
        // ?еүңоңӣ?оёӮ??е–®?
        if (typeof StarRewardSystem !== 'undefined') {
          StarRewardSystem.playStarSound();
        }
        
        // 2.5иқҳоҳҲ?иқҳй§ҒоЁ’
        setTimeout(() => {
          if (document.body.contains(rewardDiv)) {
            document.body.removeChild(rewardDiv);
          }
          if (document.head.contains(style)) {
            document.head.removeChild(style);
          }
        }, 2500);
      }
      
      // ===== ?е•Ј?еҡ—о«ҙпјҠиқ·зІ№ВҖ???о«Іо·Ғ =====
      function showComboNotification(comboCount) {
        if (comboCount < 2) return;
        
        const comboDiv = document.createElement('div');
        comboDiv.style.cssText = `
          position: fixed;
          top: 20%;
          left: 50%;
          transform: translateX(-50%);
          background: linear-gradient(135deg, rgba(255, 69, 0, 0.9), rgba(255, 140, 0, 0.9));
          color: #fff;
          padding: 15px 25px;
          border-radius: 25px;
          font-size: 1.2rem;
          font-weight: bold;
          z-index: 1000;
          box-shadow: 0 0 20px #ff4500;
          animation: comboSlide 0.8s ease-out forwards;
          font-family: 'Orbitron', sans-serif;
        `;
        
        let comboText = '';
        let comboIcon = '';
        
        if (comboCount >= 5) {
          comboText = `${comboCount} ???еҡ—оҪҶ???вҠҘоһҜ???еҡ—о»ҳ;
          comboIcon = '?оңӮ';
        } else if (comboCount >= 3) {
          comboText = `${comboCount} ???еҡ—ојёоӘ¬ й һпҶҜж’Ҙ???еҡ—о»ҳ;
          comboIcon = '??;
        } else {
          comboText = `${comboCount} ???еҡ—ојёоҜӯ ????п•қ?еҡ—о»ҳ;
          comboIcon = '??;
        }
        
        comboDiv.innerHTML = `${comboIcon} ${comboText} ${comboIcon}`;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes comboSlide {
            0% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            50% { transform: translateX(-50%) translateY(0); opacity: 1; }
            100% { transform: translateX(-50%) translateY(0); opacity: 0; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(comboDiv);
        
        // 2иқҳоҳҲ?иқҳй§ҒоЁ’
        setTimeout(() => {
          if (document.body.contains(comboDiv)) {
            document.body.removeChild(comboDiv);
          }
          if (document.head.contains(style)) {
            document.head.removeChild(style);
          }
        }, 2000);
      }

      // ж’ұз®Ү??вҲ ?
      function createCard(text, type) {
        const el = document.createElement('div');
        el.className = 'card';
        el.textContent = text;
        el.addEventListener('click', () => handleCardClick(type, text, el));
        return el;
      }

      // ж’ пӢ©пҷ“?пӢЁ?ж‘Ёоҗұ??дәҰйӣҜ??
      engWords.forEach(w => {
        const card = createCard(w, 'eng');
        engGrid.appendChild(card);
      });
      chiWords.forEach(w => {
        const card = createCard(w, 'chi');
        chiGrid.appendChild(card);
      });

      function saveStars() {
        localStorage.setItem('totalStars', totalStars);
      }

      // ?вҲ ?жҡәоөҘ??оҹЎ?
      function handleCardClick(type, text, el) {
        if (el.classList.contains('disabled')) return;
        if (firstSelection === null) {
          // иқҡз Ң?з”ҲвҠҝојҺ??
          firstSelection = { type, text, el, startTime: Date.now() };
          el.classList.add('selected');
        } else {
          // иқҡз Ң?з”ҲвҠҝојҺ??
          if (firstSelection.el === el) return; // ?п—№?ж’ҳиҗ„пҷ“ж’ жӣ№??оҹЎ?
          
          // й–®пҺҲ??пҡ—??оҝң?
          const matchTime = (Date.now() - firstSelection.startTime) / 1000;
          gameStats.matchTimes.push(matchTime);
          
          // ?ж–—оЎҺ?иҮ¬о’Ҹ?пҡ—??о“Һ?
          let match = false;
          let matchedWord = null;
          if (firstSelection.type !== type) {
            // ?жӣүпҠҫ?жҠөВҖпҶ°оҰҖ?иЎҢоҰҖж’ пҡҳ?
            if (type === 'eng' && firstSelection.type === 'chi') {
              // ?пҡӣ?йқҳпүҚ?й ӣпҒҝ??пҺҶ??иҮӯи‘ү?пӢі??жЎҖ??иҲӘп”©??
              const pair = vocab.find(v => v.meaning === firstSelection.text && v.word === text);
              match = Boolean(pair);
              matchedWord = pair;
            } else if (type === 'chi' && firstSelection.type === 'eng') {
              // ?пҺҶ??иҲӘп”©?пӢі??жЎҖ??иҮӯи‘ү??
              const pair = vocab.find(v => v.word === firstSelection.text && v.meaning === text);
              match = Boolean(pair);
              matchedWord = pair;
            }
          }
          
          if (match) {
            // ?пҡ—??о“Һ?еҡ—о«°п…іж’ҳиҗ„пҷ“?иіЈ???disabledеҡ—п—ә??оёӮ?
            firstSelection.el.classList.add('disabled');
            el.classList.add('disabled');
            
            // ===== ?е•Ј?еҡ—о«ҙ?ж’ пҡҳ??оё…?й ӣ?=====
            gameStats.correctMatches++;
            gameStats.consecutiveCorrect++;
            
            // з‘јпјёо·Ғ?иҮ¬о’Ҹ?з®Ҹ?иқўоҺҳ?ж’ пҡЎ?2иқҳоҳҲп…ұ?пҡ—?еҡ—?
            if (matchTime <= 2) {
              gameStats.perfectMatches++;
            }
            
            // й–®пҺҲ??оёӮ??оҺ”п”ӯ
            const starsEarned = calculateStarReward(matchTime, gameStats.consecutiveCorrect, matchedWord.word.length);
            
            // йӣҝиј»оң…иқҜжӣ№??п„“??оёғй ӮиқҜ?
            if (typeof StarRewardSystem !== 'undefined') {
              StarRewardSystem.addStars(starsEarned);
            } else {
              totalStars += starsEarned;
              saveStars();
            }
            
            // ?ж№”оЎҮжҶҝиҲҗе…§
            starDom.textContent = parseInt(localStorage.getItem('totalStars') || '0');
            
            // жҶҝиҲҗе…§?оҺ”п”ӯ?оҹЎоһҘ
            let reasonText = '';
            if (matchTime <= 2) {
              reasonText = '??й һпҶҜзҝ°?оё…?ж’ пҡЎ?';
            } else if (matchTime <= 4) {
              reasonText = '?оҚһ ж•№жҒҚВҖоё…?ж’ пҡЎ?';
            }
            if (gameStats.consecutiveCorrect >= 3) {
              reasonText += reasonText ? ' + ????оҺ”п”ӯеҡ—? : '?оңӮ ????оҺ”п”ӯеҡ—?;
            }
            
            showRewardAnimation(starsEarned, reasonText);
            
            // жҶҝиҲҗе…§????о«Іо·Ғ
            showComboNotification(gameStats.consecutiveCorrect);
            
            // ===== ?е•Ј?еҡ—о«і??п„”?ж’ пҡҷ??жЎҖ? =====
            if (typeof VocabularyAchievementSystem !== 'undefined') {
              VocabularyAchievementSystem.recordCorrectWord(matchedWord.word, bookName);
            }
            
          } else {
            // ?пҡ—?жҶӯжңӣ?еҡ—о«ҙ?иқөжЎ…ВҖ??
            gameStats.consecutiveCorrect = 0;
            firstSelection.el.classList.remove('selected');
          }
          
          // зҡңпҶ°?иқҡз Ң?з”ҲвҠҝојҺ??
          firstSelection = null;
          
          // з‘јпјёо·Ғ?иҮ¬о’Ҹ?еҲёпҖё?пҡ—?
          if (document.querySelectorAll('.card:not(.disabled)').length === 0) {
            // ===== ?е•Ј?еҡ—о«ҙпјҠиқ·зІ№??и„©иңҮиқҜ?=====
            showGameSummary();
            
            // ?ж№”оЎҮ?пҡ—??п“ҒпҚ“?о“ҺеҒңиқҜжўҜ?
            updateMatchingAchievements();
            
            setTimeout(() => {
              location.href = `book_edit.html?book=${encodeURIComponent(bookName)}`;
            }, 3000);
          }
        }
      }
      
      // ===== ?е•Ј?еҡ—о«ҙпјҠиқ·зІ№??и„©иңҮиқҜ?=====
      function showGameSummary() {
        const totalTime = (Date.now() - gameStats.startTime) / 1000;
        const avgMatchTime = gameStats.matchTimes.length > 0 ? 
          (gameStats.matchTimes.reduce((a, b) => a + b, 0) / gameStats.matchTimes.length).toFixed(1) : 0;
        
        const summaryDiv = document.createElement('div');
        summaryDiv.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.9);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 10000;
          backdrop-filter: blur(10px);
        `;
        
        summaryDiv.innerHTML = `
          <div style="
            background: linear-gradient(135deg, rgba(10, 20, 40, 0.95), rgba(20, 40, 80, 0.95));
            border: 3px solid #00ffff;
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 50px #00ffff;
            animation: summaryPop 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
          ">
            <div style="font-size: 4rem; margin-bottom: 20px;">??</div>
            <h2 style="color: #00ffff; margin-bottom: 30px; font-size: 2rem;">?пҡ—??п“ҒпҚ“ж‘°п—»?еҡ—?/h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${gameStats.correctMatches}</div>
                <div style="font-size: 0.9rem; color: #ccc;">?пҡ—??о“Һ?</div>
              </div>
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${totalTime.toFixed(1)}s</div>
                <div style="font-size: 0.9rem; color: #ccc;">иқ®иіңоң…??/div>
              </div>
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${avgMatchTime}s</div>
                <div style="font-size: 0.9rem; color: #ccc;">ж’ҹе–і??пҡ—??оҝң?</div>
              </div>
              <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;">
                <div style="font-size: 1.5rem; color: #00ffff;">${gameStats.perfectMatches}</div>
                <div style="font-size: 0.9rem; color: #ccc;">ж‘°п—ј??пҡ—?</div>
              </div>
            </div>
            
            <div style="
              background: linear-gradient(90deg, #ffd700, #ffaa00);
              border-radius: 15px;
              padding: 20px;
              margin: 20px 0;
              color: #000;
              font-weight: bold;
              font-size: 1.3rem;
            ">
              жҪғ??зҘҶжҙ»?и„Ј??оёӮ?еҡ—?{parseInt(localStorage.getItem('totalStars') || '0') - (totalStars - gameStats.correctMatches)} жҶҝ?жҪғ?
            </div>
            
            <div style="color: #ccc; font-size: 0.9rem; margin-top: 20px;">
              3иқҳоҳҲ?йӨҲоқӮ??жЎҖ??зҘүжҘҠй ӣиҲ«???..
            </div>
          </div>
        `;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes summaryPop {
            0% { transform: scale(0.2) rotate(-15deg); opacity: 0; }
            50% { transform: scale(1.15) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(summaryDiv);
        
        // жҡәоөҘ??п—»оЁқ?о°®?
        summaryDiv.onclick = function(e) {
          if (e.target === summaryDiv) {
            summaryDiv.remove();
            style.remove();
          }
        };
      }

      // ===== ?оёғеҫҒ?п—»оЁқ?оҹЎоһҘ =====
      const canvas = document.getElementById('stars');
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      const numStars = 200;
      const starsArr = [];

      function Star() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 1.5;
        this.speed = Math.random() * 0.5 + 0.2;
      }
      Star.prototype.update = function() {
        this.x -= this.speed;
        if (this.x < 0) {
          this.x = w;
          this.y = Math.random() * h;
        }
      }
      Star.prototype.draw = function() {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < numStars; i++) {
        starsArr.push(new Star());
      }
      function animate() {
        ctx.clearRect(0, 0, w, h);
        starsArr.forEach(s => {
          s.update();
          s.draw();
        });
        requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      });
      
      // ?е•Ј?еҡ—о«ҙ?ж’ пҡӣ??и„«?ж’ жўҜи•ӯй ©?
      function updateMatchingAchievements() {
        // ?ж№”оЎҮ?пҡ—??п“ҒпҚ“ж‘°п—»?з”ҲвҠҘоһІ
        const matchingGames = parseInt(localStorage.getItem('matchingGamesCompleted') || '0');
        localStorage.setItem('matchingGamesCompleted', matchingGames + 1);
        
        // з‘јпјёо·ҒйҠқиЎҢоӯң?е•Ғоӯ ?о°«?ж’ ?
        checkAndUpdateMatchingAchievements();
      }
      
      function checkAndUpdateMatchingAchievements() {
        // з‘јпјёо·Ғ?иҮ¬о’Ҹ?пҗӨоЎҮ?о“ҺеҒң?оқғ?
        const achievements = [
          { id: 'speed_learner', name: 'ж•№жҒҚВҖоёҒйЈӣиқ§оҳӢВҖ?, requirement: 10 },
          { id: 'accuracy_master', name: 'зҡһоЎҫв…ЎжҶӯжү№и‘Ұ', requirement: 20 },
          { id: 'combo_king', name: '???йҠӢп•ҹ?', requirement: 15 }
        ];
        
        const claimed = JSON.parse(localStorage.getItem('claimedAchievements') || '[]');
        
        achievements.forEach(ach => {
          if (claimed.includes(ach.id)) return; // ж’Ңи„©??оҰ¶??оҺ“?
          
          // й–®пҺҲ??о«ҙ??п„–??вҠҘоһІ??
          const fillGames = parseInt(localStorage.getItem('fillGamesCompleted') || '0');
          const cardGames = parseInt(localStorage.getItem('cardGamesCompleted') || '0');
          const quizGames = parseInt(localStorage.getItem('quizGamesCompleted') || '0');
          const spellingGames = parseInt(localStorage.getItem('spellingGamesCompleted') || '0');
          const matchingGames = parseInt(localStorage.getItem('matchingGamesCompleted') || '0');
          const totalGames = fillGames + cardGames + quizGames + spellingGames + matchingGames;
          
          if (totalGames >= ach.requirement) {
            // жҶҝиҲҗе…§?о“ҺеҒң?оқғ??о«Іо·Ғ
            showAchievementNotification(ach.name, ach.id);
          }
        });
      }
      
      function showAchievementNotification(achievementName, achievementId) {
        // ?иҗ„йҒЈ?о“ҺеҒң?о«Іо·Ғ
        const notification = document.createElement('div');
        notification.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: linear-gradient(135deg, #ffd700, #ffed4e);
          color: #000;
          padding: 20px 30px;
          border-radius: 15px;
          font-weight: bold;
          font-size: 1.2rem;
          z-index: 10000;
          box-shadow: 0 0 30px #ffd700;
          animation: achievementPop 0.8s cubic-bezier(.68, -0.55, .27, 1.55);
          text-align: center;
          min-width: 300px;
        `;
        
        notification.innerHTML = `
          <div style="font-size: 3rem; margin-bottom: 10px;">??</div>
          <div style="margin-bottom: 5px;">?? ?о“ҺеҒң?оқғ?еҡ—?/div>
          <div style="font-size: 1.1rem;">${achievementName}</div>
          <div style="font-size: 0.9rem; margin-top: 10px; color: #666;">
            ?пҡ—??о“ҺеҒң?ојҝоІ„?оҰ¶??оҺ”п”ӯ
          </div>
        `;
        
        // зҳӣйӨғ??оҹЎоһҘз’…??
        const style = document.createElement('style');
        style.textContent = `
          @keyframes achievementPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
        
        document.body.appendChild(notification);
        
        // 3иқҳоҳҲ??иҠё?иқҳй§ҒоЁ’
        setTimeout(() => {
          notification.remove();
          style.remove();
        }, 3000);
      }
    });
  </script>
