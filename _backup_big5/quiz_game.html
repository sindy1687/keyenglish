    // ----------- ?иҠё??пүҺ?йҠқиЎҢжҜҪ?пҺҶпҠҫжҶҝ?-------------
    function autoLevelVocab(vocab, totalCount = 20) {
      // ?пүҺ?
      const easy = vocab.filter(v => v.word.length <= 4);
      const hard = vocab.filter(v => v.word.length >= 7);
      const medium = vocab.filter(v => v.word.length > 4 && v.word.length < 7);
      // зҳҷз®Ҹ??п„”??иіҠ?
      let easyCount = Math.round(totalCount * 0.4);
      let mediumCount = Math.round(totalCount * 0.4);
      let hardCount = totalCount - easyCount - mediumCount;
      // ?еҶҪ??иіў?
      function pick(arr, n) {
        const copy = arr.slice();
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy.slice(0, n);
      }
      let result = [];
      result = result.concat(pick(easy, easyCount));
      result = result.concat(pick(medium, mediumCount));
      result = result.concat(pick(hard, hardCount));
      // ?д№©?й һе–і?йӢҶо°®?
      const used = new Set(result.map(v => v.word));
      const left = vocab.filter(v => !used.has(v.word));
      while (result.length < Math.min(totalCount, vocab.length) && left.length > 0) {
        result.push(left.pop());
      }
      // ?ВҖж•әп—ә?зҳЈоӨӣ?
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

      });

    function animateStarsCount(from, to) {

    let currentQuestion = null;

    /**
     * ?з®”?йңҲоҡҰиҝӨй–¬оҗҙвҖқ?оқӮ??иіЈиҝӨиқЈз®Ҹп—Һ?пҡЎ??жҒҚВҖиІҠпҸ·з•ҫп“Җ??пҒіВҖ?     * @param {string} str - ?оёҒ?ж‘®оӨҳи‘Ў
     * @returns {string} ?жҒҚВҖи©Ё??п„’?йҠқ?     */
    function escapeRegex(str) {
      // ?жҒҚВҖи©ЁоҜӯз”Ү??йҠөеҲё?ж’ҳоҗ°и‘ү?пҗҘпҸ·з•ҫп“Ғ?иқўжӢҚ?ж‘®оӨҷ?
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    /**
     * й–®пҺҲ??жӢҷВҖп•қ?йҠқи„–??оҡ§? Levenshtein й қоіӢоӯҠеҡ—пҺҲжҘҠй ӣиҲӘ??пҪҮ?
     * ?е…¶?ж’ п•һпҸј?жҫҶ??иЁҫж’®?п„’оЎ…ж‘®?     */
    function levenshteinDistance(s1, s2) {
      s1 = s1.toLowerCase();
      s2 = s2.toLowerCase();
      const costs = [];
      for (let i = 0; i <= s1.length; i++) {
        let lastValue = i;
        for (let j = 0; j <= s2.length; j++) {
          if (i === 0) {
            costs[j] = j;
          } else {
            if (j > 0) {
              let newValue = costs[j - 1];
              if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
                newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
              }
              costs[j - 1] = lastValue;
              lastValue = newValue;
            }
          }
        }
        if (i > 0) {
          costs[s2.length] = lastValue;
        }
      }
      return costs[s2.length];
    }

    /**
     * ж•әоөӨоЎ…ж‘®оӨҡоҜұйҠқеү–??жӣҮ??ж ј??жЎҖ??ВҖ?иЁҫж’®??N ?п•қоЎ…ж‘®?     * @param {string} targetWord - ?ж ј??жЎҖ?
     * @param {number} count - й–¬ојјпҸј?з®Ү??иЁҫж’®?жЎҖ??иіҠ?
     * @returns {string[]} ?иЁҫж’®?жЎҖ????
     */
    function findSimilarWords(targetWord, count) {
      const allOtherWords = vocab
        .map(v => v.word)
        .filter(word => word.toLowerCase() !== targetWord.toLowerCase());

      if (allOtherWords.length <= count) {
        return allOtherWords; // ?жЎҖ?ж‘ЁжҖқ?й һе–ү?йӨҲоқӮ??ВҖ?пҗЈпҶҖйҡһоЎјоЎ…ж‘®?      }

      // й–®пҺҲ??ВҖ?пҗЈоЎ…ж‘®оӨӣ? Levenshtein й қоіӢоӯҠ
      const wordsWithDistance = allOtherWords.map(word => ({
        word: word,
        distance: levenshteinDistance(targetWord, word)
      }));

      // йқҳоіҠ??пјё?ж‘Ёоҗ»?й қоіӢоӯҠ?и©Ё??пӢӯоӘіз’ҲоёӮ?ж‘Ё?      wordsWithDistance.sort((a, b) => {
        if (a.distance !== b.distance) {
          return a.distance - b.distance;
        }
        return Math.random() - 0.5; // ?оҡӨ??пүҢ?
      });

      // ?оЎј??ВҖ?иЁҫж’®?п„’? count ?п•қоЎ…ж‘®?      return wordsWithDistance.slice(0, count).map(item => item.word);
    }

    // ?пј№?иқҡ?currentIdx жҶҝпҳ„?ж•ә?vocab[currentIdx]
    function generateQuestion() {
      currentQuestion = vocab[currentIdx];

      // example йӢҶвҠҝоІ„?пҶҜо’”йҲӯпүҢоЎ…ж‘®оӨЈ?ж’ пӢ¬еәң?жЎҖ??иёө??о“ҢВҖп––_____??      let rawSentence = currentQuestion.example || '';
      
      // ?з®”??оҹЎ??жЎҖ?йҠқеү–оҸ»?иіў??жҖҺ?з”Ү??йҠөеҲё?ж’ҳоҗіпҸ·з•ҫп“Җ??пҒҝ??пҺҠВҖи„°??жҒҚВҖ?      const escapedWord = escapeRegex(currentQuestion.word);
      // ?еҶҪиҝӨй–¬оҗұоҚӘ?пҡ—??жЎҖ?еҡ—пҺҶд№Ӣж’ оҗұзҘһйҠқпҡҳ??оёӢ?
      const wordRegex = new RegExp(`\\b${escapedWord}\\b`, 'i');
      let displaySentence = rawSentence.replace(wordRegex, '______');
      
      // ?еҲё??жЎҗ??еҜҘпјҠиқ·з®Ҹ??жёЎ?йҠқеүң?йқҳп•қоҸұиқ§йӨүйҷҢеҡ—п—№и’Ӯж“ғоҰөжјҒ?жЎҖ?ж’ пҡҳ??п„‘и‘ү??      let chineseTranslation = currentQuestion.exampleMeaning || '(?вҲ©??дәҰи•ғйң…?';
      const wordMeaning = currentQuestion.meaning;
      if (wordMeaning && chineseTranslation.includes(wordMeaning)) {
        // йӣҝиј»оң…йҠқВҖ?п•ЎжӮ…йһҠоқ„?жҶҝоҗҙпҸ°йқҳпүҚ?иқ·з®ҸоЎ…ж‘®оӨӣ?йҠқеүң??оҗІВҖ?        const highlightedMeaning = `<span style="color: #ffd700; font-weight: bold; text-shadow: 0 0 6px #ffd700;">${wordMeaning}</span>`;
        // ?иҠЈоӯ§?о®ҸжҙөйҠқВҖ?п•қпҠҫ?жӣ„?еҡ—п—ҫој•?пҡҳ?жҶӯоЎҪоӯ§?о®ҚпҶҖйҡһоЎјоҜө??        chineseTranslation = chineseTranslation.replace(wordMeaning, highlightedMeaning);
      }

      questionTextEl.innerHTML = `
        ${displaySentence}
        <div style="margin-top: 10px; font-size: 1.1rem; color: #a7ffea; font-weight: 500;">${chineseTranslation}</div>
      `;

      // зҡһоЎј??иіҠ?еҡ—о«ұиҝӨиқЈз®ҸоЎ…ж‘®?+ йҠқпҗЈВҖп•қеғ•??      choices = [];
      // з”Ү?в…Ў?иіҠ?
      choices.push({ text: currentQuestion.word, isCorrect: true });

      // ??3 ?п•қеғ•?ж©ҳ??еҜ§оҫӯж’ п•һпҸј?жҫҶ??иЁҫж’®?п„’оЎ…ж‘®?      const distractors = findSimilarWords(currentQuestion.word, 3);
      distractors.forEach(d => choices.push({ text: d, isCorrect: false }));

      // жҶ’оҝҷ??жӣҶ??е•—йӣІжҶӯоә ??иЁҫж’®ж‘®оӨЈ??еҲёоӘіз’ҲоёҒ?йӢҶо°«йҒӣ
      while (choices.length < 4 && vocab.length > choices.length) {
          const r = vocab[Math.floor(Math.random() * totalCount)];
          let candidate = r.word;
          // з‘јпјёо·Ғ?иҮ¬о’Ҹж’Ңи„ЈоҜӯ?иіҠ?йҠқ?          if (!choices.some(c => c.text.toLowerCase() === candidate.toLowerCase())) {
              choices.push({ text: candidate, isCorrect: false });
          }
      }

      // Shuffle choices
      for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));

    function calculateStarReward(isCorrect, answerTime, consecutiveCount, wordLength, rarity) {
      if (!isCorrect) return 0;
      
      let baseReward = 1; // ?з®Ү??оҺ”п”ӯ

        baseReward += 1; // 7иқҳоҳҲп…ұ +1??      }
      
      // ????оҺ”п”ӯеҡ—о«ҙВҖ??иқ‘оқӮ?й һп“Җ??оҺ”п”ӯй һп“Җ?
      if (consecutiveCount >= 5) {

        baseReward += 2; // 3??? +2??      } else if (consecutiveCount >= 2) {
        baseReward += 1; // 2??? +1??      }
      
      // ?жЎҖ???жјІ?оҺ”п”ӯеҡ—о«ұо№І?о«°оЎ…ж‘®оӨқоһұж‘ЁиЎЈзӯ–йҲӯпҺҠ?жҶӯоЎҫ???      if (wordLength >= 8) {

      }
      
      // ?иұў?жҶҝп—ҫ??и„©пҸ·з•ҫп“Ӯ???      baseReward += 1; // ?иұў?жҶҝп—ҫ??и„Ө?жҶӯоЎҫ???      
      return baseReward;
    }
