<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>?иҠҫ??о°Әпҷ“иқһвҲ ? - ?жңӣ?ж’ оҗҙп”©??/title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ?з®ёоҜұ?ојҝоІ„з’…??еҡ—п—Ҫ??е—Ў??ојҝоІ„йқҪоіҲ?йҠқВҖ??*/
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #000010;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #0ff;
      margin-bottom: 20px;
    }
    .btn {
      background: #0ff;
      color: #001122;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 8px #0ff;
      font-size: 1rem;
    }
    #container {
      max-width: 800px;
      margin: 0 auto;
      text-align: left;
    }
    #categoryName {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #0ff;
      background: #111;
      color: #fff;
      box-sizing: border-box;
      font-size: 1rem;
    }
    #wordList {
      max-height: 400px;
      overflow-y: auto;
      background: #111;
      padding: 10px;
      border: 1px solid #0ff;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    #wordList label {
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #222;
    }
    #wordList label:last-child {
      border-bottom: none;
    }
    #wordList input[type="checkbox"] {
      margin-right: 8px;
    }
    #message {
      margin-top: 10px;
      min-height: 1.2em;
      color: #ff6;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <button class="btn" style="position:absolute; top:20px; left:20px;"
          onclick="location.href='index.html'">?? ?оөЁ???/button>
  <h1>?? ?иҠҫ??о°Әпҷ“иқһвҲ ?</h1>

  <div id="container">
    <label for="categoryName">йҡўп• ж’“?д»ҝ??вҲӘ?иқ”жў§?</label>
    <input type="text" id="categoryName" placeholder="йқҳп•қ?еҡ—о«ұ??п„’оЎ…ж‘®оӨҡ??? />

    <div id="wordList">
      <!-- ?о©–г„җ?пҒө??п•қ???dictionary йҠқеүң??пҗЈоЎ…ж‘®?(checkbox) -->
    </div>

    <button class="btn" onclick="saveCustomCategory()">?и„Ј??о°Әпҷ“</button>
    <div id="message"></div>
  </div>

  <script>
    // йңҲВҖ??localStorage.dictionary
    function loadDictionary() {
      return JSON.parse(localStorage.getItem('dictionary') || '[]');
    }

    // йңҲВҖ??localStorage.customCategories
    function loadCustomCategories() {
      const raw = localStorage.getItem('customCategories');
      try {
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error('й–«?? customCategories жҶӯжңӣ?', e);
        return [];
      }
    }

    function saveCustomCategories(arr) {
      localStorage.setItem('customCategories', JSON.stringify(arr));
    }

    // жҶҝиҲҗе…§ dictionary йӢҶвҲ ?зҳҘоҗұВҖ?{en, zh}еҡ—п—ә?йҠқ?checkbox
    function renderWordCheckboxes() {
      const dict = loadDictionary();
      const container = document.getElementById('wordList');
      container.innerHTML = '';

      if (dict.length === 0) {
        container.innerHTML = '<p>?жЎҖ??п—әоЎ…ж‘®оӨҡоҜұ?пҡҳ??пҗўйҒҷйӣҝоҹҹоЎ…ж‘®?br>йҡўп•қ??е•ңВҖп—әоЎ…ж‘®оӨҡоҜұ?пҡӣ??пјёоЎҮжҶ“оөӨоЎ…ж‘®оӨ—ВҖ?/p>';
        return;
      }

      dict.forEach((item, index) => {
        const label = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = index; // ?еҮҪжҸЈж’ҳоҹҹВҖжҪӯ?й–®?
        label.appendChild(cb);
        label.appendChild(document.createTextNode(item.en + ' ??' + item.zh));
        container.appendChild(label);
      });
    }

    // ?и„Ј??иҠҫ??о°Әпҷ“
    function saveCustomCategory() {
      const nameInput = document.getElementById('categoryName');
      const name = nameInput.value.trim();
      if (!name) {
        showMessage('?оәЁ? йҡўп•қ?й ӣи©Ёп…Ҝ?о°Әпҷ“?пҡҷиҝӮ', true);
        return;
      }

      const checkboxes = document.querySelectorAll('#wordList input[type="checkbox"]');
      const dict = loadDictionary();
      const selectedWords = [];

      checkboxes.forEach(cb => {
        if (cb.checked) {
          const idx = parseInt(cb.value, 10);
          if (dict[idx]) {
            selectedWords.push({ en: dict[idx].en, zh: dict[idx].zh });
          }
        }
      });

      if (selectedWords.length === 0) {
        showMessage('?оәЁ? йҡўп• пҠ·ж’ о•«п”¶?иЁҫ??п•қоЎ…ж‘®?, true);
        return;
      }

      // йңҲВҖ?жҡ№? customCategoriesеҡ—п—ҫој•?пҡӣ?йҠҙпӢ©?иқ”?
      const customCats = loadCustomCategories();
      const exists = customCats.some(cat => cat.name.toLowerCase() === name.toLowerCase());
      if (exists) {
        showMessage(`?оәЁ? ж’Ңи„«??и©Ё??пҡҷиҝӮ "${name}" ?п„•пҠ®й–®оҝң??пё¶, true);
        return;
      }

      // ?е•Ј?йҠқиЎҖпғҹж‘®?
      customCats.push({ name: name, words: selectedWords });
      saveCustomCategories(customCats);

      showMessage(`??ж’Ңи„«??оёҒйҒЈиқЎп•Ў???"${name}" (${selectedWords.length} иқ‘пүҢоЎ…ж‘®?`);
      // зҡңпҶұеҫҒй ӣи©Ёп…Ҝ?пӢ©п”¶??
      nameInput.value = '';
      checkboxes.forEach(cb => cb.checked = false);
    }

    function showMessage(msg, isError = false) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.style.color = isError ? '#f55' : '#6f6';
      setTimeout(() => { el.textContent = ''; }, 3000);
    }

    // ?ојҝоІ„й ӣпҗЈп…Ҝж’ ?render
    window.addEventListener('load', () => {
      renderWordCheckboxes();
    });
  </script>

</body>
</html>
